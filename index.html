{ nom: "Gréban de Pontourny", lat: 47.20683, lng: 0.19981, ouverture: 1903, fermeture: 1962, type: "", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F8%2FFRAPHP075_C660_8_170.jpg",  legende_image:"La Façade vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/70_Gr%C3%A9ban-de-Pontourny.pdf", histoire: "<b>1895</b>, Marie-Alphonse Gréban de Pontourny formule par testament olographe du 26 octobre une donation pour la création d'un asile Saint-Joseph dans le département d'Indre-et-Loire.\n\n<b>1903</b>, l'établissement ouvre dans la dernière quinzaine de décembre.\n\n<b>1962</b>, rattaché au service d'aide sociale à l'enfance." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Hartmann (orphelinat)", lat: 48.62984, lng: 2.09274, ouverture: 1892, fermeture: 1935, type: "fondation", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F8%2FFRAPHP075_C660_8_104.jpg",  legende_image:"Vue d'ensemble vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/72_Hartmann.pdf", histoire: "<b>1887</b>, par décret du 9 août, la Ville de Paris est autorisée à accepter le legs d'Albert Hartmann pour la création d'un orphelinat dénommé fondation Hartmann.\n\n<b>1892</b>, l'orphelinat ouvre à Forges-les-Bains.\n\n<b>1935</b>, l'établissement ferme provisoirement en raison de difficultés financières." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Hendaye (sanatorium)", lat: 43.37596, lng: -1.75985, ouverture: 1899, fermeture: null, type: "sanatorium", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F5%2FFRAPHP075_C660_5_144.jpg",  legende_image:"Vues extérieures. - L'entrée de l'hôpital vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/73_Hendaye.pdf", histoire: "<b>1899</b>, ouverture sous la dénomination « Asile pour enfants de la ville de Paris ».\n\n<b>1950</b>, renommé établissement hélio-marin de la ville de Paris.\n\n<b>1998</b>, renommé « hôpital marin »." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Henri-Mondor", lat: 48.79804, lng: 2.45182, ouverture: 1969, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F31FI%2FFRAPHP075_31FI_194.jpg",  legende_image:"Entrée de l'hôpital en 1992.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/74_Henri-Mondor.pdf", histoire: "<b>1970</b>, fusionne avec l'hôpital Albert-Chenevier pour former le groupe hospitalier Henri-Mondor – Albert-Chenevier." , groupe: "AP-HP. Hôpitaux Universitaires Henri-Mondor", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Hérold", lat: 48.88250, lng: 2.39394, ouverture: 1900, fermeture: 1988, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F4%2FFRAPHP075_C660_4_184.jpg",  legende_image:"La cour d'honneur vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/75_H%C3%A9rold.pdf", histoire: "<b>1893</b>, l'hôpital de réserve, d'abord nommé hôpital de la place du Danube, reçoit la dénomination d'hôpital Hérold. Voué à l'hospitalisation infantile.\n\n<b>1988</b>, fermeture et transfert vers le nouvel hôpital d'enfants Robert-Debré." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Hôpital de la Pitié", lat: 48.84353, lng: 2.35467, ouverture: 1809, fermeture: 1912, type: "hopital", detruit:"oui",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F76FI%2FFRAPHP075_76FI_031.jpg",  legende_image:"Bâtiments de l'ancienne Pitié vers 1910.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/107_Pitié.pdf", histoire: "Le <b>1er janvier 1809</b>, une délibération du conseil général des hospices attribue à l'établissement de la rue Lacepède, dans le 5e arrondissement, le nom d'hôpital de la Pitié. Désormais indépendant de l'Hôtel-Dieu, il reçoit des adultes en médecine et chirurgie.\n\n<b>1820</b>, l'hôpital gère 433 lits. Ce chiffre monte à 616 en 1840, témoignant d'une activité en forte croissance.\n\n<b>1904</b>, face au délabrement croissant des bâtiments, l'Assistance publique décide de reconstruire l'établissement sur des terrains vacants de la Salpêtrière.\n\n<b>novembre 1911</b>, la démolition de l'ancienne Pitié est autorisée. Elle devient effective en 1912." , groupe: "", specialites: "Invention du chloroforme et publication des premières conclusions | 1831 | Eugène Soubeiran", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Hospice de l’Epée-de-bois", lat: 48.84155, lng: 2.35133, ouverture: 1905, fermeture: 26, type: "", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FSerie_Fosseyeux%2F834FOSS%2F834FOSS_091%2FFRAPHP075_834FOSS91_1.jpg",  legende_image:"Dispensaire de la rue de l'Épée-de-Bois, s.d.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/03/Hospice-5e.pdf", histoire: "<b>20</b>, la maison de secours Sœur-Rosalie est fondée, à l'emplacement de laquelle s'établira l'hospice.\n\n<b>26</b>, transfert rue Gracieuse, puis rue de l'Épée-de-Bois en 1862.\n\n<b>1903</b>, évacuation de l'ancienne structure hospitalière en mai pour permettre sa reconstruction." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Hospice des Sevrés", lat: 48.76368, lng: 2.39855, ouverture: 1884, fermeture: 1962, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/76_Hospice-des-Sevr%C3%A9s.pdf", histoire: "<b>1883</b>, la maison des Sevrés s'installe dans une ancienne mégisserie acquise par l'administration hospitalière à Thiais.\n\n<b>1884</b>, ouverture le 1er janvier. Annexe de l'hospice des Enfants-Assistés, elle accueille des enfants en bonne santé ou atteints d'affections légères, âgés de 18 mois à 10 ans.\n\n<b>1900</b>, l'hospice des Sevrés gère 100 lits." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },

{ nom: "Hôtel-Dieu", lat: 48.85397, lng:  2.34821, ouverture: 1877, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FD%2FD807%2FFRAPHP075_D_807_0024.jpg",  legende_image:"Façade et cour intérieure Fin XIXe siècle. ", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2018/11/78_Hotel-Dieu_v1.pdf", histoire: "<b>1867-1878</b>, reconstruction sous la conduite de l'architecte Diet, sur le côté nord du parvis Notre-Dame.\n\n<b>1877</b>, mis en service le 30 juillet, inauguré par Mac-Mahon le 11 août." , groupe: "AP-HP. Centre-Université Paris Cité", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Hôtel-Dieu (ancien)", lat: 48.85323, lng: 2.34771, ouverture: 829, fermeture: 1878, type: "hopital", detruit:"oui",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FD%2FD807%2FFRAPHP075_D_807_0007.jpg",  legende_image:"Fin XIXe siècle.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2018/11/78_Hotel-Dieu_v1.pdf", histoire: "<b>829</b> (IXe siècle), fondation de l'Hôtel-Dieu. Jusqu'au début du XVIe siècle, placé sous l'égide du clergé, en partie des chanoines de Notre-Dame.\n\nSous la Révolution, renommé Grand Hospice d'Humanité.\n\n<b>1878</b>, démolition de l'ancien Hôtel-Dieu, après la mise en service du nouvel établissement en 1877." , groupe: "", specialites: "Obstétrique", decouverte_1: "Office des accouchées, première maternité de Paris| 1378", decouverte_2: "", url_archives: "", url_musee: "" },

{ nom: "Incurables (femmes)", lat: 48.84954, lng: 2.32192, ouverture: 1637, fermeture: 1869, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/38_Charles-Foix.pdf", histoire: "<b>1634-1639</b>, l'hôpital des Incurables est édifié à Paris grâce aux dons du cardinal François de La Rochefoucauld, de l'abbé François Joulet de Châtillon et de Marguerite Rouillé.\n\n<b>1637</b>, les lettres patentes de Louis XIII officialisent l'établissement, qui accueille ses premiers malades la même année.\n\n<b>1801</b>, les hommes sont transférés dans l'ancien couvent des Récollets, rue du Faubourg-Saint-Martin, puis appelé Incurables-Hommes. La translation d’une partie des malades vers une autre structure conduit à une occupation exclusivement féminine de la maison. Devenu l’hôpital des Incurables-Femmes l’établissement de la rue de Sèvres continue de fonctionner.\n\n<b>1869</b>, les patientes quittent à leur tour la maison de la rue de Sèvre pour le nouvel hospices des Incurables construit à Ivry-sur-Seine." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Incurables (Hommes)", lat: 48.87547, lng: 2.36029, ouverture: 1801, fermeture: 1869, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC661%2F2%2FFRAPHP075_C661_2_007.jpg",  legende_image:"Plan de l'hospice en 1807.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/38_Charles-Foix.pdf", histoire: "<b>1801</b>, En possession du couvent des Récollets depuis un décret de 1794, l'administration des hospices le transforme en maison de santé pour infirmes et vieillards appelée hospice des vieillards, hospice du Saint-Nom-de-Jésus. Le transfert des patients auparavant soignés rue de Sèvres lui vaut la dénomination d’Incurables-Hommes.\n\n<b>1869</b>, les malades sont réunis dans un nouvel hospice des Incurables construit à Ivry-sur-Seine par Théodore Labrouste.\n\n<b>1887</b>, par arrêté du 29 octobre, il prend la dénomination d'hospice d'Ivry. (voir Charles-Foix)" , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },

{ nom: "La Collégiale", lat: 48.83889, lng: 2.35235, ouverture: 1986, fermeture: null, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/46_Collégiale.pdf", histoire: "<b>1977</b>, la création de l'hôpital La Collégiale est décidée dans le cadre d'une politique d'augmentation des capacités de moyen et long séjour à Paris.\n\n<b>1980</b>, une consultation architecturale est lancée en mai.\n\n<b>1986</b>, les travaux conduits par l'architecte Michel Kalisz s'achèvent et l'établissement ouvre en octobre rue du Fer-à-Moulin (5e arrondissement)." , groupe: "AP-HP. Centre-Université Paris Cité", specialites: "Gériatrie, réadaptation", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },

{ nom: "Laennec", lat: 48.84979, lng: 2.32216, ouverture: 1879, fermeture: 2000, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/83_Laennec.pdf", histoire: "Installé dans les bâtiments de l'ancien hôpital des Incurables, fermé après transfert des dernières patientes <b>1869</b> vers le nouvel hospice des Incurables construit à Ivry.\n\n<b>1879</b>, l'hôpital temporaire est renommé Laennec, en mémoire du clinicien anatomo-pathologiste inventeur du stéthoscope.\n\nAprès <b>1998</b>, les activités sont transférées dans l'hôpital européen Georges-Pompidou.\n\n<b>2000</b>, fermeture définitive." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },

{ nom: "Lesecq ", lat: 48.87967, lng: 2.35143, ouverture: 1845, fermeture: 1969, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/92_Lesecq.pdf", histoire: "<b>1781</b>, par testament du 20 février, Simone Lesecq prévoit la création d'un établissement destiné à loger vingt femmes dans sa maison rue du Gros-Chenet.\n\n<b>1845</b>, la fondation s'installe rue de Belzunce à Paris. Gérée par le Bureau de bienfaisance, elle accueille gratuitement vingt femmes célibataires ou veuves âgées de plus de cinquante ans." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },

{ nom: "Maison de Bicêtre", lat: 48.81112, lng: 2.35573, ouverture: 1656, fermeture: 1823, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F6%2FFRAPHP075_C660_6_014.jpg",  legende_image:"L'hospital de Bicestre (XVIIe siècle).", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/22_Bic%C3%AAtre.pdf", histoire: "<b>XVIIe siècle</b> : acquisition par le roi Louis XIII d'un domaine destiné à la construction d'un hôpital pour soldats invalides.\n\n<b>1634</b> : ouverture de la commanderie de Saint-Louis. \n\n<b>1656</b> : rattachement à l'Hôpital général de Paris ; la maison de Bicêtre devient un établissement d'enfermement pour indigents, combinant fonction d'hôpital, d'asile, de maison de correction et de détention.\n\n<b>1823</b> : par arrêté du 4 juin, le conseil général des hospices lui attribue le nom d'hospice de la Vieillesse-Hommes. \n\n<b>1885</b> : éétablissement de la dénomination Bicêtre.\n\n<b>1950</b> : transformation progressive de l'hospice en hôpital de soins aigus.\n\n<b>1952</b> : modernisation et aménagement de deux pavillons en service hospitalier pour enfants." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },

{ nom: "Maison de Moisselles ", lat: 49.05007, lng: 2.33737, ouverture: 1894, fermeture: 1905, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/98_Moisselles.pdf", histoire: "<b>1892</b>, la propriété de Moisselles est acquise par le département de la Seine pour y installer une école de réforme pour enfants assistés.\n\n<b>1894</b>, création d'un service hospitalier de plus de 200 lits destiné aux enfants atteints de teigne.\n\n<b>1896</b>, le service est progressivement abandonné.\n\n<b>1905</b>, l'établissement devient un asile d'enfants déficients mentaux.\n\n<b>1942</b>, rebaptisé hôpital psychiatrique de Moisselles, il prend par la suite le nom de Centre hospitalier Roger-Prévot." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },

{ nom: "Michel-Brézin (fondation)", lat: 48.83865, lng: 2.16881, ouverture: 1833, fermeture: 1946, type: "fondation", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F45FI%2FFRAPHP075_45FI_124.jpg",  legende_image:"Cour et arcades de l'ancien hospice de la Reconnaissance vers 1960.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/110_Reconnaissance.pdf", histoire: "<b>1828</b>, Michel Brézin formule par testament du 16 décembre un legs au Conseil général des hospices afin d'y établir un hospice de retraite à Garches.\n\n<b>1946</b>, la fondation Michel-Brézin est annexée à l'hôpital Raymond-Poincaré et devient le pavillon Brézin." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },

{ nom: "Millard ", lat: 48.93035, lng: 2.50282, ouverture: 1926, fermeture: 1969, type: "fondation", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/97_Millard.pdf", histoire: "<b>1920</b>, l'Assistance publique est autorisée par décret du 27 décembre à accepter le legs Millard, prévoyant l'édification d'un pavillon pour l'hospitalisation de personnes âgées.\n\n<b>1926</b>, ouverture de l'hospice fondation Millard." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Musée Bourneville", lat: 48.80931, lng: 2.35429, ouverture: 1880, fermeture: 1924, type: "musee scientifique", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F6%2FFRAPHP075_C660_6_037.jpg",  legende_image:"Musée Bourneville vers 1900.", url:"", histoire: "<b>1880</b>, création du musée d'anatomie pathologique de l'hospice de Bicêtre, dit musée Bourneville." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Musée Civiale", lat: 48.84439, lng: 2.31554, ouverture: 1867, fermeture: 1904, type: "musee scientifique", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1867</b> : création d'un musée autour d'une importante collection réunie par le Dr Civiale comprenant des calculs, des instruments et des pièces anatomo-pathologiques intéressant principalement les maladies urinaires.\n<b>1904</b> : transfert du musée à l'hopital Lariboisière." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Musée de l'amphithéâtre d'anatomie", lat: 48.83902, lng: 2.35434, ouverture: 1900, fermeture: 1934, type: "musee scientifique", detruit:"",  images:"",  legende_image:"", url:"", histoire: " <b>Fin XIXe siècle</b> : création d'un musée de l’amphithéâtre d’anatomie, aussi dénommé Musée de Clamart ; ses collections rassemble des pièces anatomiques naturelles préparées depuis la création de l'établissement par les prosecteurs des hôpitaux." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Musée des Moulages (Saint-Louis)", lat: 48.87229, lng: 2.36811, ouverture: 1867, fermeture: null, type: "musee scientifique", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1867</b>, création du musée des Moulages de l'hôpital Saint-Louis : collections de moulages reproduisant les principales affectations cutanées et parasitaires, exécutés par le préparateur d'anatomie de l'hôpital, M. Baretta." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Musée du service des Accouchements – Beaujon", lat: 48.87681, lng: 2.30634, ouverture: 1897, fermeture: 1919, type: "musee scientifique", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>avant 1897</b> : création d'un musée dans le pavillon Dubois de la maternité ; collection de moulages en cire et de fragments squelettiques.\n<b>1919</b> : fermeture du musée." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Musée et Bibliothèque Charcot (Salpêtrière) ", lat: 48.83743, lng: 2.36608, ouverture: 1878, fermeture: 1966, type: "musee scientifique", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1878</b> : création par le Pr Charcot d'un musée dans son service au premier étage de la division Pariset ; réunit des dessins, des photographies, des pièces de squelettes présentant des déformations osseuses, des moulages en cire, la célèbre Vénus ataxique, ainsi que de nombreuses préparations anatomiques naturelles et pièces anatomiques.\n<b>1906</b> : installation de la bibliothèque Charcot à l'emplacement du musée, transféré au rez-de-chaussée du même bâtiment.\n<b>1966</b> : déplacement des objets du musée Charcot dans un autre espace de l'hôpital, jusqu'à leur transfert au musée de l'AP-HP en 1992." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Musée Lannelongue", lat: 48.84943, lng: 2.37522, ouverture: 1847, fermeture: 1900, type: "musee scientifique", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>avant 1847</b> : création d'un musée par le Pr Lannelongue dans lequel ce dernier rassemble des pièces anatomiques de maladies chirurgicales des enfants et de maladies congénitales.\n<b>1900</b> : transfert des collections au musée Dupuytren. " , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Musée Letulle ", lat: 48.84172, lng: 2.28470, ouverture: 1905, fermeture: 1980, type: "musee scientifique", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1905</b> : création d'un musée par Maurice Letulle dans un bâtiment à côté du laboratoire central de l'hôpital Boucicaut.\n<b>1928</b> : création de l'association «Musée Maurice Letulle» ; le musée renommé «Musée laboratoire d'anatomie pathologique générale» réunit près de 3000 ouvrages, 1 million de coupes histologiques des centaines de dessins, 10 000 plaques photographiques et 6 000 pièce chirugicales." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Musée pathologique (Laënnec)", lat: 48.84957, lng: 2.32230, ouverture: 1889, fermeture: null, type: "musee scientifique", detruit:"",  images:"",  legende_image:"", url:"", histoire: "Musée pathologique – hôpital Laënnec" , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Musée Varnier ", lat: 48.83858, lng: 2.33722, ouverture: 1889, fermeture: 1957, type: "musee scientifique", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1889</b> : ouverture dans la maternité Baudelocque d'un musée dédié à l'étude de l'anatomie et de la pathologie obstétricale, grâce à l'initiative d'Adolphe Pinard et de son élève Henri Varnier ; collections constituées de photographies, instruments, pièces anatomiques et des premiers clichés radiologiques obstétricaux.\n<b>vers 1957 </b> : transfert de cet ensemble dans les sous-sols du cloître de Port-Royal." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Musée vénéréologique – Ricord", lat: 48.83590, lng: 2.33991, ouverture: 1872, fermeture: 1926, type: "musee scientifique", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1879</b> : fondation par le Dr Horteloup d'un musée bientôt installé dans une salle d'opérations de l'hôpital ; les collections sont constituées de moulages en cire et en plâtre reproduisant les types cliniques de maladies vénériennes.\n<b>1902</b> : l'ensemble, désormais composé d'environ 400 pièces illustrant la pathologie vénérienne, est présenté dans l'ancienne chapelle de l'hôpital.\n<b>1926</b> : fermeture du musée." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Necker", lat: 48.84656, lng: 2.31588, ouverture: 1778, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FNCK%2FFRAPHP075_NCK_3FI4_0315.jpg",  legende_image:"Entrée des urgences enfants, ORL, maternité en 1999.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/99_Necker.pdf", histoire: "<b>1778</b>, l'hôpital Necker est fondé rue de Sèvres, à l'emplacement de l'ancien couvent des Bénédictines Notre-Dame de Liesse. Il est d'abord nommé hospice de Charité, puis hospice des paroisses de Saint-Sulpice et du Gros-Caillou, et se consacre à la médecine et chirurgie de l'adulte.\n\n<b>1792</b>, l'établissement devient l'hospice de l'Ouest.\n\n<b>1802</b>, l'administration décide de lui attribuer le nom de sa fondatrice, qui l'a dirigé jusqu'en 1788 : il prend le nom d'hôpital Necker.\n\n<b>1927</b>, l'hôpital Necker fusionne avec l'hôpital des Enfants malades pour former l'hôpital Necker-Enfants Malades." , groupe: "AP-HP. Centre-Université Paris Cité", specialites: "Pédiatrie, chirurgie pédiatrique, maladies rares, néphrologie, maladies génétiques", decouverte_1: "Invention du stéthoscope | 1816 | Dr René Laennec", decouverte_2: "Première greffe de rein en France | 1952 | Pr Jean Hamburger & Louis Michon", url_archives: "https://aphp-diffusion-prod.ligeo-archives.com/archive/resultats/population/lineaire/n:91?arcfacfull=RECH_Libre&RECH_Collectivite_Libel=Enfants+malades+%28h%C3%B4pital%29%7CNecker-Enfants+malades+%28h%C3%B4pital%29%7C&RECH_Collectivite_Md5=768c3380489a50308dce1cf2cbae998a%7Ce67140e8d2ed60c3d951ce4f6ff56988%7C&type=population", url_musee: "https://www.musee-collections.aphp.fr/app/photopro.sk/aphp/doclist?prms_treelist=rootNode%3D2%26openNodes%3D%253A3%253A3263%253A381%26caller_id%3Ddoclist%26search%3Dmcpid%2B%253A%2B%25223270%2522&psearch=mcpid%20%3A%20%221096%22&mcpid=1096" },
{ nom: "Notre-Dame-de-Pitié", lat: 48.84357, lng: 2.35491, ouverture: 1612, fermeture: 1809, type: "hopital", detruit:"oui",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FD%2FD870%2FFRAPHP075_D_870_0001.jpg",  legende_image:"Entrée de l'hôpital rue Lacépède. Fin XIXe siècle.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/107_Pitié.pdf", histoire: "<b>1612</b>, fondée sous la régence de Marie de Médicis, la maison dite Pitié ou Notre-Dame-de-Pitié s'établit faubourg Saint-Victor pour accueillir mendiants et vieillards, en application de l'édit royal du 27 avril 1612.\n\n<b>1657</b>, rattaché à l'Hôpital Général, prend par délibération du 7 mai le nom de Notre-Dame-de-Pitié.\n\n<b>1792</b>, devient orphelinat Saint-Victor, puis maison de la Patrie sous la Révolution.\n\n<b>1803</b>, prend le nom d'hospice des Orphelins.\n\n<b>1808</b>, les enfants sont transférés et l'établissement devient annexe de l'Hôtel-Dieu." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Orphelinat (Bonar) ", lat: 48.85159, lng: 2.34491, ouverture: 1872, fermeture: 1969, type: "orphelinat", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/25_Bonar.pdf", histoire: "<b>1866</b>, par décret du 28 février, Delphine-Désirée Bonar née Barraud institue la ville de Paris légataire universelle à charge de fonder un orphelinat pour jeunes filles dans le 12e arrondissement.\n\n<b>1872</b>, ouverture de l'orphelinat Bonar. L'établissement accueille des orphelines et demi-orphelines pauvres nées à Paris, admises avant l'âge de 6 ans." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Orphelines (hospice des)", lat: 48.84891, lng: 2.37580, ouverture: 1795, fermeture: 1839, type: "orphelinat", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/05/Armand-Trousseau.pdf", histoire: "<b>1795</b>, les enfants sont transférés et la bâtisse est utilisée pour accueillir les orphelins, prenant successivement les noms d'hospice des Orphelines puis hospice des Orphelins.\n\n<b>1839</b>, l'établissement reçoit une nouvelle affectation." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Parent-de-Rosan (Orphelinat)", lat: 48.84286, lng: 2.26674, ouverture: 1895, fermeture: 1962, type: "orphelinat", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/100_Parent-de-Rosan.pdf", histoire: "<b>1890</b>, décès de Charles-Félix Parent le 8 février, dont le testament prévoyait la création d'un orphelinat.\n\n<b>1895</b>, l'orphelinat ouvre ses portes dans la propriété du bienfaiteur dans le 16e arrondissement de Paris, sous le nom de fondation Parent-de-Rosan.\n\n<b>1962</b>, à compter du 1er janvier, l'établissement cesse de relever de l'Assistance publique et est rattaché au bureau d'aide sociale à l'enfance." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Paul-Brousse", lat: 48.79507, lng: 2.36372, ouverture: 1913, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FPBR%2FFRAPHP075_PBR_3FI4_0278.jpg",  legende_image:"Entrée principale en 1992.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/101_Paul-Brousse.pdf", histoire: "<b>1913</b>, l'hospice départemental de Villejuif, également appelé hospice départemental Paul-Brousse, entre en service." , groupe: "AP-HP. Université Paris-Saclay", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Paul-Doumer", lat: 49.35350, lng: 2.49542, ouverture: 1933, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FVPD%2FFRAPHP075_VPD_3FI4_009.jpg",  legende_image:"Entrée de l'hôpital en 1977.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/102_Paul-Doumer.pdf", histoire: "<b>1932</b>, le sanatorium Labruyère ouvre.\n\n<b>1933</b>, reçoit la dénomination de sanatorium Paul-Doumer." , groupe: "AP-HP. Nord-Université Paris Cité", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Paul-Manchon", lat: 48.75637, lng: 2.29778, ouverture: 1927, fermeture: 1962, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FPMC%2FFRAPHP075_PMC_3FI4_15.jpg",  legende_image:"Façade côté cour vers 1930.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/103_Paul-Manchon.pdf", histoire: "<b>1926</b>, le docteur Louis Mourier et le docteur Calmettes initient la création d'un service d'observation pour nouveau-nés abandonnés.\n\n<b>1927</b>, la pouponnière ouvre en mars à Antony, en annexe de l'hospice des Enfants-Assistés.\n\n<b>1946</b>, renommée pouponnière Paul-Manchon.\n\n<b>1962</b>, l'établissement est transféré à la préfecture de Paris et relève du service d'aide sociale à l'enfance à compter du 1er janvier." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Paul-Marmottan", lat: 48.87814, lng: 2.29125, ouverture: 1936, fermeture: 1968, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/104_Paul-Marmottan.pdf", histoire: "Construit dans le 17e arrondissement, rue d'Armaillé, pour compenser le déficit de capacité d'hospitalisation dû à la reconstruction de l'hôpital Beaujon à Clichy.\n\n<b>1968</b>, l'administration impose la suppression du service de chirurgie. L'établissement cesse définitivement son activité en octobre." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Paul-Parquet ", lat: 48.89332, lng: 2.26303, ouverture: 1923, fermeture: null, type: "fondation", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/105_Paul-Parquet.pdf", histoire: "<b>1922</b>, la fondation Paul-Parquet est créée en mai par Madame Parquet à Neuilly-sur-Seine. Sa mission : soigner et accueillir des nourrissons.\n\n<b>1923</b>, en août, une convention est signée avec l'AP-HP : jusqu'à 50 enfants âgés d'un mois à trois ans peuvent y être accueillis.\n\n<b>1943</b>, l'établissement dispose de 60 lits pour ces nourrissons temporairement envoyés par les hôpitaux." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Petites Maisons (Hospice des)", lat: 48.85155, lng: 2.32604, ouverture: 1554, fermeture: 1863, type: "hopital", detruit:"oui",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC661%2F2%2FFRAPHP075_C661_2_010.jpg",  legende_image:"Plan des Petites-Maisons (Ménages), 1790.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/47_Corentin-Celton.pdf", histoire: "<b>1554</b>, construction de l'hospice des Petites Maisons à l'emplacement d'une ancienne maladrerie.\n\n<b>1801</b>, l'établissement est transformé en maison de retraite et prend le nom d'hospice des Ménages ou Petits-Ménages.\n\n<b>1861</b>, Démolition des bâtiments et reconstruction d'un hospice plus vaste à Issy les Moulineaux." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Pharmacie centrale", lat: 48.83920, lng: 2.35532, ouverture: 1795, fermeture: null, type: "", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F55FI%2FFRAPHP075_55FI_712.jpg",  legende_image:"Entrée vers 1900.", url:"", histoire: "<b>1795</b>, organisation de l'apothicairerie générale des hospices civils de Paris le 6 juin, dans l'enceinte de l'Hôtel-Dieu.\n\n<b>1796</b>, transférée dans l'ancien hôpital des Enfants-Trouvés du parvis Notre-Dame le 12 novembre ; devient la « pharmacie générale des hospices ».\n\n<b>1810</b>, renommée « pharmacie centrale des hôpitaux de Paris », transférée quai de la Tournelle dans la maison des Miramiones.\n\n<b>1974</b>, quitte la maison de Miramion." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Piccini (hôpital temporaire)", lat: 48.87378, lng: 2.28569, ouverture: 1941, fermeture: 1945, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/106_Piccini.pdf", histoire: "<b>1941</b>, la clinique de la rue Piccini dans le 16e arrondissement est réquisitionnée par l'AP durant la guerre.\n\n<b>1945</b>, fermeture de l'hôpital temporaire Piccini." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Port-Hallan", lat: 47.34576, lng: -3.15294, ouverture: 1893, fermeture: 1903, type: "ecole", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC661%2F2%2FFRAPHP075_C661_2_077.jpg",  legende_image:"Vue extérieure de l'école vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/4_port-hallan.pdf", histoire: "<b>1893</b>, l'école maritime de Port-Hallan est fondée par le conseil général de la Seine.\n\n<b>1894</b>, ouverture le 14 février à Le Palais. Forme aux métiers maritimes les enfants assistés du département, prévue pour soixante élèves.\n\n<b>1903</b>, fermeture de l'établissement, dont les résultats ont été jugés insuffisants." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Raymond-Poincaré", lat: 48.83947, lng:  2.17079, ouverture: 1936, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F45FI%2FFRAPHP075_45FI_244.jpg",  legende_image:"Entrée principale en 1977.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/109_Raymond-Poincaré.pdf", histoire: "<b>1936</b>, ouverture de l'hôpital-hospice Raymond-Poincaré à Garches, d'abord consacré aux soins des adultes chroniques.\n\n<b>1944-1945</b>, transféré temporairement sous le nom d'hôpital Poincaré-Foch en raison d'une réquisition allemande.\n\nAprès <b>1945</b>, changement d'activité : centre de rééducation pour patients de chirurgie osseuse, puis centre de traitement pour personnes atteintes de poliomyélite, avant de s'élargir aux soins des paraplégiques." , groupe: "AP-HP. Université Paris-Saclay", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Reconnaissance (la)", lat: 48.83895, lng: 2.16881, ouverture: 1833, fermeture: 1946, type: "fondation", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F45FI%2FFRAPHP075_45FI_126.jpg",  legende_image:"Arcades dans les années 1960.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/110_Reconnaissance.pdf", histoire: "<b>1833</b>, l'hospice de la Reconnaissance ouvre en décembre, accueillant environ 140 pensionnaires. Destinée aux ouvriers forgerons-serruriers-mécaniciens sexagénaires sans ressources.\n\n<b>1946</b>, les bâtiments sont annexés à l'hôpital Raymond-Poincaré et deviennent le pavillon Brézin." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "René-Muret", lat: 48.93596, lng: 2.50974, ouverture: 1937, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FRMB%2FFRAPHP075_RMB_3FI4_160.jpg",  legende_image:"Entrée principale en 1967.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/111_René-Muret.pdf", histoire: "<b>1964</b>, début de l'édification de l'hôpital de Sevran en octobre.\n\n<b>1967</b>, l'établissement reçoit par arrêté le nom d'hôpital René-Muret.\n\n<b>1970</b>, par arrêté ministériel du 20 août, rattachement de la maison de retraite Bigottini. Les deux établissements sont administrativement liés sous la dénomination d'hôpital René-Muret – Bigottini." , groupe: "AP-HP. Hôpitaux Universitaires Paris Seine-Saint-Denis", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Riboutté-Vitallis (Orphelinat)", lat: 48.62988, lng: 2.09096, ouverture: 1882, fermeture: 1935, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F8%2FFRAPHP075_C660_8_106.jpg",  legende_image:"Entrée vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/112_Riboutt%C3%A9-Vitallis.pdf", histoire: "<b>1882</b>, l'orphelinat de garçons Riboutté-Vitallis ouvre à Forges-les-Bains. Il accueille des garçons de 7 à 11 ans et leur dispense une instruction élémentaire puis une formation pratique en ateliers.\n\n<b>1935</b>, la fondation ferme provisoirement en raison de difficultés financières." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Ricord ", lat: 48.83821, lng: 2.34044, ouverture: 1792, fermeture: 1902, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F1%2FFRAPHP075_C660_1_238.jpg",  legende_image:"Plan de masse de l'hôpital Ricord, 1899 (Rochet, architecte).", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/113_Ricord.pdf", histoire: "<b>1792</b>, l'ancien couvent des Capucins du faubourg Saint-Jacques est reconverti en hôpital des Vénériens.\n\n<b>1836</b>, renommé hôpital du Midi, recentré exclusivement sur le traitement des maladies vénériennes chez l'homme adulte.\n\n<b>1893</b>, prend le nom d'hôpital Ricord, en hommage au chirurgien Philippe Ricord.\n\n<b>1902</b>, annexé par l'hôpital Cochin.\n\n<b>1904</b>, démoli pour permettre l'extension de l'hôpital Cochin." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Robert-Debré", lat: 48.87883, lng: 2.40318, ouverture: 1988, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FRDB%2FFRAPHP075_RDB_3FI4_0253.jpg",  legende_image:" Entrée principale, boulevard Sérurier en 1988.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/114_Robert-Debré.pdf", histoire: "Début des années <b >1980</b>, L'administration de l'Assistance publique décide la création d'un nouvel établissement.\n\n<b>1984</b>, les travaux débutent dirigés par l'architecte Pierre Riboulet.\n\n<b>1988</b>, le 21 mars l'inauguration de l'hôpital Robert-Debré a lieu. " , groupe: "AP-HP. Nord-Université Paris Cité", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Rossini", lat: 48.84622, lng: 2.27022, ouverture: 1889, fermeture: 1967, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/115_Rossini.pdf", histoire: "<b>1889</b>, inauguration de la fondation Rossini, maison de retraite placée sous la direction du directeur de Sainte-Périne." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Rothschild", lat: 48.84305, lng: 2.39836, ouverture: 1852, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FRTH%2FFRAPHP075_RTH_3FI4_0041.jpg",  legende_image:"Entrée de la fondation Rothschild en 1991.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/116_Rothschild.pdf", histoire: "<b>1852</b>, fondation rue de Picpus dans le 12e arrondissement.\n\n<b>1914</b>, transfert et ouverture du nouvel hôpital rue Santerre, comprenant hôpital, hospice, orphelinat, sanatorium et maison de convalescence à Chantilly.\n\n<b>1954</b>, rattachement à l'Assistance publique." , groupe: "AP-HP. Sorbonne Université", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Roudil (école)", lat: 36.21721, lng: 2.87913, ouverture: 1887, fermeture: 1962, type: "ecole", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F9%2FFRAPHP075_C660_9_184.jpg",  legende_image:"Cour de la ferme vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/5_roudil.pdf", histoire: "<b>1887</b>, legs consenti par l'abbé Roudil au département pour la création d'une colonie d'enfants assistés sur un domaine à Ben-Chicao (Algérie), avec ferme-école destinée à l'instruction professionnelle agricole.\n\n<b>1893</b>, les travaux s'achèvent en janvier, permettant la mise en exploitation du domaine.\n\n<b>1910</b>, l'école Roudil réouvre en avril après réorganisation.\n\n<b>1962</b>, fermeture de l'établissement, liée au déclin de la viticulture algérienne." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Saint-Antoine", lat: 48.84923, lng: 2.38273, ouverture: 1795, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FSAT%2FFRAPHP075_SAT_3FI4_0136.jpg",  legende_image:"Entrée principale en 1989.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/117_Saint-Antoine.pdf", histoire: "<b>1795</b>, ouverture sous le nom d'hospice du faubourg Saint-Antoine, puis hospice de l'Humanité du faubourg Saint-Antoine.\n\n<b>1796</b>, renommé hospice de l'Est.\n\n<b>1802</b>, prend le nom d'hôpital Saint-Antoine." , groupe: "AP-HP. Sorbonne Université", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Sainte-Anne", lat: 48.82896, lng: 2.33682, ouverture: 1607, fermeture: 1767, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/118_Sainte-Anne.pdf", histoire: "<b>1607</b>, installation d'une maison de santé chemin de Gentilly, propriété de l'Hôtel-Dieu.\n\n<b>1767</b>, Sainte-Anne redevient une ferme lucrative.\n\n<b>1861</b>, les terrains sont utilisés pour l'édification de l'asile d'aliénés Sainte-Anne, ouvert en 1867.\n\n<b>1872</b>, Sainte-Anne est détachée du domaine de l'AP au profit du ministre de l'Intérieur." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Sainte-Catherine ", lat: 48.85959, lng: 2.34827, ouverture: 1184, fermeture: 23, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1184</b>, ouverture de l'établissement à l'angle de la rue des Lombards et de la rue Saint-Denis, sous le nom de Sainte-Opportune.\n\nVers <b>1220</b>, prend le nom de Sainte-Catherine.\n\n<b>23</b>, démoli lors du percement du boulevard Sébastopol." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Sainte-Eugénie", lat: 48.84892, lng: 2.37585, ouverture: 1854, fermeture: 1901, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/05/Armand-Trousseau.pdf", histoire: "<b>1880</b>, sur proposition de l'administration, l'hôpital est rebaptisé hôpital Trousseau, pour honorer la mémoire d'Armand Trousseau (1801-1867)." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Sainte-Marguerite", lat: 48.84861, lng: 2.37576, ouverture: 1848, fermeture: 24, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/05/Armand-Trousseau.pdf", histoire: "<b>24</b>, l'administration de l'Assistance publique décide de transformer en hôpital pour enfants l'annexe de l'Hôtel-Dieu connue sous le nom d'hôpital Sainte-Marguerite. Le nouvel établissement pédiatrique prend le nom d'hôpital Sainte-Eugénie." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Sainte-Pélagie ", lat: 48.84232, lng: 2.35285, ouverture: 1681, fermeture: 1792, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/120_Sainte-P%C3%A9lagie.pdf", histoire: "<b>1681</b>, fondation à Paris de la maison de Sainte-Pélagie, destinée à accueillir des femmes souhaitant se réformer.\n\n<b>1792</b>, supprimée à la Révolution, transformée en prison.\n\n<b>1793</b>, sert à l'enfermement de prisonniers politiques sous le nom de Prison Sainte-Pélagie.\n\n<b>1895</b>, fermeture définitive." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Sainte-Périne", lat: 48.84486, lng: 2.26685, ouverture: 1807, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F47FI%2FFRAPHP075_47FI_166.jpg",  legende_image:"Entrée de l'hôpital, 1991.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/121_Sainte-Périne.pdf", histoire: "<b>1807</b>, l'institution Notre-Dame de la Paix, implantée rue de Chaillot dans les bâtiments de l'ancien couvent de Sainte-Périne, est intégrée au domaine de l'Assistance publique avec pour mission d'assister les personnes indigentes, anciens fonctionnaires et veuves d'employés.\n\n<b>1860</b>, expropriée, ses pensionnaires sont provisoirement hébergés dans la villa de la Réunion, près de l'avenue de Versailles.\n\n<b>1865</b>, l'établissement s'installe définitivement rue Chardon-Lagache, dans le quartier d'Auteuil, où il devient un hôpital spécialisé en gérontologie." , groupe: "AP-HP. Université Paris-Saclay", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Saint-Esprit-en-Grève", lat: 48.85650, lng: 2.35151, ouverture: 1363, fermeture: 1792, type: "", detruit:"oui",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/122_Saint-Esprit-en-Gr%C3%A8ve.pdf", histoire: "<b>1363</b>, installation dans une maison place de Grève ; lieu de secours à l'enfance.\n\n<b>1679</b>, absorption de l'administration du Saint-Esprit par l'Hôpital Général.\n\n<b>1792</b>, fermeture de l'hospice.\n\nAu <b>XIXe siècle</b>, les bâtiments sont démolis pour être annexés à l'hôtel de ville." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Saint-Gervais ", lat: 48.85590, lng: 2.35323, ouverture: 1171, fermeture: 1795, type: "hopital", detruit:"oui",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/123_Saint-Gervais.pdf", histoire: "<b>1171</b>, l'hôpital Saint-Gervais est fondé par Carin Masson et son fils Harchet, par donation de leur propre maison située sur le parvis de l'église Saint-Gervais. Premier asile de nuit de la capitale, il accueille les vagabonds pour un maximum de trois nuits consécutives.\n\n<b>1300</b>, la desserte de l'établissement est confiée aux religieuses de l'ordre de Saint-Augustin, qui remplacent les frères hospitaliers de Saint-Gervais.\n\nVers <b>1657</b>, l'hôpital quitte le parvis Saint-Gervais pour s'installer rue Vieille-du-Temple." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Saint-Gervais ", lat: 48.85815, lng: 2.35856, ouverture: 1657, fermeture: 1795, type: "hopital", detruit:"oui",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/123_Saint-Gervais.pdf", histoire: "Vers <b>1657</b>, l'hôpital Saint-Gervais, aussi appelé hôpital Sainte-Anastase, s'installe rue Vieille-du-Temple dans l'hôtel d'O, saisi par les religieuses augustines.\n\n<b>1795</b>, la maison hospitalière ferme à la Révolution.\n\n<b>1813</b>, le terrain est racheté par la ville de Paris pour l'ouverture des rues des Rosiers et des Francs-Bourgeois." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Saint-Jacques-aux-Pèlerins", lat: 48.86451, lng: 2.34614, ouverture: 1319, fermeture: 1795, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/124_Saint-Jacques-aux-P%C3%A8lerins.pdf", histoire: "<b>1319</b>, fondation par une confrérie de bourgeois parisiens par une charte de Louis X. Situé rue Saint-Denis, d'abord destiné aux pèlerins puis aux mendiants.\n\nÀ la Révolution, l'hôpital Saint-Jacques ferme. L'édifice sert d'abord de magasin.\n\n<b>1821</b>, l'administration des hôpitaux et hospices civils procède à sa vente par lots." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Saint-Julien-le-Pauvre", lat: 48.85210, lng: 2.34702, ouverture: 1655, fermeture: 1928, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/125_Saint-Julien-le-Pauvre.pdf", histoire: "Église et maisons servant d'hospice pour les pèlerins.\n\n<b>1655</b>, vendues aux administrateurs de l'Hôtel-Dieu qui souhaitent en faire un hôpital pour convalescents (projet abandonné).\n\n<b>1826</b>, rendue au culte après avoir servi de lieu d'entrepôt durant la Révolution, sert de chapelle à l'Hôtel-Dieu." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Saint-Lazare ", lat: 48.87564, lng: 2.35432, ouverture: 1700, fermeture: 1998, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/126_Saint-Lazare.pdf", histoire: "Au <b>XIIe siècle</b>, le site de Saint-Lazare occupe l'emplacement d'une maladrerie destinée au soin des lépreux.\n\nDans la première moitié du <b>XVIIe siècle</b>, l'établissement est confié à Vincent de Paul et à la Congrégation de la Mission.\n\nPendant la Révolution, les bâtiments sont affectés à l'emprisonnement.\n\n<b>1811</b>, la prison de Saint-Lazare est placée sous l'autorité du département de la Seine.\n\n<b>1824</b>, l'ancien édifice est rasé, puis reconstruit en 1834 pour accueillir une infirmerie spéciale.\n\n<b>1955</b>, une partie des lits est cédée à l'AP-HP.\n\n<b>1961</b>, l'ensemble des services est intégré au groupe hospitalier Lariboisière – Fernand-Widal – Saint-Lazare.\n\n<b>1998</b>, le site est restitué à la Ville de Paris." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Saint-Louis", lat: 48.87344, lng: 2.36767, ouverture: 1612, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FCND%2FFRAPHP075_CND_0191_0001.jpg",  legende_image:"Plan du royal et somptueux édifice de l'hospital de St-Louis vers 1681.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/127_Saint-Louis.pdf", histoire: "<b>1612</b>, fondé sur décision de Henri IV, conçu comme un sanitat rattaché à l'Hôtel-Dieu de Paris, destiné à l'accueil et à l'isolement des personnes atteintes de la peste.\n\n<b>1773</b>, reçoit une affectation permanente sous le nom de Saint-Louis.\n\nAu cours du <b>XVIIIe siècle</b>, l'établissement s'oriente vers le traitement des maladies syphilitiques et des affections cutanées.\n\nSous la Révolution, provisoirement rebaptisé hospice du Nord." , groupe: "AP-HP. Nord-Université Paris Cité", specialites: "Hématologie, dermatologie, oncologie, greffes de moelle, maladies infectieuses", decouverte_1: "Système HLA (complexe majeur d'histocompatibilité) | 1958-1965 | Pr Jean Dausset (Prix Nobel de médecine 1980)", decouverte_2: "Première greffe de moelle osseuse à partir de cellules de sang de cordon ombilical | 1988 | Pr Eliane Gluckman", url_archives: "https://aphp-diffusion-prod.ligeo-archives.com/archive/resultats/population/lineaire/n:91?arcfacfull=RECH_Libre&type=population&RECH_Collectivite_Libel=Saint-Louis+%28h%C3%B4pital%29%7C&RECH_Collectivite_Md5=bb26f435be40c2977ac55f4d7ff1dc56%7C", url_musee: "https://www.musee-collections.aphp.fr/app/photopro.sk/aphp/doclist?prms_treelist=rootNode%3D2%26openNodes%3D%253A3%253A3263%253A381%26caller_id%3Ddoclist%26search%3Dmcpid%2B%253A%2B%25223270%2522&psearch=mcpid%20%3A%20%221102%22&mcpid=1102" },
{ nom: "Saint-Merry ", lat: 48.85970, lng: 2.35181, ouverture: 1783, fermeture: 1873, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/128_Saint-Merry.pdf", histoire: "<b>1783</b>, ouverture de l'hospice Saint-Merry, installé dans une maison du cloître Saint-Merry, près de la rue Brisemiche.\n\n<b>1873</b>, fermeture de l'hospice." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Saint-Vincent-de-Paul", lat: 48.83699, lng:  2.33444, ouverture: 1814, fermeture: 2011, type: "", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F50FI%2FFRAPHP075_50FI_0041.jpg",  legende_image:"L'entrée en 1991.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/130_Saint-Vincent-de-Paul.pdf", histoire: "<b>1814</b>, l'Oratoire devient le nouvel hospice des Enfants Trouvés.\n\n<b>1838</b>, prend le nom d'hospice des Enfants Trouvés et Orphelins.\n\n<b>29</b>, renommé hospice des Enfants-Assistés.\n\n<b>1942</b>, devient l'hôpital-hospice Saint-Vincent-de-Paul.\n\n<b>1971</b>, rejoint le groupe hospitalier Saint-Vincent-de-Paul – La Roche-Guyon.\n\n<b>1999</b>, le groupe fusionne avec le groupe hospitalier Cochin.\n\n<b>2011</b>, fermeture définitive." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Salpêtrière (Hospice de la)", lat: 48.83891, lng:  2.36727, ouverture: 1657, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F76FI%2FFRAPHP075_76FI_068.jpg",  legende_image:"L'Hôpital de la Salpêtrière, XVIIIe s.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/131_Salpêtrière.pdf", histoire: "<b>1657</b>, installée dans le quartier Saint-Victor, lieu d'assistance et refuge pour indigentes et infirmes, en particulier femmes aliénées, hystériques, paralytiques et incurables.\n\n<b>1794</b>, apparition des services de neurologie ; l'hôpital se spécialise dans le domaine neuropsychiatrique.\n\n<b>1823</b>, renommé hospice de la Vieillesse-Femmes.\n\n<b>1885</b>, renommé hospice de la Salpêtrière.\n\n<b>1964</b>, fusion avec l'hôpital de la Pitié." , groupe: "AP-HP. Sorbonne Université", specialites: "Neurologie, neuropsychiatrie, psychiatrie (vocation historique femmes)", decouverte_1: "Description de la sclérose en plaques | 1868 | Pr Jean-Martin Charcot & Alfred Vulpian", decouverte_2: "Libération des aliénés de leurs chaînes (réforme psychiatrique) | 1794 | Dr Philippe Pinel", url_archives: "https://aphp-diffusion-prod.ligeo-archives.com/archive/resultats/population/lineaire/n:91?arcfacfull=RECH_Libre&RECH_Collectivite_Libel=Salp%C3%AAtri%C3%A8re+%28h%C3%B4pital+de+la%29%7CPiti%C3%A9-Salp%C3%AAtri%C3%A8re+%28h%C3%B4pital%29%7C&RECH_Collectivite_Md5=3aed04a160b3b0cd584b3fd09fe5da7a%7Cf007940c14f4a8c1afc27b4c97bd3d74%7C&type=population", url_musee: "https://www.musee-collections.aphp.fr/app/photopro.sk/aphp/doclist?prms_treelist=rootNode%3D2%26openNodes%3D%253A3%253A3263%253A381%26caller_id%3Ddoclist%26search%3Dmcpid%2B%253A%2B%25223270%2522&psearch=mcpid%20%3A%20%22193%22&mcpid=193" },
{ nom: "San Salvadour", lat: 43.08465, lng: 6.11162, ouverture: 1905, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FSSL%2FFRAPHP075_SSL_3FI4_067.jpg",  legende_image:"Entrée de l'hôpital en 1993.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/06/San-Salvadour.pdf", histoire: "<b>1905</b>, le château est transformé en sanatorium pour enfants.\n\n<b>1922</b>, acquisition de la propriété par la ville de Paris.\n\n<b>1924</b>, remise à l'Assistance publique.\n\n<b>1960</b>, conversion en hôpital destiné aux soins des jeunes polyhandicapés." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },

{ nom: "Sophie-Déséglise", lat: 48.89410, lng: 2.34971, ouverture: 1910, fermeture: 1969, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/01/Sophie-Deseglise.pdf", histoire: "La fondation Sophie-Déséglise, installée 34 rue du Simplon dans le 18e arrondissement, doit sa création aux bienfaits de Madame Boivin née Déséglise.\n\n<b>1910</b>, acte d'acceptation du legs par l'administration.\n\n<b>1924</b>, ouverture de l'hospice.\n\n<b>1944</b>, la fondation est partiellement détruite par le bombardement aérien du 21 avril." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Tarnier", lat: 48.84184, lng: 2.33554, ouverture: 1774, fermeture: null, type: "", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F3%2FFRAPHP075_C660_3_265.jpg",  legende_image:"L'entrée vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/06/Tarnier.pdf", histoire: "<b>1796</b>, installation dans le cloître d'un ancien couvent ; prend le nom d'hospice de l'École de Médecine.\n\nSous l'Empire, devient l'hospice clinique de la Faculté de Médecine.\n\n<b>1834</b>, l'hôpital des cliniques ouvre.\n\n<b>1837</b>, transféré à l'Hôtel-Dieu.\n\n<b>1897</b>, la nouvelle structure prend le nom de Clinique Tarnier." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Tenon", lat: 48.86594, lng: 2.40098, ouverture: 1878, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F53FI%2FFRAPHP075_53FI_476.jpg",  legende_image:"Entrée principale en 1989.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/06/Tenon.pdf", histoire: "<b>1878</b>, ouverture dans le 20e arrondissement, d'abord sous le nom d'hôpital de Ménilmontant.\n\n<b>1879</b>, renommé hôpital Tenon en hommage au chirurgien Jacques Tenon." , groupe: "AP-HP. Sorbonne Université", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Tisserand", lat: 48.83107, lng: 2.31837, ouverture: 1878, fermeture: 1969, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/01/Tisserand.pdf", histoire: "<b>1878</b>, ouverture de la fondation Tisserand, maison de retraite bâtie rue d'Alésia dans le 14e arrondissement, gérée par le bureau de bienfaisance de l'arrondissement.\n\n<b>1969</b>, rattachée à l'administration municipale." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Tournelles", lat: 48.85710, lng: 2.36667, ouverture: 1880, fermeture: 1885, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1880</b>, ouverture de l'hôpital des Tournelles.\n\n<b>1885</b>, renommé hôpital Andral.\n\n<b>1906</b>, l'arrêté préfectoral du 1er mai autorise la désaffectation de l'hôpital Andral. La démolition de l'édifice s'opère courant 1907." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },

{ nom: "Vallée ", lat: 48.81040, lng: 2.34785, ouverture: 1890, fermeture: 2026, type: "", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F6%2FFRAPHP075_C660_6_087.jpg",  legende_image:"Vue de la fondation Vallée vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/06/Vallee.pdf", histoire: "<b>1847</b>, fondation à Gentilly par Hippolyte Vallée d'un établissement constituant à la fois hospice et école pour l'accueil et l'instruction d'enfants, relevant administrativement de l'hôpital de Bicêtre.\n\nLes bâtiments sont aujourd'hui occupés par le centre de neuropsychiatrie infantile de Gentilly.\n\n<b>2026</b>, fermeture en urgence à compter du 27 février par l'Agence régionale de santé." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },

{ nom: "Vaugirard-Gabriel-Pallez", lat: 48.83465, lng:  2.29401, ouverture: 1921, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F56FI%2FFRAPHP075_56FI_093.jpg",  legende_image:"Entrée de l'hôpital en 1992.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/06/Vaugirard-Gabriel-Pallez.pdf", histoire: "<b>1920</b>, la Faculté de médecine de Paris acquiert un domaine dans le 15e arrondissement.\n\n<b>1921</b>, mis à la disposition de l'Assistance publique par convention : devient la clinique chirurgicale Vaugirard, puis hôpital de Vaugirard.\n\n<b>1966</b>, rattaché au groupe hospitalier Necker-Enfants-Malades-Laennec.\n\n<b>1986</b>, rattaché au groupe hospitalier Boucicaut-Vaugirard, renonce aux interventions chirurgicales.\n\n<b>1999</b>, prend l'appellation d'hôpital Vaugirard-Gabriel-Pallez." , groupe: "AP-HP. Centre-Université Paris Cité", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },

        const filtre = el.dataset.filtre;
        // Toggle : si déjà actif on réinitialise, sinon on active
        if (filtreStatut === filtre) {
          filtreStatut = null;
          el.style.background = "";

        } else {
          filtreStatut = filtre;

        }
updateMap(

  parseInt(document.getElementById("yearSlider").value)

      });

};

function createMarker(e, couleur) {

// Choix de l’icône (ordre IMPORTANT)
let icon = iconBleu; // ouvert par défaut

if ((e.detruit || "").toLowerCase() === "oui" && couleur === "red") {

}
// musée

// fermé
else if (couleur === "red") {

  const marker = L.marker([e.lat, e.lng], {

      direction: "top",

}

const input = document.getElementById("searchInput");
const resultsBox = document.getElementById("searchResults");

input.addEventListener("input", () => {

    resultsBox.style.display = "none";

  }

  const matches = searchIndex
    .filter(e => e.nom.toLowerCase().includes(q))
    .slice(0, 10); // limite à 10 résultats maximum

  renderResults(matches); // affiche la liste
});
function renderResults(list) {
  resultsBox.innerHTML = "";

  if (!list.length) {
    resultsBox.style.display = "none";
    return;
  }

  list.forEach(e => {
    const div = document.createElement("div");
    div.textContent = e.nom;
    div.className = "search-result";

    div.addEventListener("click", () => selectEtablissement(e));

    resultsBox.appendChild(div);
  });

  resultsBox.style.display = "block";
}

/* =========================
   Filtre statut (légende cliquable)
   ========================= */
let filtreStatut = null; // null = tout afficher | "actif" | "ferme" | "detruit"

/* =========================
   Fonction de filtrage
   ========================= */

function updateMap(yearBegin, year) {
  if (yearBegin === undefined) yearBegin = 829;
  markersLayer.clearLayers();

  // Récupère la valeur du filtre type sélectionné
  const typeSelectionne = document.getElementById("typeFilter")
    ? document.getElementById("typeFilter").value
    : "";

  for (let i = 0; i < etablissements.length; i++) {
    const e = etablissements[i];
    const type = (e.type || "").toLowerCase().trim();
    const ouverture = Number(e.ouverture);
    const fermeture = e.fermeture !== null && e.fermeture !== ""
      ? Number(e.fermeture)
      : Infinity;

    // Filtre par statut (légende cliquable)
    if (filtreStatut !== null) {
      const estDetruit = (e.detruit || "").toLowerCase() === "oui";
      const ouvertureNum = Number(e.ouverture);
      const fermetureNum = e.fermeture !== null && e.fermeture !== "" ? Number(e.fermeture) : Infinity;
      const estFerme = year >= fermetureNum;
      const estActif = !estFerme && !estDetruit;
      if (filtreStatut === "actif"   && !estActif)   continue;
      if (filtreStatut === "ferme"   && (!estFerme || estDetruit)) continue;
      if (filtreStatut === "detruit" && !estDetruit) continue;
    }

    // Filtre par type (comparaison normalisée : sans accent, minuscules)
    if (typeSelectionne !== "") {
      const typeNorm = type
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .toLowerCase().trim();
const typesConnus = ["hopital", "fondation", "ecole", "musee scientifique", "orphelinat", "retraite", "sanatorium", "services generaux"];
      if (typeSelectionne === "autre") {
        if (typesConnus.includes(typeNorm)) continue;
      } else {
        if (typeNorm !== typeSelectionne) continue;
      }
    }

    // Déterminer si l'établissement doit être visible
const ouvert = ouverture <= year && (e.fermeture === null || e.fermeture === "" || Number(e.fermeture) >= yearBegin);
    const ferme = year >= fermeture;

    if (ouvert) {
      let couleur = "blue"; // par défaut : actif

      if (ferme) {
        couleur = "red";
      }

      if (e.type === "musée") {
        couleur = COULEUR_MUSEE;
      }

      const marker = createMarker(e, couleur);
      marker.addTo(markersLayer);
      markersIndex[normalize(e.nom)] = marker;
      markersIndex[e.nom.trim().toLowerCase()] = marker;
    }
  }

    // Mise à jour de la notice des ouvertures
  document.getElementById("notice-year").textContent = year;

  const ouvertures = etablissements.filter(e => e.ouverture === year);
  const noticeContent = document.getElementById("notice-content");

  if (ouvertures.length === 0) {
    noticeContent.textContent = "Aucune ouverture";
  } else {
    noticeContent.innerHTML = ouvertures
      .map(e => `• <strong>${e.nom}</strong>`)
      .join("<br>");
  }
}


/* =========================
   Timeline
   ========================= */

const slider = document.getElementById("yearSlider");
const label = document.getElementById("yearLabel");
const sliderStart = document.getElementById("yearStart");
const labelStart = document.getElementById("labelStart");

// Écouteur filtre type
document.getElementById("typeFilter").addEventListener("change", () => {
  updateMap(parseInt(sliderStart.value), parseInt(slider.value));
});

// Curseur de fin → met à jour le champ texte
slider.addEventListener("input", () => {
  let yearEnd = parseInt(slider.value);
  let yearBegin = parseInt(sliderStart.value);
  if (yearEnd < yearBegin) { yearEnd = yearBegin; slider.value = yearEnd; }
  label.value = yearEnd;
  updateMap(yearBegin, yearEnd);
});

// Champ texte de fin → met à jour le curseur
label.addEventListener("change", () => {
  let yearEnd = Math.min(2026, Math.max(829, parseInt(label.value) || 2026));
  let yearBegin = parseInt(sliderStart.value);
  if (yearEnd < yearBegin) { yearEnd = yearBegin; }
  label.value = yearEnd;
  slider.value = yearEnd;
  updateMap(yearBegin, yearEnd);
});

// Curseur de début → met à jour le champ texte
sliderStart.addEventListener("input", () => {
  let yearBegin = parseInt(sliderStart.value);
  let yearEnd = parseInt(slider.value);
  if (yearBegin > yearEnd) { yearBegin = yearEnd; sliderStart.value = yearBegin; }
  labelStart.value = yearBegin;
  updateMap(yearBegin, yearEnd);
});

// Champ texte de début → met à jour le curseur
labelStart.addEventListener("change", () => {
  let yearBegin = Math.min(2026, Math.max(829, parseInt(labelStart.value) || 829));
  let yearEnd = parseInt(slider.value);
  if (yearBegin > yearEnd) { yearBegin = yearEnd; }
  labelStart.value = yearBegin;
  sliderStart.value = yearBegin;
  updateMap(yearBegin, yearEnd);
});

/* Initialisation */
updateMap(parseInt(sliderStart.value), parseInt(slider.value));
const searchInput = document.getElementById("searchInput");
const searchResults = document.getElementById("searchResults");

searchInput.addEventListener("input", () => {
  const query = searchInput.value.trim().toLowerCase();
  searchResults.innerHTML = "";

  if (query.length < 2) {
    searchResults.style.display = "none";
    return;
  }

  const matches = etablissements.filter(e =>
    e.nom.toLowerCase().includes(query)
  );

  if (matches.length === 0) {
    searchResults.style.display = "none";
    return;
  }

  matches.forEach(e => {
    const item = document.createElement("div");
    item.textContent = e.nom;
    item.style.padding = "6px";
    item.style.cursor = "pointer";

    item.addEventListener("click", () => {
      const marker = markersIndex[e.nom.trim().toLowerCase()];
      if (!marker) return;

      map.setView(marker.getLatLng(), 15);
      marker.openPopup();

      searchResults.style.display = "none";
      searchInput.value = e.nom;
    });

    item.addEventListener("mouseenter", () => item.style.background = "#eee");
    item.addEventListener("mouseleave", () => item.style.background = "white");

    searchResults.appendChild(item);
  });

  const rect = searchInput.getBoundingClientRect();
  searchResults.style.left = rect.left + "px";
  searchResults.style.top = rect.bottom + "px";
  searchResults.style.width = rect.width + "px";
  searchResults.style.display = "block";
});
function selectEtablissement(e) {
  const marker = markersIndex[normalize(e.nom)];
  if (!marker) return;

  map.setView(marker.getLatLng(), 14, { animate: true });
  marker.openPopup();

  resultsBox.style.display = "none";
}
function openImageOverlay(src, alt) {
  const overlay = document.getElementById("imageOverlay");
  const img = document.getElementById("overlayImage");

  img.src = src;
  img.alt = alt;

  overlay.style.display = "flex";
}

function closeImageOverlay() {
  document.getElementById("imageOverlay").style.display = "none";
}
