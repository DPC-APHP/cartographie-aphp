{ nom: "Gréban de Pontourny (fondation)", lat: 47.20683, lng: 0.19981, ouverture: 1903, fermeture: 1962, type: "fondation", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F8%2FFRAPHP075_C660_8_170.jpg",  legende_image:"La Façade vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/70_Gr%C3%A9ban-de-Pontourny.pdf", histoire: "<b>1895</b> : par testament olographe du 26 octobre une donation, Marie-Alphonse Gréban de Pontourny fait une donation en vue de la création d'un asile Saint-Joseph en Indre-et-Loire.\n\n<b>1903</b> : ouverture, sur le domaine de Pontourny, d'un établissement dédié aux soins des femmes convalescentes et anémiées.\n\n<b>1962</b> : rattachement de la fondation Gréban de Pontourny au service d'aide sociale à l'enfance, en application du décret du 5 décembre 1961." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Hartmann (orphelinat)", lat: 48.62935 , lng:  2.09236, ouverture: 1892, fermeture: 1962, type: "orphelinat", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F8%2FFRAPHP075_C660_8_104.jpg",  legende_image:"Vue d'ensemble vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/72_Hartmann.pdf", histoire: "<b>1887</b> : la Ville de Paris accepte le legs d'Albert Hartmann pour la création d'un orphelinat dénommé fondation Hartmann.\n\n<b>1892</b> : ouverture de l'établissement à Forges-les-Bains, sur les terrains de la fondation Riboutté-Vitallis ; la gestion des deux maisons est placée sous l'autorité du directeur de l'hôpital de Forges.\n\n<b>1935</b> : l'établissement ferme provisoirement en raison de difficultés financières." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Hendaye ", lat: 43.37596, lng: -1.75985, ouverture: 1899, fermeture: null, type: "sanatorium", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F5%2FFRAPHP075_C660_5_144.jpg",  legende_image:"Vues extérieures. - L'entrée de l'hôpital vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/73_Hendaye.pdf", histoire: "<b>1899</b> : ouverture d'un sanatorium sous le nom d'« Asile pour enfants de la ville de Paris », destiné à pallier le manque de lits à Berck-sur-Mer ; l'établissement accueille ete soigne des adolescents atteints d'anémie.\n\n<b>1950</b> : l'établissement, renommé « établissement héliomarin de la Ville de Paris », se consacre aux soins des jeunes convalescents et des jeunes polyhandicapés.\n\n<b>1998</b> : devenu « hôpital marin » ;  il compte 320 lits, contre 552 en 1960." , groupe: "", specialites: "Polyhandicap, rééducation, réadaptation", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Henri-Mondor", lat: 48.79804, lng: 2.45182, ouverture: 1969, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F31FI%2FFRAPHP075_31FI_194.jpg",  legende_image:"Entrée de l'hôpital en 1992.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/74_Henri-Mondor.pdf", histoire: "<b>1966-1969</b> : construction du CHU de Créteil, dont les bâtiments sont conçus par les architectes Lafon et Riedberger.\n\n<b>1968</b> : l'établissement reçoit le nom d'hôpital Henri-Mondor, en hommage au chirurgien des hôpitaux et professeur de pathologie et clinique chirurgicale.\n\n<b>1970</b> : fusion avec l'hôpital Albert-Chenevier pour former le groupe hospitalier Henri-Mondor – Albert-Chenevier.\n\n<b>1990</b> : l'hôpital Henri-Mondor retrouve son autonomie." , groupe: "AP-HP. Hôpitaux Universitaires Henri-Mondor", specialites: "Cardiologie, chirurgie vasculaire, neurochirurgie, urologie", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Hérold", lat: 48.88250, lng: 2.39394, ouverture: 1900, fermeture: 1988, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F4%2FFRAPHP075_C660_4_184.jpg",  legende_image:"La cour d'honneur vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/75_H%C3%A9rold.pdf", histoire: "<b>1900</b> : installation d'un établissement d'hospitalisation infantile place du Danube (19e arrondissement), dans des baraquements édifiés en 1892 ; il prend le dénomination d'hôpital Hérold, en hommage à Ferdinand Hérold, avocat et préfet de la Seine de 1879 à 1882.\n\n<b>1902</b> : démolition des barquement provisoires et construction de nouveaux pavillons.\n\n<b>1988</b> : fermeture de l'établissement et transfert de ses services vers le nouvel hôpital d'enfants Robert-Debré." , groupe: "", specialites: "Pédiatrie", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Hôpital des Cliniques", lat: 48.85055 , lng: 2.34136, ouverture: 1774, fermeture: 1878, type: "maternite", detruit:"oui",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F3%2FFRAPHP075_C660_3_265.jpg",  legende_image:"L'entrée vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/06/Tarnier.pdf", histoire: "<b>1796</b> : installation dans le cloître de l'ancien couvent des Cordeliers ; l'établissement prend le nom d'hospice de l'École de Médecine.\n\n<b>1823</b> : création d'une clinique obstétricale au sein de l'établissement. D'abord rattaché à la faculté de médecine, il est placé en 1828 sous la gestion du Conseil général des hôpitaux et hospices civils de Paris.\n\n<b>1832</b> : démolition puis reconstruction de l’édifice au même emplacement par l’architecte de Gisors.\n\n<b>1834</b> : ouverture de l'hôpital des Cliniques.\n\n<b>1837</b> : la clinique médicale est transférée à l’Hôtel-Dieu, et le service de chirurgie à l’hôpital Necker, laissant la clinique obstétricale seule sur le site.\n\n<b>1878</b> : démolition de l'établissement en raison de la vétusté des bâtiments.\n\n<b>1881</b> : inauguration de la Clinique d'accouchement, bâtie par l'architecte Ginain sur les terrains du Luxembourg, rue d’Assas.\n\n<b>1897</b> : la structure prend le nom de Clinique Tarnier, en hommage au professeur Stéphane Tarnier (1828-1897).\n\n<b>1960</b> : reconverti en service de dermatologie ; la clinique dermatologique Tarnier continue toutefois à pratiquer des accouchements jusqu’en 1966." , groupe: "", specialites: "Maternité, dermatologie", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Hôpital franco-musulman", lat: 48.9097, lng:  2.5009, ouverture: 1935, fermeture: 1979, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1931-1935</b> : construction de l'hôpital franco-musulman à Bobigny par les architectes Mantout et Azéma. Établissement relevant de la préfecture de la Seine, il est destiné à l'hospitalisation des patients musulmans originaires de l'Afrique du Nord vivant à Paris et en banlieue.\n\n<b>1935</b> : inauguration de l'établissement en mars.\n\n<b>1961</b> : rattachement à l'Assistance publique par décret du 11 octobre. L'hôpital perd sa vocation initiale pour devenir un établissement de circonscription.\n\n<b>1979</b> : l'administration lui attribue le nom d'hôpital Avicenne, en mémoire d'Abou Ali Al Husayn Ibn Sina dit Avicenne (980-1037), théologien, anatomiste et physicien originaire du Turkestan." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Hospice de l’Epée-de-bois", lat: 48.84155, lng: 2.35133, ouverture: 1862, fermeture: 1943, type: "", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FSerie_Fosseyeux%2F834FOSS%2F834FOSS_091%2FFRAPHP075_834FOSS91_1.jpg",  legende_image:"Dispensaire de la rue de l'Épée-de-Bois, s.d.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/03/Hospice-5e.pdf", histoire: "<b>1850</b> : création de la maison de secours Sœur-Rosalie par Jeanne-Marie Rendu, dite Soeur Rosalie, initialement installée rue Pascal.\n\n<b>1856</b> : transfert de l'établissement rue Gracieuse.\n\n<b>1862</b> : installation définitive rue de l'Épée-de-Bois.\n\n<b>1903</b> : évacuation de l'ancienne maison de secours en vue de sa reconstruction par l'architecte Renaud.\n\n<b>1905</b> : inauguration de l'hospice du 5e arrondissement, rue de l'Épée-de-Bois, offrant soins et secours aux nécessiteux de l'arrondissement ; ouverture, dans un second bâtiment, de l’hospice composé de 21 chambres réservées aux femmes âgées domiciliées dans l’arrondissement." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Hospice des Sevrés", lat: 48.76368, lng: 2.39855, ouverture: 1884, fermeture: 1962, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/76_Hospice-des-Sevr%C3%A9s.pdf", histoire: "<b>1883</b> : installation de la maison des Sevrés à Thiais, annexe de l'hospice des Enfants-Assistés dans une ancienne mégisserie acquise par l'administration hospitalière la même année.\n\n<b>1884</b> : ouverture de l'établissement qui accueille des enfants en bonne santé ou atteints d'affections légères.\n" , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Hôtel-Dieu", lat: 48.85397, lng:  2.34821, ouverture: 1877, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FD%2FD807%2FFRAPHP075_D_807_0024.jpg",  legende_image:"Façade et cour intérieure Fin XIXe siècle. ", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2018/11/78_Hotel-Dieu_v1.pdf", histoire: "<b>1861</b> : décision de démolir l'ancien Hôtel-Dieu.\n\n<b>1867-1878</b> : construction du nouvel établissement sous la conduite de l'architecte Diet, au nord du parvis Notre-Dame.\n\n<b>1877</b> : mis en service le 30 juillet du nouvel Hôtel-Dieu, inauguration le 11 août par Mac-Mahon. \n\n<b>1878</b> : démolition de l'ancien Hôtel-Dieu, à la suite de l'ouverture du nouvel établissement." , groupe: "AP-HP. Centre-Université Paris Cité", specialites: "Endocrinologie, ophtalmologie, urgences médicales", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Hôtel-Dieu (ancien)", lat: 48.85323, lng: 2.34771, ouverture: 829, fermeture: 1878, type: "hopital", detruit:"oui",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FD%2FD807%2FFRAPHP075_D_807_0007.jpg",  legende_image:"Fin XIXe siècle.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2018/11/78_Hotel-Dieu_v1.pdf", histoire: "<b>829</b> : première mention attestée de l'existence de l'Hôtel-Dieu. Jusqu'au début du XVIe siècle, l'établissement, situé sur l'île de la Cité, relève du clergé, notamment des chanoines de Notre-Dame.\n\n<b>début XVIIe siècle</b> : agrandissements sous la direction des architectes CLaude Vellefaux et Christophe Camard.\n\n<b>1718</b> : l'Hôtel-Dieu accueille près de 2 500 patients, pris en charge par des religieux et religieuses.\n\n<b>1772</b> : un incendie détruit la destruction de la quasi-totalité des bâtiments de l'île de la Cité ; les administrateurs envisagent une fermeture et une reconstruction sur un autre site.\n\n<b>1781</b> : abandon du projet de transfert ; lancement de travaux de restauration et de reconstruction sur les fondations existantes.\n\n<b>1793</b> : sous la Révolution, l'hôpital est rebaptisé Grand Hospice d'Humanité.\n\n<b>1878</b> : démolition de l'ancien Hôtel-Dieu, après la mise en service du nouvel établissement en 1877." , groupe: "", specialites: "Obstétrique", decouverte_1: "Office des accouchées, première maternité de Paris| 1378", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Incurables", lat: 48.84954, lng: 2.32192, ouverture: 1637, fermeture: 1869, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/38_Charles-Foix.pdf", histoire: "<b>1634-1639</b> : construction de l'hôpital des Incurables, rue de Sèvres à Paris, grâce aux dons du cardinal François de La Rochefoucauld, de l'abbé François Joulet de Châtillon et de Marguerite Rouillé.\n\n<b>1637</b> : officialisation par lettres patentes de Louis XIII ; l'établissement accueille ses premiers malades la même année.\n\n<b>1801</b> : transfert des patients hommes dans l'ancien couvent des Récollets, rue du Faubourg-Saint-Martin ; l'établissement de la rue de Sèvres, désormais exclusivement féminin, devient l’hôpital des Incurables-Femmes.\n\n<b>1869</b> : les patientes quittent à leur tour la rue de Sèvre pour le nouvel hospices des Incurables construit à Ivry-sur-Seine. \n\n<b>1874</b> : après une période de vacance, les bâtiments sont repris par l'administration de l'Assistance publique, qui y installe l'hôpital Laennec." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Incurables-Hommes (hospice)", lat: 48.87547, lng: 2.36029, ouverture: 1801, fermeture: 1869, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC661%2F2%2FFRAPHP075_C661_2_007.jpg",  legende_image:"Plan de l'hospice en 1807.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/38_Charles-Foix.pdf", histoire: "<b>1801</b> : transformation de l'ancien couvent des Récollets, acquis par l'administration en 1794, en maison de santé pour infirmes et vieillards, dite hospice des Vieillards ; le transfert des patients auparavant soignés rue de Sèvres lui vaut l'appellation d’Incurables-Hommes.\n\n<b>1869</b> : regroupement des malades dans le nouvel hospice des Incurables construit à Ivry-sur-Seine par Théodore Labrouste." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Jean-Rostand", lat: 48.81219, lng: 2.37845, ouverture: 1978, fermeture: 2009, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/06/Jean-Rostand.pdf", histoire: "<b>1974</b> : construction du centre hospitalier privé d'Ivry où sont isntallés des services de gynécologie-obstétrique, de chirurgie et de médecine générale.\n\n<b>1976</b> : fermeture de l'établissement, placé en luiquidation judiciaire.\n\n<b>1978</b> : reprise par l'Assistance publique, qui y crée l'hôpital Jean-Rostand, en hommage au biologiste du même nom ; sa direction est confiée à celle de l'hôpital Charles-Foix à Ivry, rattachant l'établissement au groupe hospitalier Charles-Foix - Jean-Rostand. \n\n<b>2009</b> : fermeture définitive de l'établissement." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Jean-Verdier", lat: 48.90957, lng: 2.48790, ouverture: 1920, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F36FI%2FFRAPHP075_36FI_033.jpg",  legende_image:"L'hôpital dans les années 1970.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/80_Jean-Verdier.pdf", histoire: "<b>1970</b>: ouverture de l'hôpital de Bondy (Seine-Saint-Denis), conçu par les architectes  Colboc, Philippe et Bigot.\n\n<b>1975</b> : l'établissement est rebaptisé hôpital Jean-Verdier, en hommage au préfet de Paris Jean Verdier." , groupe: "AP-HP. Hôpitaux Universitaires Paris Seine-Saint-Denis", specialites: "Chirurgie, maternité, oncologie, urgences", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Joffre", lat: 48.66597, lng: 2.42872, ouverture: 1931, fermeture: 2018, type: "sanatorium", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F76FI%2FFRAPHP075_76FI_018.jpg",  legende_image:"Sanatorium Joffre (Champrosay). Vue aérienne. Vers 1935.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/06/Joffre.pdf", histoire: "<b>1931</b> : ouverture  sur la commune de Draveil (Essonne), du sanatorium de Champrosay, destiné aux malades tuberculeux parisiens et de la banlieue ; construit sur le modèle germano-suisse, il se compose de quatre pavillons. \n\n<b>1932</b> : l'établissement prend le nom de sanatorium Joffre, en mémoire du maréchal de France Joseph Joffre (1852-1931).\n\n<b>1960</b> : reconversion du sanatorium, jusque-là dédié au soin de la tuberculose, en établissement de long et moyen séjour.\n\n<b>1967</b> : mise en place d’une direction commune avec l’hôpital Dupuytren ; cette organisation aboutit à la création du groupe hospitalier Joffre-Dupuytren en 2000.\n\n<b>2018</b> : fermeture de l'établissement." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Julie-Siegfried (hospice)", lat: 48.83151, lng: 2.31797, ouverture: 1932, fermeture: 1972, type: "retraite", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1932</b> : ouverture de l'asile Julie-Siegfried, rue de Gergovie (14e arrondissement de Paris), destiné à une trentaine de femmes âgées et isolées ; il occupe une propriété louée depuis 1894 par l'Assistance publique à « l’œuvre de la Chaussée du Maine ».\n\n<b>1972</b> : rattachement de la maison de retraite Julie-Siegfried au Bureau d'aide sociale de Paris." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "La Bassine ", lat: 43.68931, lng: 2.61139, ouverture: 1946, fermeture: 1955, type: "sanatorium", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/03/Bassine.pdf", histoire: "<b>1946</b> : acquisition par l'Assistance publique d'une propriété de vingt-neuf hectares, dite préventorium du col de La Bassine (Tarn), destinée au repos de son personnel masculin convalescent.\n\n<b>1955</b> : revente de la propriété, restée sans mise en service." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "La Charité", lat: 48.85571, lng: 2.33139, ouverture: 1601, fermeture: 1935, type: "hopital", detruit:"oui",  images:"",  legende_image:"", url:"", histoire: "<b>1601</b> : fondation de l'hôpital par les Frères de Saint-Jean-de-Dieu, à l'initiative de Marie de Médicis. \n\n<b>1608</b> : après une installation provisoire près du port de Malaquais, l'établissement est définitivement installé sur un terrain occupé par l'hôtel de Sansac ; il ouvre sous le nom de Saint-Jean-Baptiste de la Charité. \n\n<b>1781</b> : ouverture aux patientes femmes de l'établissement, jusque-là réservé aux hommes ne souffrant pas d'affections incurables ou vénériennes.\n\n<b>1791</b> : agrandissement des bâtiments sous la direction de l'architecte Antoine. \n\n<b>1841-1845</b> : nouvelle campagne de travaux visant à augmenter la capacité d'accueil ; l'établissement passe de 235 lits en 1810 à 486 lits en 1850. \n\n<b>1935</b> : fermeture définitive de l'hôpital ; sa\ndémolition, presque totale, s'achève en 1937 lors de l'édification de la nouvelle École pratique de médecine de la Faculté de Paris." , groupe: "", specialites: "Obstétrique", decouverte_1: "Introduction de la mensuration de la ceinture pelvienne (méthode dite du compas de Baudelocque) | 1781 | Dr Jean Louis Baudelocque", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "La Collégiale", lat: 48.83889, lng: 2.35235, ouverture: 1986, fermeture: null, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/46_Collégiale.pdf", histoire: "<b>1977</b> : décision de créer l'hôpital La Collégiale, dans le cadre d'une politique d'augmentation des capacités de moyen et long séjour à Paris.\n\n<b>1980</b> : lancement d'une consultation architecturale.\n\n<b>1984-1986</b> : réalisation des travaux sous la direction de l'architecte Michel Kalisz, sur un terrain situé rue du Fer-à-Moulin (5e arrondissement) ; accueil des premiers patients dès 1986." , groupe: "AP-HP. Centre-Université Paris Cité", specialites: "Gériatrie, réadaptation", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "La Nouvelle-Pitié", lat: 48.83635, lng:  2.36243, ouverture: 1911, fermeture: 1964, type: "hopital", detruit:"",  images:"https://www.musee-collections.aphp.fr/scripts/atlasgate.dll/aphpv2db/wa_zoom?docid=99752&ex=&psite=APHP",  legende_image:"Boulevard de l'hôpital - Avenue centrale", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/107_Pitié.pdf", histoire: "<b>1904</b> : décision de démolir l'hôpital de la Pitié, situé rue Lacépède, et de le reconstruire sur des terrains vacants de la Salpêtrière.\n\n<b>1905</b> : lancement des travaux de la nouvelle Pitié sous la direction de l'architecte Julien Rochet.\n\n<b>1911</b> : achèvement des travaux. La Nouvelle-Pitié, boulevard de l'Hôpital (13e arrondissement), accueille ses premiers patients le 29 juin et est inaugurée le 13 mars en présence de Raymond Poincaré. \n\n<b>1964</b> : fusion des hôpitaux mitoyens la Pitié et la Salpêtrière pour former le groupe hospitalier la Pitié– la Salpêtrière, devenu Pitié-Salpêtrière. " , groupe: "AP-HP. Sorbonne Université", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "La Reconnaissance (hospice)", lat: 48.83895, lng: 2.16881, ouverture: 1833, fermeture: 1946, type: "retraite", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F45FI%2FFRAPHP075_45FI_126.jpg",  legende_image:"Arcades dans les années 1960.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/110_Reconnaissance.pdf", histoire: "<b>1828</b> : par testament du 16 décembre, Michel Brézin lègue ses fonds au Conseil général des hospices pour la création d'un hospice de retraite à Garches.\n\n<b>1833</b> : ouverture de l'hospice de la Reconnaissance, destiné en priorité aux ouvriers forgerons, serruriers, mécaniciens âgés sans ressources. \n\n<b>1836</b> : agrandissements des bâtiments sous la direction des architectes Dellanoy et Gauthier.\n\n<b>1946</b> : annexion de la fondation Michel-Brézin à l'hôpital Raymond-Poincaré." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "La Rochefoucauld", lat: 48.83211, lng: 2.33218, ouverture: 1781, fermeture: 2019, type: "retraite", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/87_La-Rochefoucauld.pdf", histoire: "<b>1781</b> : fondation de la Maison royale de santé, grâce  à l'action conjointe du Père Gérard des Frères de Saint-Jean-de-Dieu, de Louis XVI, du prévôt des marchands de Caumartin et de la vicomtesse de La Rochefoucauld ; l'édifice est construit sur les plans de l'architecte Antoine.\n\n<b>1783</b> : installation des premiers prensonnaires, ecclésiastiques âgés ou malades, ainsi que militaires infirmes et indigents.\n\n<b>1792</b> : l'établissement devient un lieu de soins destiné aux malades de la circonscription de Bourg-la-Reine, sous le nom d'hospice national de Montrouge.\n\n<b>1801</b> : arrêté du conseil général des hospices faisant de l'établissement la maison de retraite de Montrouge.\n\n<b>1802</b> : reconstruction de l'établissement sous la direction de l'architecte Clavareau. \n\n<b>1822</b> : la maison prend le nom d'hospice de La Rochefoucauld.\n\n<b>1971-1973</b> : rénovation et transformation en maison de cure médicale ; l'établissement dispose de 80 lits en long séjour en 1998.\n\n<b>2019</b> : fermeture définitive de l'établissement." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "La Roche-Guyon", lat: 49.07979, lng: 1.62669, ouverture: 1850, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F40FI%2FFRAPHP075_40FI_048.jpg",  legende_image:"Entrée principale de l'hôpital en 1990.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/88_La-Roche-Guyon.pdf", histoire: "<b>1850</b> : ouverture de la maison de convalescence de La Roche-Guyon, installée sur le domaine de son bienfaiteur, le comte Georges de La Rochefoucauld ; elle accueille des jeunes garçons en convalescence.\n\n<b>1863</b> : l'administration accepte le legs du fondateur et reçoit les immeubles et terrains de la maison de convalescence ; l'établissement accueille des enfants non\ncontagieux provenant des hôpitaux parisiens.\n\n<b>1959</b> : l'hôpital adopte une vocation pédiatrique et prend en charge des enfants polyhandicapés mentaux et physiques.\n\n<b>1971</b> : rattachement administratif à l'hôpital Saint-Vincent de Paul ; le site reste néanmoins lié sur le plan médical, jusqu'au milieu des années 1980, au service de psychiatrie infantile de la Pitié-Salpêtrière.\n\n<b>1999</b> : intégration de l'établissement au groupe hospitalier Cochin Saint-Vincent-de-Paul-la Roche-Guyon." , groupe: "AP-HP. Sorbonne Université", specialites: "Polyhandicap, rééducation neurologique pédiatrique", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "La Trinité", lat: 48.86491, lng: 2.35077, ouverture: 1201, fermeture: 1790, type: "hopital", detruit:"oui",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/06/Trinite.pdf", histoire: "<b>1202</b> : acquisition par deux religieux allemands, Guillaume Escuacol et Léon de la Paslée, d'un terrain au lieu-dit de la Croix de la Reine, afin d'y fonder un refuge pour pèlerins.\n\n<b>1207</b> : l'établissement prend le nom d'hôpital de la Sainte-Trinité.\n\n<b>1545</b> : François 1er lui assigne une nouvelle destination en faveur des enfants indigents ; renommé hospice des Enfants-Bleus, l'établissement devient une école \nprofessionnelle d'arts et métiers.\n\n<b>1790</b> : suppression de l'hospice ; les bâtiments sont occupés par la section des Amis de la Patrie, avant d'être vendus en 1812 puis démolis. " , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Laennec", lat: 48.84979, lng: 2.32216, ouverture: 1874, fermeture: 2000, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/83_Laennec.pdf", histoire: "<b>1874</b> : installation d'un hôpital temporaire dans les bâtiments de l'ancien hôpital des Incurables, situé rue de Sèvres, fermé après le transfert des dernières patientes en 1869 vers le nouvel hospice des Incurables d'Ivry.\n\n<b>1879</b> : l'établissement est renommé hôpital Laennec, en mémoire du clinicien anatomo-pathologiste inventeur du stéthoscope.\n\n<b>1910</b> : ouverture sur le site hospitalier du dispensaire Léon-Bourgeois comprennant près de 220 lits réservés aux tuberculeux.\n\n<b>1998</b> : transfert des activités vers l'hôpital européen Georges-Pompidou.\n\n<b>2000</b> : fermeture définitive de l'hôpital Laennec dont les bâtiments sont vendus en 2002. Depuis 2016, le bâtiment est le siège du groupe Kering." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Lambrechts (fondation)", lat: 48.79650, lng: 2.28515, ouverture: 1929, fermeture: 1960, type: "fondation", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/84_Lambrechts.pdf", histoire: "<b>1823</b> : par testament, le ministre de la Justice, le comte Charles-Joseph Mathieu Lambrechts, fonde un établissement destiné au secours des\nprotestants, luthériens et réformés de Paris et du département de la Seine.\n\n<b>1846</b> : ouverture de la fondation Lambrechts sur le domaine du château de Courbevoie ; mise en place d'un pensionnat pour des garçons orphelins et d'un refuge pour personnes âgées infirmes et démunies. \n\n<b>1929</b> : transfert de l'asile Lambrechts sur un site de la commune de Châtillon-sous-Bagneux." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Lambrechts (fondation)", lat: 48.89984 , lng: 2.25669, ouverture: 1846, fermeture: 1929, type: "fondation", detruit:"oui",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/84_Lambrechts.pdf", histoire: "<b>1823</b> : par testament, le ministre de la Justice, le comte Charles-Joseph Mathieu Lambrechts, fonde un établissement destiné au secours des\nprotestants, luthériens et réformés de Paris et du département de la Seine.\n\n<b>1846</b> : ouverture de la fondation Lambrechts sur le domaine du château de Courbevoie ; mise en place d'un pensionnat pour des garçons orphelins et d'un refuge pour personnes âgées infirmes et démunies. \n\n<b>1929</b> : transfert de l'asile Lambrechts sur un site de la commune de Châtillon-sous-Bagneux." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Lannelongue", lat: 50.41291, lng: 1.56550, ouverture: 1921, fermeture: 1944, type: "hopital", detruit:"oui",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/85_Lannelongue.pdf", histoire: "<b>1908</b> : convention entre l'administration et le directeur du sanatorium de Bouville afin de permettre chaque année l'hospitalisation de 300 pupilles.\n\n<b>1921</b> : installation de l'hôpital annexe de Berck dans l'ancien établissement privé Bouville, à Berck-sur-Mer.\n\n<b>1931</b> : l'établissement prend le nom d'hôpital Lannelongue, en hommage au chirurgien pionnier de la cure marine des tuberculoses osseuses.\n\n<b>1944</b> : destruction totale de l'hôpital sous les bombardements." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Lariboisière", lat: 48.88283, lng: 2.35306, ouverture: 1854, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F43FI%2FFRAPHP075_43FI_0316.jpg",  legende_image:"Entrée principale en 1965.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/86_Lariboisière.pdf", histoire: "<b>1839</b> : décision de créer un nouvel établissement parisien, l'hôpital du Nord.\n\n<b>1846-1854</b> : construction de l'hôpital Lariboisière, selon les plans de l'archtiecte Gauthier, sur le site l'ancienne léproserie appelée enclos Saint-Lazare; il s'agit du premier hôpital pavillonnaire en France, inspiré des travaux de Jacques Tenon à la fin du XVIIIe siècle.\n\n<b>1853</b> : l'établissement reçoit le nom d'hôpital Lariboisière, en hommage aux libéralités de la comtesse de Lariboisière. \n\n<b>1854</b> : accueil des premiers patients.\n\n<b>1905</b> : création d'une maternité permettant d'accroître les capacités d'accueil.\n\n<b>1905</b> : intégration de l'établissement au groupe hospitalier Lariboisière- Femand-Widal- Saint-Lazare." , groupe: "AP-HP. Nord-Université Paris Cité", specialites: "Neurologie, ORL, ophtalmologie, cardiologie, urgences", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Ledru-Rollin (fondation)", lat: 48.78995, lng: 2.29231, ouverture: 1942, fermeture: 1962, type: "fondation", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/89_Ledru-Rollin.pdf", histoire: "<b>1890</b> : la préfecture de la Seine décide d'employer le legs de la veuve du jurisconsulte Ledru-Rollin à la création d'un établissement de convalescence.\n\n<b>1892</b> : inauguration à Fontenay-aux-Roses, dans la propriété de la bienfaitrice, de l'asile Ledru-Rollin, destiné à l'accueil et au soin des femmes à leur sortie de maternité.\n\n<b>1942</b> : rattachement à l'Assistance publique ; l'asile prend le nom de maison maternelle Ledru-Rollin.\n\n<b>1962</b> : transfert à la préfecture de Paris ; l'établissement dépend désormais du service d'aide sociale à l'enfance." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Lenoir-Jousseran (fondation)", lat: 48.84409, lng: 2.41551, ouverture: 1880, fermeture: 1972, type: "retraite", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F8%2FFRAPHP075_C660_8_018.jpg",  legende_image:"L'entrée vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/90_Lenoir-Jousseran.pdf", histoire: "<b>1880</b> : la fondation Lenoir-Jousseran ouvre à Saint Mandé, sur les terrains de l'hospice Saint-Michel, grâce au legs de Marie-Aspasie Jousseran, veuve d'Auguste Lenoir ; l'établissement accueille et soignes des hommes et femmes âgés, indigents ou atteints d'infirmités incurables.\n\n<b>1972</b> : rattachement au Bureau d'aide sociale de Paris, en application du décret du ministère de la Santé publique du 30 décembre." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Leprince (fondation)", lat: 48.85926, lng: 2.30570, ouverture: 1826, fermeture: 1969, type: "retraite", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/91_Leprince.pdf", histoire: "<b>1819</b> : par l'ordonnance royale du 29 décembre, l'administration hospitalière est autorisée à affecter les revenus de la dotation de Martine Félicité Leprince à l'édification d'un hospice.\n\n<b>1826</b> : ouverture de la fondation Leprince, rue Saint-Dominique à Paris ; l'établissement, destiné aux indigents du quartier du Gros-Caillou, relève du bureau de bienfaisance de l'arrondissement.\n\n<b>1969</b> : rattachement de la fondation Leprince à l'administration municipale." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Lesecq (fondation)", lat: 48.87967, lng: 2.35143, ouverture: 1845, fermeture: 1969, type: "fondation", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/92_Lesecq.pdf", histoire: "<b>1781</b> : par testament du 20 février, Simone Lesecq prévoit la création d'un établissement destiné à loger vingt femmes dans sa maison de la rue du Gros-Chenet.\n\n<b>1845</b> : création de la fondation Lesecq, rue de Belzunce à Paris ; gérée par le Bureau de bienfaisance, elle accueille vingt femmes célibataires ou veuves.\n\n<b>1969</b> : rattachement de la fondation Lesecq à l'administration municipale." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Louis-Mourier", lat: 48.92515, lng: 2.23646, ouverture: 1971, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F44FI%2FFRAPHP075_44FI_156.jpg",  legende_image:"Entré de l'hôpital, 1974.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/93_Louis-Mourier.pdf", histoire: "<b>1971</b> : ouverture à Colombes (Hauts-de-Seine)  de l'hôpital de Colombes, bientôt renommé hôpital Louis-Mourier, en hommage du docteur Louis Mourier, secrétaire d'État puis directeur général de l'Assistance publique de 1920 à 1938.  \n\n<b>2010</b> : intégration de l'établissement au groupe des « Hôpitaux Universitaires Paris Nord Val de Seine ». \n\n<b>2011</b> : inauguration du nouveau centre « Femme-Mère-Enfant »." , groupe: "AP-HP. Nord-Université Paris Cité", specialites: "Maternité, gynécologie, urgences", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Lourcine", lat: 48.83456, lng: 2.34740, ouverture: 1559, fermeture: 1893, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/33_Broca.pdf", histoire: "<b>1559</b> : l'établissement, d'abord appelé Hôtel-Dieu du Patriarche puis hôpital de Saint-Martial, prend le nom de Lourcine ; il accueille des femmes atteintes de maladies vénériennes.\n\n<b>1579</b> : changement d'affectation : Nicolas Houël y fonde sa maison de Charité chrétienne.\n\n<b>1834</b> : acquisition par le Conseil général des hospices.\n\n<b>1893</b> : l'établissement prend le nom d'hôpital Broca." , groupe: "", specialites: "Dermatologie, maladies vénériennes (vocation historique), gynécologie", decouverte_1: "Invention de la pince hémostatique, dite pince Péan | 1868| Dr Jules Péan", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Magasin central", lat: 48.82369, lng: 2.39944, ouverture: 1965, fermeture: null, type: "services generaux", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1867</b> : mise en service du magasin central, installé boulevard de l'Hôpital, à l'emplacement du cimetière de l'hôpital Salpêtrière, dans un bâtiment édifié par l'architecte Ponthieu.\n\n<b>1965</b> : transfert à Charenton-le-Pont et regroupement avec les ateliers centraux pour former les  « Magasins et ateliers généraux ».\n\n<b>1973</b> : le service prend le nom de « magasin central hôtelier ».\n\n<b>1989</b> : fusion avec la centrale d'approvisionnements alimentaires pour former l'« Approvisionnement central hôtelier et alimentaire ».\n\n<b>1993</b> : transfert du service à Wissous." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Magasin central", lat: 48.83812, lng: 2.36074, ouverture: 1867, fermeture: 1965, type: "services generaux", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1867</b> : mise en service du magasin central, installé boulevard de l'Hôpital, à l'emplacement du cimetière de l'hôpital Salpêtrière, dans un bâtiment édifié par l'architecte Ponthieu.\n\n<b>1965</b> : transfert à Charenton-le-Pont et regroupement avec les ateliers centraux pour former les  « Magasins et ateliers généraux ».\n\n<b>1973</b> : le service prend le nom de « magasin central hôtelier ».\n\n<b>1989</b> : fusion avec la centrale d'approvisionnements alimentaires pour former l'« Approvisionnement central hôtelier et alimentaire ».\n\n<b>1993</b> : transfert du service à Wissous." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Maison de Bicêtre", lat: 48.81112, lng: 2.35573, ouverture: 1656, fermeture: 1823, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F6%2FFRAPHP075_C660_6_014.jpg",  legende_image:"L'hospital de Bicestre (XVIIe siècle).", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/22_Bic%C3%AAtre.pdf", histoire: "<b>XVIIe siècle</b> : acquisition par le roi Louis XIII d'un domaine destiné à la construction d'un hôpital pour soldats invalides.\n\n<b>1634</b> : ouverture de la commanderie de Saint-Louis. \n\n<b>1656</b> : rattachement à l'Hôpital général de Paris ; la maison de Bicêtre devient un établissement d'enfermement pour indigents, combinant fonction d'hôpital, d'asile, de maison de correction et de détention.\n\n<b>1823</b> : par arrêté du 4 juin, le conseil général des hospices lui attribue le nom d'hospice de la Vieillesse-Hommes. \n\n<b>1885</b> : éétablissement de la dénomination Bicêtre.\n\n<b>1950</b> : transformation progressive de l'hospice en hôpital de soins aigus.\n\n<b>1952</b> : modernisation et aménagement de deux pavillons en service hospitalier pour enfants." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Maison de l’Enfant Jésus ", lat: 48.84589, lng: 2.31408, ouverture: 1724, fermeture: 1794, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>vers 1724</b> : fondation de la Maison de l'Enfant-Jésus, rue de Sèvres, à l'initiative du curé de Saint-Sulpice et grâce aux libéralités de plusieurs bienfaitrices, dont la reine Marie Leszczynska ; elle constitue l'origine directe de l'hôpital des Enfants Malades.\n\n<b>1751</b> : l'établissement devient la Maison royale de l'Enfant-Jésus, accueillant à la fois un hôpital pour les indigentes de la paroisse et un ouvroir destiné à l'éducation de femmes employées aux travaux de filature.\n\n<b>1794</b> : transformée en Maison nationale des Orphelins,  elle regroupe l'ensemble des enfants issus des orphelinats parisiens supprimés.\n\n<b>1802</b> : conversion en hôpital sous le nom d'hôpital des Enfants Malades, exclusivement dédié aux soins pédiatriques, devenant le premier établissement européen entièrement réservé aux enfants.\n\n<b>1927</b> : fusion avec l'hôpital Necker et création du groupe hospitalier Necker-Enfants Malades." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Maison du 18 juin", lat: 48.96776, lng: 2.23697, ouverture: 1955, fermeture: 1966, type: "retraite", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1955</b> : ouverture de la maison des vieillards d’Argenteuil dans une propriété dite « maison du 18 Juin », acquise par l'administration auprès de l'Association des Français libres ; rattaché à la maison de retraite Galignani, l'établissement accueille dès cette date des personnes âgées.\n\n<b>1955</b> : l'établissement prend le nom d'hospice Maurice-de-Fontenay, en hommage à l'un de ses membres\nrécemment disparu. " , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Maison maternelle", lat: 48.81119, lng: 2.29703, ouverture: 1922, fermeture: 1962, type: "", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F60FI%2FFRAPHP075_60FI_02.jpg",  legende_image:"Berceaux en plein air vers 1970.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/40_Ch%C3%A2tillon-sous-Bagneux.pdf", histoire: "<b>1922</b> : ouverture de la maison maternelle de Châtillon-sous-Bagneux, installée dans les locaux de l'ancienne Station suburbaine. \n\n<b>1962</b> : rattachement au service d'aide sociale à l'enfance, en application du décret du 5 décembre 1961. " , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Manin", lat: 48.87871, lng: 2.37585, ouverture: 1944, fermeture: 1947, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/94_Manin.pdf", histoire: "<b>1944</b> : la fondation ophtalmologique de la rue Manin (19e arrondissement) est réquisitionnée et gérée par l'Assistance publique ; elle est transformée en un service de chirurgie sous la dénomination d'hôpital Manin.\n\n<b>1947</b> : fermeture de cet hôpital provisoire et restitution des bâtiments à leur destination initiale." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Maternité de Port-Royal", lat: 48.83888, lng: 2.33750, ouverture: 1795, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FSerie_Fosseyeux%2F834FOSS%2F834FOSS_070%2FFRAPHP075_834FOSS70_1.jpg",  legende_image:"Hospice de la maternité [1811].", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/95_Maternité_de_Port-Royal.pdf", histoire: "<b>1793-1794</b> : l'ancienne abbaye de Port-Royal est transformée en lieu de détention sous le nom de prison de Port-Libre ou prison de la Bourbe.\n\n<b>1795</b> : restitution de l'établissement à l'administration générale des hospices ; devient Maison de l'Allaitement, affectée aux enfants trouvés ainsi qu'aux femmes en fin de grossesse, siège d'un service d'allaitement.\n\n<b>1814</b> : transfert des services d'accouchement de l'Oratoire et de l'École d'accouchement dans la bâtisse de Port-Royal ; l'établissement prend le nom de Maternité.\n\n<b>1890</b> : ouverture de la clinique Baudelocque sur une partie du domaine. " , groupe: "AP-HP. Centre-Université Paris Cité", specialites: "Obstétrique, maternité de niveau III, néonatalogie, gynécologie", decouverte_1: "Invention de la couveuse | 1881| Dr Stéphane Tarnier", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Michelet (asile)", lat: 48.82575, lng: 2.34276, ouverture: 1942, fermeture: 1962, type: "asile", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/96_Michelet.pdf", histoire: "<b>1893</b> : ouverture de l'asile Michelet, rue de Tolbiac (13e arrondissement) ; lieu de refuge et d'hébergement pour les femmes enceintes, il dépend administrativement et financièrement de la préfecture de la Seine.  \n\n<b>1942</b> : rattachement à l'Assistance publique ; l'établissement prend le nom de maison maternelle Michelet.\n\n<b>1962</b> : rattachement au service d'aide sociale à l'enfance, en application du décret du 5 octobre 1961." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Millard (fondation)", lat: 48.93035, lng: 2.50282, ouverture: 1926, fermeture: 1969, type: "fondation", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/97_Millard.pdf", histoire: "<b>1920</b> : l'Assistance publique accepte le legs du docteur Millard, destiné à l'édification d'un pavillon pour l'hospitalisation de personnes âgées.\n\n<b>1926</b> : ouverture de la fondation Millard, sur un terrain de la maison de retraite Bigottini à Aulnay-sous-Bois." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Moisselles ", lat: 49.05007, lng: 2.33737, ouverture: 1894, fermeture: 1905, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/98_Moisselles.pdf", histoire: "<b>1892</b> : la propriété de Moisselles (Val-d'Oise) est acquise par le département de la Seine pour y installer une école de réforme pour enfants assistés.\n\n<b>1894</b> : création d'un service hospitalier de plus de 200 lits destiné aux enfants atteints de teigne.\n\n<b>1896</b> : abandon progressif du service.\n\n<b>1905</b> : l'établissement devient un hôpital pour enfants en situation de handicap mental.\n\n<b>1942</b> : rebaptisé hôpital psychiatrique de Moisselles, il prend par la suite le nom de Centre hospitalier Roger-Prévot." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Musée Bourneville", lat: 48.80931, lng: 2.35429, ouverture: 1880, fermeture: 1924, type: "musee scientifique", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F6%2FFRAPHP075_C660_6_037.jpg",  legende_image:"Musée Bourneville vers 1900.", url:"", histoire: "<b>1880</b> : création par le Docteur Bourneville du musée d'anatomie pathologique de l'hospice de Bicêtre, dit musée Bourneville." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Musée Chevassu", lat: 48.83670, lng: 2.33945, ouverture: 1940, fermeture: 2000, type: "musee scientifique", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1940</b> : fondation dans les années 1940 par le Dr Maurice Chevassu, chef du service de chirurgie urinaire de l'hôpital Cochin, d'un musée d'urologie rassemblant des pièces anatomiques ainsi que des plaques de verre.\n\n<b>1958</b> : l'administration attribue le nom de Maurice Chevassu au musée de la clinique urologique de l'hôpital Cochin. \n" , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Musée Civiale", lat: 48.84439, lng: 2.31554, ouverture: 1867, fermeture: 1904, type: "musee scientifique", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1867</b> : création d'un musée constitué autour d'une collection réunie par le Dr Civiale, comprenant des calculs, des instruments et des pièces anatomo-pathologiques principalement liées aux maladies urinaires.\n\n<b>1904</b> : transfert du musée à l'hopital Lariboisière." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Musée de l'amphithéâtre d'anatomie", lat: 48.83902, lng: 2.35434, ouverture: 1900, fermeture: 1934, type: "musee scientifique", detruit:"",  images:"",  legende_image:"", url:"", histoire: " <b>fin XIXe siècle</b> : création d'un musée de l’amphithéâtre d’anatomie, également appelé musée de Clamart ; ses collections rassemblent des pièces anatomiques naturelles préparées depuis la création de l'établissement par les prosecteurs des hôpitaux." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Musée des Moulages", lat: 48.87229, lng: 2.36811, ouverture: 1867, fermeture: null, type: "musee scientifique", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1867</b> : création du musée des Moulages de l'hôpital Saint-Louis, réunissant des collections de moulages reproduisant les principales affectations cutanées et parasitaires, réalisés par le préparateur d'anatomie de l'hôpital, M. Baretta." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Musée du service des Accouchements ", lat: 48.87681, lng: 2.30634, ouverture: 1897, fermeture: 1919, type: "musee scientifique", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>avant 1897</b> : création d'un musée dans le pavillon Dubois de la maternité, réunissant des moulages en cire et des fragments squelettiques.\n\n<b>1919</b> : fermeture du musée." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Musée et Bibliothèque Charcot", lat: 48.83743, lng: 2.36608, ouverture: 1878, fermeture: 1966, type: "musee scientifique", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1878</b> : création par le Pr Charcot d'un musée au premier étage de la division Pariset ; il rassemble des dessins, photographies, pièces de squelettes présentant des déformations osseuses, moulages en cire, la célèbre Vénus ataxique, ainsi que diverses préparations et pièces anatomiques naturelles.\n\n<b>1906</b> : installation de la bibliothèque Charcot à l'emplacement du musée, lequel est transféré au rez-de-chaussée du même bâtiment.\n\n<b>1966</b> : déplacement des collections du musée Charcot dans un autre espace de l'hôpital, avant leur transfert au musée de l'AP-HP en 1992." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Musée Lannelongue", lat: 48.84943, lng: 2.37522, ouverture: 1847, fermeture: 1900, type: "musee scientifique", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>avant 1847</b> : création d'un musée par le Pr Lannelongue dans lequel ce dernier rassemble des pièces anatomiques de maladies chirurgicales des enfants et de maladies congénitales.\n\n<b>1900</b> : fermeture du musée et transfert des collections au musée Dupuytren. " , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Musée Letulle ", lat: 48.84172, lng: 2.28470, ouverture: 1905, fermeture: 1980, type: "musee scientifique", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1905</b> : création d'un musée par Maurice Letulle dans un bâtiment voisin du laboratoire central de l'hôpital Boucicaut.\n\n<b>1928</b> : fondation de l'association «Musée Maurice Letulle» ; rebaptisé « Musée-laboratoire d'anatomie pathologique générale», il rassemble près de 3 000 ouvrages, un million de coupes histologiques, des centaines de dessins, 10 000 plaques photographiques et 6 000 pièce chirugicales." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Musée pathologique", lat: 48.84957, lng: 2.32230, ouverture: 1889, fermeture: null, type: "musee scientifique", detruit:"",  images:"",  legende_image:"", url:"", histoire: "" , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Musée Varnier ", lat: 48.83858, lng: 2.33722, ouverture: 1889, fermeture: 1957, type: "musee scientifique", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1889</b> : ouverture, à la maternité Baudelocque, d'un musée dédié à l'étude de l'anatomie et de la pathologie obstétricale, à l'initiative d'Adolphe Pinard et de son élève Henri Varnier. Les collections réunissent photographies, instruments, pièces anatomiques et premiers clichés radiologiques obstétricaux.\n\n<b>vers 1957 </b> : transfert de l'ensemble dans les sous-sols du cloître de Port-Royal." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Musée vénéréologique", lat: 48.83590, lng: 2.33991, ouverture: 1872, fermeture: 1926, type: "musee scientifique", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1879</b> : fondation par le Dr Horteloup d'un musée, bientôt installé dans une salle d'opération de l'hôpital ; ses collections, composées de moulages en cire et en plâtre, illustrent les principales formes cliniques des maladies vénériennes.\n\n<b>1902</b> : l'ensemble, désormais riche d'environ 400 pièces consacrées à la pathologie vénérienne, est présenté dans l'ancienne chapelle de l'hôpital.\n\n<b>1926</b> : fermeture du musée." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Necker", lat: 48.84584, lng: 2.314629, ouverture: 1778, fermeture: 1927, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FNCK%2FFRAPHP075_NCK_3FI4_0315.jpg",  legende_image:"Entrée des urgences enfants, ORL, maternité en 1999.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/99_Necker.pdf", histoire: "<b>1778</b> : Madame Necker fonde un hospice rue de Sèvres, sur l'emplacement de l'ancien couvent des Bénédictines de Notre-Dame de Liesse ; d'abord appelé hospice de Charité, puis hospice des paroisses de Saint-Sulpice et du Gros-Caillou, l'établissement est dédié à la médecine et à la chirurgie de l'adulte.\n\n<b>1792</b> : l'établissement prend le nom d'hospice de l'Ouest.\n\n<b>1802</b> : l'administration lui attribue le nom d'hôpital Necker, en hommage à sa fondatrice, qui l'a dirigé jusqu'en 1788.\n\n<b>1927</b> : fusion avec l'hôpital des Enfants Malades pour former le groupe hospitalier Necker-Enfants Malades." , groupe: "AP-HP. Centre-Université Paris Cité", specialites: "Pédiatrie, chirurgie pédiatrique, maladies rares, néphrologie, maladies génétiques", decouverte_1: "Invention du stéthoscope | 1816 | Dr René Laennec", decouverte_2: "Première greffe de rein en France | 1952 | Pr Jean Hamburger & Louis Michon", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "https://www.musee-collections.aphp.fr/app/photopro.sk/aphp/doclist?prms_treelist=rootNode%3D2%26openNodes%3D%253A3%253A3263%253A381%26caller_id%3Ddoclist%26search%3Dmcpid%2B%253A%2B%25223270%2522&psearch=mcpid%20%3A%20%221096%22&mcpid=1096" },
{ nom: "Necker-Enfants Malades", lat: 48.84636, lng: 2.31588, ouverture: 1927, fermeture: null, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>vers 1724</b> : fondation de la Maison de l'Enfant-Jésus, rue de Sèvres, à l'initiative du curé de Saint-Sulpice et grâce aux libéralités de plusieurs bienfaitrices, dont la reine Marie Leszczynska ; elle constitue l'origine directe de l'hôpital des Enfants Malades.\n\n<b>1751</b> : l'établissement devient la Maison royale de l'Enfant-Jésus, accueillant à la fois un hôpital pour les indigentes de la paroisse et un ouvroir destiné à l'éducation de femmes employées aux travaux de filature.\n\n<b>1794</b> : transformée en Maison nationale des Orphelins,  elle regroupe l'ensemble des enfants issus des orphelinats parisiens supprimés.\n\n<b>1802</b> : conversion en hôpital sous le nom d'hôpital des Enfants Malades, exclusivement dédié aux soins pédiatriques, devenant le premier établissement européen entièrement réservé aux enfants.\n\n<b>1927</b> : fusion avec l'hôpital Necker et création du groupe hospitalier Necker-Enfants Malades." , groupe: "AP-HP. Centre-Université Paris Cité", specialites: "Pédiatrie, chirurgie pédiatrique, maladies rares de l'enfant, hématologie pédiatrique", decouverte_1: "Premier sérum antidiphtérique appliqué à 300 enfants | 1893-1894 | Auguste Chaillou & Louis Martin (sous la direction d'Émile Roux, Institut Pasteur)", decouverte_2: "Première greffe de rein en France | 1952 | Pr Jean Hamburger, Gabriel Richet & Louis Michon", url_archives: "", url_musee: "" },
{ nom: "Parent-de-Rosan (orphelinat)", lat: 48.84286, lng: 2.26674, ouverture: 1895, fermeture: 1962, type: "orphelinat", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/100_Parent-de-Rosan.pdf", histoire: "<b>1890</b> : décès de Charles-Félix Parent ; son testament prévoit la création d'un orphelinat.\n\n<b>1895</b> : ouverture, dans sa propriété du 16e arrondissement de Paris, d'un orphelinat sous le nom de fondation Parent-de-Rosan.\n\n<b>1960</b> : la maison Parent-de-Rosan est intégrée au groupe hospitalier Sainte-Perrine- Chardon-Lagache- Rossini- Parent-de-Rosan.\n\n<b>1962</b> : rattachement au bureau d'aide sociale à l'enfance, en application du décret du 5 décembre 1961." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Paul-Brousse", lat: 48.79507, lng: 2.36372, ouverture: 1961, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FPBR%2FFRAPHP075_PBR_3FI4_0278.jpg",  legende_image:"Entrée principale en 1992.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/101_Paul-Brousse.pdf", histoire: "<b>1913</b> : mise en service de l'hospice départemental de Villejuif, également appelé hospice départemental Paul-Brousse, destiné à l'accueil des personnes âgées.\n\n<b>1942</b> : regroupement de l'hospice Paul Brousse, de l'Institut du cander et de la maison de retraite Émile-Deslandres au sein du groupe hospitalier Paul-Brousse ; la création de nouveaux services entraîne une évolution progressive de sa destination.\n\n<b>1961</b> : rattachement du groupe hospitalier à l'Assistance publique par décret du ministère de la Santé publique et de la Population du 11 octobre 1961. " , groupe: "AP-HP. Université Paris-Saclay", specialites: "Gérontologie, chirurgie hépatique, transplantation, oncologie digestive, maladies infectieuses", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Paul-Doumer", lat: 49.35350, lng: 2.49542, ouverture: 1932, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FVPD%2FFRAPHP075_VPD_3FI4_009.jpg",  legende_image:"Entrée de l'hôpital en 1977.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/102_Paul-Doumer.pdf", histoire: "<b>1932</b> : ouverture du sanatorium Labruyère (Oise), destiné à l'isolement et au soin des tuberculeux\nparisiens.\n\n<b>1933</b> : l'établissement prend le nom de sanatorium Paul-Doumer.\n\n<b>1965</b> : reconversion en hôpital pour personnes âgées ; fusion avec un autre sanatorium du Val-d'Oise pour former le groupe hospitalier Villemin-Paul-Doumer." , groupe: "AP-HP. Nord-Université Paris Cité", specialites: "Tuberculose (vocation historique), gériatrie", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Paul-Manchon", lat: 48.75637, lng: 2.29778, ouverture: 1927, fermeture: 1962, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FPMC%2FFRAPHP075_PMC_3FI4_15.jpg",  legende_image:"Façade côté cour vers 1930.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/103_Paul-Manchon.pdf", histoire: "<b>1926</b> : les docteurs Louis Mourier et Calmettes initient la création d'un service d'observation de nouveau-nés abandonnés.\n\n<b>1927</b> : ouverture de la pouponnière d'Antony, installée dans les bâtiments d'un ancien couvent des pères rédemptoristes, anciennement annexe de l'hospice des Enfants-Assistés.\n\n<b>1946</b> : l'établissement est renommé pouponnière Paul-Manchon, en hommage à un agent de l'Assistance publique mort pendant la guerre ; il fonctionne en étroite liaison avec l'hôpital Saint Vincent-de-Paul.\n\n<b>1962</b> : rattachement de l'établissement au service d'aide sociale à l'enfance, en application du décret du 5 décembre 1961. " , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Paul-Marmottan", lat: 48.87814, lng: 2.29125, ouverture: 1936, fermeture: 1968, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/104_Paul-Marmottan.pdf", histoire: "<b>1936</b> : ouverture de l'hôpital-poste de secours Marmottan, rue d'Armaillé (17e arrondissement), destiné à desservir la circonscription de l'ancien hôpital Beaujon.\n\n<b>1968</b> : cessation définitive d'activité." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Paul-Parquet (fondation)", lat: 48.89332, lng: 2.26303, ouverture: 1923, fermeture: null, type: "fondation", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/105_Paul-Parquet.pdf", histoire: "<b>1922</b> : création par Madame Parquet de la fondation Paul-Parquet à Neuilly-sur-Seine, dans une maison construite par l'architecte Le Cœur ; également appelé centre d'hygiène infantile , elle est dédiée à l'accueil et au soin des nourrissons.\n\n<b>1923</b> : convention entre la fondation et l'AP-HP permettant l'accueil de jusqu'à 50 enfants âgés d'un mois à trois ans.\n\n<b>1943</b> : l'établissement dispose de 60 lits pour des nourrissons temporairement envoyés par les hôpitaux." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Petites Maisons (hospice)", lat: 48.85155, lng: 2.32604, ouverture: 1554, fermeture: 1863, type: "hopital", detruit:"oui",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC661%2F2%2FFRAPHP075_C661_2_010.jpg",  legende_image:"Plan des Petites-Maisons (Ménages), 1790.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/47_Corentin-Celton.pdf", histoire: "<b>1554</b> : construction de l'hospice des Petites Maisons, rue de la Chaise, sur l'emplacement d'une ancienne maladrerie. Placé sous l'autorité des commis du Grand Bureau des Pauvres, l'établissement accueille vieillards, infirmes, mendiants, aliénés, ainsi que les malades vénériens et teigneux.\n\n<b>1801</b> : l'administration passe au Conseil général des hôpitaux et hospices civils de Paris ; l'établissement est transformé en maison de retraite sous le nom d'hospice des Ménages, ou Petits-Ménages.\n\n<b>1861</b> : démolition des bâtiments et reconstruction d'un hospice plus vaste à Issy-les-Moulineaux." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Pharmacie centrale", lat: 48.85373, lng: 2.34799, ouverture: 1795, fermeture: 1810, type: "services generaux", detruit:"oui",  images:" ",  legende_image:" ", url:"", histoire: "<b>1795</b> : création de l'apothicairerie générale des hospices civils de Paris, installée dans l'enceinte de l'Hôtel-Dieu.\n\n<b>1796</b> : transférée dans l'ancien hôpital des Enfants-Trouvés du parvis Notre-Dame, elle devient la « pharmacie générale des hospices ».\n\n<b>1810</b> : rebpatisée « pharmacie centrale des hôpitaux de Paris » ; la pharmacie est déplacée quai de la Tournelle, dans la maison dite des Miramiones.\n\n<b>1974</b> : départ de la maison de Miramion.\n\n<b>1977</b> : installation rue du Fer à Moulin (5e arrondissement), sur le site de l'ancien cimetière de Clamart.\n\n<b>1983</b> : ouverture d'un second site d'exploitation à Nanterre, rue Lavoisier, accueillant plusieurs services.\n\n<b>2001</b> : l'établissement, dont les missions se sont élargies notamment aux achats, prend le nom d'AGEPS (Agence générale des équipements et produits de santé." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
