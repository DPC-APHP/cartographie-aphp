{ nom: "Piccini (hôpital temporaire)", lat: 48.87378, lng: 2.28569, ouverture: 1941, fermeture: 1945, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/106_Piccini.pdf", histoire: "<b>1941</b> : réquisition de la clinique de la rue Piccini (16e arrondissement) par l'Assistance publique durant la guerre.\n\n<b>1945</b> : fermeture de l'hôpital temporaire Piccini qui retrouve sa vocation initiale." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Pitié (hôpital)", lat: 48.84353, lng: 2.35467, ouverture: 1612, fermeture: 1912, type: "hopital", detruit:"oui",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F76FI%2FFRAPHP075_76FI_031.jpg",  legende_image:"Bâtiments de l'ancienne Pitié vers 1910.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/107_Pitié.pdf", histoire: "<b>1850</b> : création de la maison de secours Sœur-Rosalie par Jeanne-Marie Rendu, dite Soeur Rosalie, initialement installée rue Pascal.\n\n<b>1856</b> : transfert de l'établissement rue Gracieuse.\n\n<b>1862</b> : installation définitive rue de l'Épée-de-Bois.\n\n<b>1903</b> : évacuation de l'ancienne maison de secours en vue de sa reconstruction par l'architecte Renaud.\n\n<b>1905</b> : inauguration de l'hospice du 5e arrondissement, rue de l'Épée-de-Bois, offrant soins et secours aux nécessiteux de l'arrondissement ; ouverture, dans un second bâtiment, de l’hospice composé de 21 chambres réservées aux femmes âgées domiciliées dans l’arrondissement." , groupe: "", specialites: "", decouverte_1: "Invention du chloroforme et publication des premières conclusions | 1831 | Eugène Soubeiran", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Pitié-Salpêtrière", lat: 48.83891, lng:  2.36727, ouverture: 1964, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F76FI%2FFRAPHP075_76FI_068.jpg",  legende_image:"L'Hôpital de la Salpêtrière, XVIIIe s.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/131_Salpêtrière.pdf", histoire: "<b>1656</b> : par édit, Louis XIV fait don des bâtiments du Petit-Arsenal, dans le quartier Saint-Victor, à l'administration de l'Hôpital général.\n\n<b>1657</b> : ouverture dans ces bâtiments de la maison de la Salpêtrière, établissement d'assistance et refuge destiné aux indigentes et infirmes, en particulier femmes aliénées, hystériques, paralytiques et incurables.\n\n<b>1677</b> : les architectes Louis Le Vau et Libéral Bruant érigent succèssivement une église en lieu et place de la chapelle Saint-Denis.\n\n<b>1680-1684</b> : édification de la maison de la Force.\n\n<b>1780-1787</b> : construction d'une infirmerie par l'architecte Payen.\n\n<b>1794</b> : début du développement des services neurologiques ; l'hôpital s'oriente progressivement vers la neuropsychiatrie au cours du XIXe siècle.\n\n<b>1823</b> : l'établissement est renommé hospice de la Vieillesse-Femmes par le Conseil général des hospices.\n\n<b>1885</b> : renommé hospice de la Salpêtrière.\n\n<b>1964</b> : fusion des hôpitaux mitoyens la Pitié et la Salpêtrière pour former le groupe hospitalier la Pitié – la Salpêtrière, devenu Pitié-Salpêtrière. " , groupe: "AP-HP. Sorbonne Université", specialites: "Neurologie, neuropsychiatrie, psychiatrie (vocation historique femmes)", decouverte_1: "Description de la sclérose en plaques | 1868 | Pr Jean-Martin Charcot & Alfred Vulpian", decouverte_2: "Libération des aliénés de leurs chaînes (réforme psychiatrique) | 1794 | Dr Philippe Pinel", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "https://www.musee-collections.aphp.fr/app/photopro.sk/aphp/doclist?prms_treelist=rootNode%3D2%26openNodes%3D%253A3%253A3263%253A381%26caller_id%3Ddoclist%26search%3Dmcpid%2B%253A%2B%25223270%2522&psearch=mcpid%20%3A%20%22193%22&mcpid=193" },
{ nom: "Raymond-Poincaré", lat: 48.83947, lng:  2.17079, ouverture: 1936, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F45FI%2FFRAPHP075_45FI_244.jpg",  legende_image:"Entrée principale en 1977.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/109_Raymond-Poincaré.pdf", histoire: "<b>1936</b> : ouverture de l'hôpital-hospice Raymond-Poincaré à Garches, d'abord dédié aux adultes atteints de pathologies chroniques.\n\n<b>1944-1945</b> : réquisitionné par les autorités allemandes, l'hôpital temporairement transféré à la fondation Foch de Suresnes et prend le nom d'« hôpital temporaire Poincaré-Foch ».\n\nAprès <b>1945</b> : l'activité médicale évolue avec la création d'un centre de rééducation et d'un centre de traitement pour la poliomyélite, puis s'étend à la prise en charge des personnes paraplégiques." , groupe: "AP-HP. Université Paris-Saclay", specialites: "Rééducation, réanimation, orthopédie, neurologie, maladies neuromusculaires ", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "René-Muret", lat: 48.93596, lng: 2.50974, ouverture: 1967, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FRMB%2FFRAPHP075_RMB_3FI4_160.jpg",  legende_image:"Entrée principale en 1967.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/111_René-Muret.pdf", histoire: "<b>1964</b> : début de la construction de l'hôpital de Sevran.\n\n<b>1967</b> : l'établissement prend le nom d'hôpital René-Muret, en hommage au directeur de l'hôpital Saint-Louis récemment disparu ; il accueille alors des patients atteints de pathologies chroniques. \n\n<b>1970</b> : rattachement de la maison de retraite Bigottini à l'hôpital René-Muret ; les deux structures sont désormais réunies sous l'appellation d'hôpital René-Muret – Bigottini." , groupe: "AP-HP. Hôpitaux Universitaires Paris Seine-Saint-Denis", specialites: "Gériatrie, maladies infectieuses", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Riboutté-Vitallis (orphelinat)", lat: 48.62988, lng: 2.09096, ouverture: 1882, fermeture: 1935, type: "orphelinat", detruit:"oui",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F8%2FFRAPHP075_C660_8_106.jpg",  legende_image:"Entrée vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/112_Riboutt%C3%A9-Vitallis.pdf", histoire: "<b>1882</b> : ouverture, à Forges-les-Bains, de l'orphelinat de garçons Riboutté-Vitallis, fondé grâce au legs d'Ange Henri Vitallis ; l'établissement est administré par le directeur de l'hôpital de Forges.\n\n<b>1935</b> : fermeture de la fondation en raison de difficultés financières." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Ricord ", lat: 48.83821, lng: 2.34044, ouverture: 1792, fermeture: 1902, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F1%2FFRAPHP075_C660_1_238.jpg",  legende_image:"Plan de masse de l'hôpital Ricord, 1899 (Rochet, architecte).", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/113_Ricord.pdf", histoire: "<b>1792</b> : ouverture de l'hôpital des Capucins, dit aussi hôpital des Vénériens, dans l'ancien couvent des Capucins du faubourg Saint-Jacques.\n\n<b>1836</b> : rebaptisé hôpital du Midi, l'établissement se consacre exclusivement au traitement des maladies vénériennes chez l'homme adulte.\n\n<b>1893</b> : il prend le nom d'hôpital Ricord, en hommage au chirurgien Philippe Ricord ; et élargit ses activités au traitement des maladies de la peau.\n\n<b>1902</b> : rattaché à l'hôpital Cochin, il devient successivement Cochin annexe, puis Cochin.\n\n<b>1904</b>, démoli pour permettre l'extension de l'hôpital Cochin." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Robert-Debré", lat: 48.87883, lng: 2.40318, ouverture: 1988, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FRDB%2FFRAPHP075_RDB_3FI4_0253.jpg",  legende_image:" Entrée principale, boulevard Sérurier en 1988.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/114_Robert-Debré.pdf", histoire: "<b>début des année 1980</b> : l'Assistance publique décide de créer, dans le nord de Paris, un nouvel hôpital à vocation pédiatrique, sur un site situé porte du Pré-Saint-Gervais (19e arrondissement).\n\n<b>1984-1988</b> : construction de l'établissement sous la direction de l'architecte Pierre Riboulet.\n\n<b>1988</b> : inauguration de l'hôpital Robert-Debré. " , groupe: "AP-HP. Nord-Université Paris Cité", specialites: "Pédiatrie, maladies rares de l'enfant, urgences pédiatriques", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Rossini (fondation)", lat: 48.84622, lng: 2.27022, ouverture: 1889, fermeture: 1967, type: "retraite", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/115_Rossini.pdf", histoire: "<b>1889</b> : ouverture de la fondation Rossini, créée grâce au don d'Olympe Louise Rossini, veuve du compositeur Rossini, et édifiée par l'architecte Véra  sur un terrain dépendant de l'institution Sainte-Périne. ; la maison de retraite est placée sous la direction du directeur de Sainte-Périne.\n\n<b>2003</b> : création du groupe hospitalier Sainte-Périne-Chardon-Lagache- Rossini." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Rothschild", lat: 48.84305, lng: 2.39836, ouverture: 1954, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FRTH%2FFRAPHP075_RTH_3FI4_0041.jpg",  legende_image:"Entrée de la fondation Rothschild en 1991.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/116_Rothschild.pdf", histoire: "<b>1852</b> : création, rue de Picpus (12e arrondissement), de la fondation Rothschild (ou hôpital israélite) grâce aux libéralités de James de Rothschild ; l'établissement est destiné à l'accueil de personnes âgées.\n\n<b>1914</b> : transfert et ouverture du nouvel hôpital rue Santerre, édifié par l'architecte Bechmann.\n\n<b>1919</b> : après avoir servi d'hôpital auxiliaire militaire pendant la Première Guerre mondiale, l'établissement est restitué à la fondation .\n\n<b>1944-1945</b> : transformation de l'hôpital en lieu de détention durant la Seconde Guerre mondiale.\n\n<b>1954</b> : rattachement à l'Assistance publique." , groupe: "AP-HP. Sorbonne Université", specialites: "Ophtalmologie", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Saint-Antoine", lat: 48.84923, lng: 2.38273, ouverture: 1795, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FSAT%2FFRAPHP075_SAT_3FI4_0136.jpg",  legende_image:"Entrée principale en 1989.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/117_Saint-Antoine.pdf", histoire: "<b>1795</b> : ouverture, sous le nom d'hospice du faubourg Saint-Antoine  d'un nouvel établissement aménagé par Clavareau à l'empalcement de l'abbaye Saint Antoine-des-Champs.\n\n<b>1796</b> : l'établissement est rebaptisé hospice de l'Est.\n\n<b>1802</b> : il prend le nom d'hôpital Saint-Antoine.\n\n<b>1886</b> : inauguration du pavillon Moïana, bâti sur les terrains marécageux de l'hôpital grâce au legs du joaillier Emmanuel Moïana.\n\n<b>2022</b> : inauguration, au sein de l'hôpital, d'un nouveau bâtiment destiné à accueillir le siège de l'AP-HP. " , groupe: "AP-HP. Sorbonne Université", specialites: "Gastroentérologie, chirurgie digestive", decouverte_1: "Invention de la nutripompe | 1965 | Dr Étienne Lévy & Jean Loygue", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Sainte-Anne ", lat: 48.82896, lng: 2.33682, ouverture: 1607, fermeture: 1872, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/118_Sainte-Anne.pdf", histoire: "<b>1607</b> : installation de l'hôpital Sainte-Anne dans une ancienne maison de santé, chemin de Gentilly ; dépendant de l'Hôtel-Dieu, l'établissement sert d'annexe pour les convalescents de l'hôpital de l'île de la Cité.\n\n<b>1656</b> : reconstruction du pavillon d'entrée et de l'enceinte, à la suite d'une décision royale ; les travaux sont toutefois interrompus.\n\n<b>début du XVIIIe siècle</b> : le sanitat Sainte-Anne est transformé en ferme.\n\n<b>1861</b> : les terrains sont réaffectés à la construction de l'asile d'aliénés Sainte-Anne, ouvert en 1867.\n\n<b>1872</b> : Sainte-Anne est détaché du domaine de l'Assistance publique et placé sous l'autorité du ministre de l'Intérieur." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Sainte-Catherine ", lat: 48.85959, lng: 2.34827, ouverture: 1184, fermeture: 1794, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1184</b> : ouverture de l'établissement, à l'angle de rues des Lombards et Saint-Denis, sous le nom de Sainte-Opportune.\n\n<b>vers 1220</b> : l'établissement devient l'hôpital Sainte-Catherine et se destine à servir d'asile de nuit pour les femmes pauvres.\n\n<b>1794</b> : suppression de l'hôpital par le Comité de salut public ;  ses locaux sont réaffectés au logement des aveugles de l'institution dirigée par Valentin Haüy.\n\n<b>1854</b> : démolition des bâtiments lors du percement du boulevard Sébastopol." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Sainte-Eugénie", lat: 48.84861, lng: 2.37576, ouverture: 1839, fermeture: 1895, type: "hopital", detruit:"oui",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/05/Armand-Trousseau.pdf", histoire: "<b>1795</b> : l'hospice des Enfants Trouvés du faubourg Saint-Antoine devient l'hospice des Orphelines puis hospice des Orphelins.\n\n<b>1839</b> : l'établissement reçoit une nouvelle affectation en tant qu'Hôtel-Dieu Annexe ; elle devient un hôpital pour adultes.\n\n<b>1847</b> : l'administration consacre une partie des locaux de l'Hôtel-Dieu Annexe à l'accueil de vieillards, baptisés asile Saint-Ferdinand, en hommage au duc d'Orléans, fils du roi Louis-Philippe.\n\n<b>1848</b> : suppression de l'asile dont les pensionnaires sont transférés vers l'hospice de La Rochefoucauld ; l'établissement prend alors le nom d'hôpital Sainte-Marguerite.\n\n<b>1854</b> : l'administration de l'Assistance publique décide de transformer en hôpital pour enfants l'hôpital Sainte-Marguerite; ce dernier prend le nom d'hôpital Sainte-Eugénie.\n\n<b>1880</b> : sur proposition de l'administration, l'hôpital est rebaptisé hôpital Trousseau, pour honorer la mémoire d'Armand Trousseau (1801-1867).\n\n<b>1895</b> : désaffection de l'établissement suivi de sa démolition en 1902." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Sainte-Pélagie", lat: 48.84232, lng: 2.35285, ouverture: 1681, fermeture: 1792, type: "hopital", detruit:"oui",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/120_Sainte-P%C3%A9lagie.pdf", histoire: "<b>1681</b> : fondation à Paris de la maison de Sainte-Pélagie à l'initiative de Madame de Miramion ; située rue de la Clef, dans un bâtiment proche du Refuge de la Pitié, elle accueille des femmes souhaitant se réformer.\n\n<b>1691</b> : des lettres patentes du 14 août confirment Sainte-Pélagie comme maison de refuge et de réclusion. \n\n<b>1792</b> : l'établissement est supprimé puis transformé en prison pendant la Révolution.\n\n<b>1793</b> : il sert à l'enfermement de prisonniers politiques sous le nom de prison Sainte-Pélagie.\n\n<b>1895</b> : fermeture définitive de la prison, suivie de la démolition des bâtiments en 1898." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Sainte-Périne", lat: 48.86835, lng: 2.29838, ouverture: 1807, fermeture: 1860, type: "retraite", detruit:"oui",  images:"",  legende_image:" ", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/121_Sainte-Périne.pdf", histoire: "<b>1807</b> : intégratoin de l'institution Notre-Dame de la Paix, implantée rue de Chaillot, dans l'ancien couvent de Sainte-Périne, au domaine de l'Assistance publique ; la maison de retraite accueille les personnes indigentes, notamment les anciens fonctionnaires et veuves d'employés.\n\n<b>1860</b> : expropriation de son ancienne demeure en raison du percement de l'avenue Joséphine.\n\n<b>1865</b> : installation définitive rue Chardon-Lagache, dans le quartier d'Auteuil, où l'établissement devient un hôpital spécialisé en gérontologie.\n\n<b>2003</b> : création du groupe hospitalier Sainte-Périne-Chardon-Lagache- Rossini." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Sainte-Périne", lat: 48.84486, lng: 2.26685, ouverture: 1865, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F47FI%2FFRAPHP075_47FI_166.jpg",  legende_image:"Entrée de l'hôpital, 1991.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/121_Sainte-Périne.pdf", histoire: "<b>1807</b> : intégratoin de l'institution Notre-Dame de la Paix, implantée rue de Chaillot, dans l'ancien couvent de Sainte-Périne, au domaine de l'Assistance publique ; la maison de retraite accueille les personnes indigentes, notamment les anciens fonctionnaires et veuves d'employés.\n\n<b>1860</b> : expropriation de son ancienne demeure en raison du percement de l'avenue Joséphine.\n\n<b>1865</b> : installation définitive rue Chardon-Lagache, dans le quartier d'Auteuil, où l'établissement devient un hôpital spécialisé en gérontologie.\n\n<b>2003</b> : création du groupe hospitalier Sainte-Périne-Chardon-Lagache- Rossini." , groupe: "AP-HP. Université Paris-Saclay", specialites: "Gériatrie, soins de longue durée, réadaptation", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Saint-Esprit-en-Grève", lat: 48.85650, lng: 2.35151, ouverture: 1363, fermeture: 1792, type: "hopital", detruit:"oui",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/122_Saint-Esprit-en-Gr%C3%A8ve.pdf", histoire: "<b>1363</b> : installation de l'hôpital du Saint-Esprit-en-Grève dans une maison place de Grève ; l'établissement sert de lieu de secours à l'enfance.\n\n<b>1445</b> : des lettres patentes 3 août confirment la fondation et réservent l'hospice aux orphelins nés de mariage légitime.\n\n<b>1679</b> : intégration de l'administration du Saint-Esprit à celle de l'Hôpital général.\n\n<b>1792</b> : fermeture de l'hospice ; les garçons sont transférés à la Pitié et les filles à la Salpêtrière\n\n<b>XIXe siècle</b> : les bâtiments sont démolis pour être annexés à l'hôtel de ville." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Saint-Gervais ", lat: 48.85590, lng: 2.35323, ouverture: 1171, fermeture: 1657, type: "hopital", detruit:"oui",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/123_Saint-Gervais.pdf", histoire: "<b>1171</b> : fondation par Carin Masson de l'hôpital Saint-Gervais, installé dans sa demeure sur le parvis de l'église Saint-Gervais. Premier asile de nuit de la capitale, il accueille les vagabonds pour un séjour maximum de trois nuits consécutives.\n\n<b>1300</b> : la gestion de l'établissement est confiée aux religieuses de l'ordre de Saint-Augustin, en remplacement des frères hospitaliers de Saint-Gervais.\n\n<b>1657</b> : l'hôpital quitte le parvis Saint-Gervais pour s'installer rue Vieille-du-Temple, dans l'hôtel d'O.\n\n<b>1795</b> : fermeture de la maison hospitalière ; le terrain est racheté en 1813 par la ville de Paris pour l'ouverture des rues des Rosiers\net des Franc-Bourgeois." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Saint-Gervais ", lat: 48.85815, lng: 2.35856, ouverture: 1657, fermeture: 1795, type: "hopital", detruit:"oui",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/123_Saint-Gervais.pdf", histoire: "<b>1171</b> : fondation par Carin Masson de l'hôpital Saint-Gervais, installé dans sa demeure sur le parvis de l'église Saint-Gervais. Premier asile de nuit de la capitale, il accueille les vagabonds pour un séjour maximum de trois nuits consécutives.\n\n<b>1300</b> : la gestion de l'établissement est confiée aux religieuses de l'ordre de Saint-Augustin, en remplacement des frères hospitaliers de Saint-Gervais.\n\n<b>1657</b> : l'hôpital quitte le parvis Saint-Gervais pour s'installer rue Vieille-du-Temple, dans l'hôtel d'O.\n\n<b>1795</b> : fermeture de la maison hospitalière ; le terrain est racheté en 1813 par la ville de Paris pour l'ouverture des rues des Rosiers\net des Franc-Bourgeois." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Saint-Jacques-aux-Pèlerins", lat: 48.86451, lng: 2.34614, ouverture: 1319, fermeture: 1795, type: "hopital", detruit:"oui",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/124_Saint-Jacques-aux-P%C3%A8lerins.pdf", histoire: "<b>1319</b> : fondation de l'établissement par une confrérie de bourgeois parisiens réunie par une charte de Louis X.; situé rue Saint-Denis.\n\n<b>1319-1323</b> : construction de l'édifice rue de Saint-Denis, initialement conçu pour accueillir les pèlerins en route vers Saint-Jacques-de-Compostelle, avant d'être progressivement dédié aux mendiants.\n\n<b>1781</b> : les biens de Saint-Jacques sont réunis à ceux de l'hôpital des Enfants-Trouvés.\n\n<b>Révolution</b> : fermeture de l'hôpital Saint-Jacques ; le bâtiment est d'abord utilisé comme entrepôt avant d'être vendu à partir de 1821.\n\n<b>1821</b>, l'administration des hôpitaux et hospices civils procède à sa vente par lots." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Saint-Julien-le-Pauvre", lat: 48.85210, lng: 2.34702, ouverture: 1655, fermeture: 1928, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/125_Saint-Julien-le-Pauvre.pdf", histoire: "<b>début XIIe siècle</b> : les biens et les ruines de l'ancienne église Saint-Julien-le-Pauvre (ou Saint-Julien-l'Hospitalier) reviennent à l'abbaye de Longpont, dont les religieux décident la reconstruction.\n\n<b>1655</b> : vente de la nouvelle église Saint-Julien aux administrateurs de l'Hôtel-Dieu, qui envisagent d'y installer un hôpital pour convalescents ; le projet n'aboutit pas, mais l'église reste placée sous la dépendance de l'Hôtel-Dieu.\n\n<b>1826</b> : après avoir été transformée en lieu d'entrepôt durant la Révolution, l'église est rendue au culte et sert de chapelle à l'Hôtel-Dieu." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Saint-Lazare ", lat: 48.87564, lng: 2.35432, ouverture: 1700, fermeture: 1998, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/126_Saint-Lazare.pdf", histoire: "<b>XIIe siècle</b> : fondation par les frères hospitaliers de Saint-Ladre ou Saint-Lazare d'une maladrerie, la Léproserie Saint-Ladre, destinée au soin des lépreux.\n\n<b>première moitié du XVIIe siècle</b> : l'établissement est confié à Vincent de Paul et à la Congrégation de la Mission ; il sert de maison religieuse, maison d'aliénés, ainsi que de maison d'arrêt et de correction.\n\n<b>Révolution</b> : les bâtiments sont affectés à l'emprisonnement.\n\n<b>1811</b> : la prison de Saint-Lazare est placée sous l'autorité du département de la Seine.\n\n<b>1824</b> : l'édifice est rasé, puis reconstruit en 1834 par l'architecte Baltard pour accueillir une infirmerie destinée aux femmes atteintes de maux vénériens : l'Infirmerie spéciale.\n\n<b>1955</b> : une partie des lits est cédée à l'AP-HP.\n\n<b>1961</b> : l'ensemble des services est intégré au groupe hospitalier Lariboisière – Fernand-Widal – Saint-Lazare.\n\n<b>1998</b> : le site est restitué à la Ville de Paris." , groupe: "", specialites: "Maladies vénériennes", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Saint-Louis", lat: 48.87344, lng: 2.36767, ouverture: 1607, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FCND%2FFRAPHP075_CND_0191_0001.jpg",  legende_image:"Plan du royal et somptueux édifice de l'hospital de St-Louis vers 1681.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/127_Saint-Louis.pdf", histoire: "<b>1612</b> : Henri IV confie à l'architecte Claude Vellefaux la construction d'un sanitat rattaché à l'Hôtel-Dieu de Paris, destiné à l'isolement des pestiférés ; l'établissement ne fonctionne qu'en périodes d'épidémies.\n\n<b>1672</b> : ouverture de l'hôpital annexe qui reçoit le nom de Saint-Louis en souvenir du roi Louis IX, mort de la peste à Carthage en août 1270.\n\n<b>1773</b> : l'établissement devient permanent sous le nom d'hôpital Saint-Louis.\n\n<b>XVIIIe siècle</b> : il se spécialise dans le traitement des maladies syphilitiques et des affections cutanées.\n\n<b>1897</b> : création de l'école Lailler, dite école des teigneux, destinée à l'enseignement primaire des enfants soignés. \n\n<b>1980-1989</b> : réaménagements et construction de bâtiments neufs, selon les plans des les architectes D. Badani et P. Roux-Dorlut." , groupe: "AP-HP. Nord-Université Paris Cité", specialites: "Hématologie, dermatologie, oncologie, greffes de moelle, maladies infectieuses", decouverte_1: "Système HLA (complexe majeur d'histocompatibilité) | 1958-1965 | Pr Jean Dausset (Prix Nobel de médecine 1980)", decouverte_2: "Première greffe de moelle osseuse à partir de cellules de sang de cordon ombilical | 1988 | Pr Eliane Gluckman", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "https://www.musee-collections.aphp.fr/app/photopro.sk/aphp/doclist?prms_treelist=rootNode%3D2%26openNodes%3D%253A3%253A3263%253A381%26caller_id%3Ddoclist%26search%3Dmcpid%2B%253A%2B%25223270%2522&psearch=mcpid%20%3A%20%221102%22&mcpid=1102" },
{ nom: "Saint-Merry ", lat: 48.85970, lng: 2.35181, ouverture: 1783, fermeture: 1873, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/128_Saint-Merry.pdf", histoire: "<b>1783</b> : fondation de l'hospice Saint-Merry, installé dans une maison du cloître Saint-Merry, près de la rue Brisemiche ; son aménagement est confié à l'architecte De Voulges. Placé sous l'aadministration du curé de Saint-Merry, il est destiné au soin des indigents de la paroisse.\n\n<b>1873</b> : fermeture de la maison hospitalière." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Saint-Vincent-de-Paul", lat: 48.83699, lng:  2.33444, ouverture: 1814, fermeture: 2011, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F50FI%2FFRAPHP075_50FI_0041.jpg",  legende_image:"L'entrée en 1991.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/130_Saint-Vincent-de-Paul.pdf", histoire: "<b>1814</b>, l'Oratoire devient le nouvel hospice des Enfants Trouvés.\n\n<b>1838</b>, prend le nom d'hospice des Enfants Trouvés et Orphelins.\n\n<b>29</b>, renommé hospice des Enfants-Assistés.\n\n<b>1942</b>, devient l'hôpital-hospice Saint-Vincent-de-Paul.\n\n<b>1971</b>, rejoint le groupe hospitalier Saint-Vincent-de-Paul – La Roche-Guyon.\n\n<b>1999</b>, le groupe fusionne avec le groupe hospitalier Cochin.\n\n<b>2011</b>, fermeture définitive." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Salpêtrière (Hospice de la)", lat: 48.83891, lng:  2.36727, ouverture: 1657, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F76FI%2FFRAPHP075_76FI_068.jpg",  legende_image:"L'Hôpital de la Salpêtrière, XVIIIe s.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/131_Salpêtrière.pdf", histoire: "<b>1656</b> : par édit, Louis XIV fait don des bâtiments du Petit-Arsenal, dans le quartier Saint-Victor, à l'administration de l'Hôpital général.\n\n<b>1657</b> : ouverture dans ces bâtiments de la maison de la Salpêtrière, établissement d'assistance et refuge destiné aux indigentes et infirmes, en particulier femmes aliénées, hystériques, paralytiques et incurables.\n\n<b>1677</b> : les architectes Louis Le Vau et Libéral Bruant érigent succèssivement une église en lieu et place de la chapelle Saint-Denis.\n\n<b>1680-1684</b> : édification de la maison de la Force.\n\n<b>1780-1787</b> : construction d'une infirmerie par l'architecte Payen.\n\n<b>1794</b> : début du développement des services neurologiques ; l'hôpital s'oriente progressivement vers la neuropsychiatrie au cours du XIXe siècle.\n\n<b>1823</b> : l'établissement est renommé hospice de la Vieillesse-Femmes par le Conseil général des hospices.\n\n<b>1885</b> : renommé hospice de la Salpêtrière.\n\n<b>1964</b> : fusion des hôpitaux mitoyens la Pitié et la Salpêtrière pour former le groupe hospitalier la Pitié – la Salpêtrière, devenu Pitié-Salpêtrière. " , groupe: "AP-HP. Sorbonne Université", specialites: "Neurologie, neuropsychiatrie, psychiatrie (vocation historique femmes)", decouverte_1: "Description de la sclérose en plaques | 1868 | Pr Jean-Martin Charcot & Alfred Vulpian", decouverte_2: "Libération des aliénés de leurs chaînes (réforme psychiatrique) | 1794 | Dr Philippe Pinel", url_archives: { nom: "San Salvadour", lat: 43.08465, lng: 6.11162, ouverture: 1922, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FSSL%2FFRAPHP075_SSL_3FI4_067.jpg",  legende_image:"Entrée de l'hôpital en 1993.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/06/San-Salvadour.pdf", histoire: "<b>1905</b> : acquisition et transformation par la religieuse Sœur Candide du château de San Salvadour en sanatorium pour enfants atteints de tuberculose.\n\n<b>1922</b> : la propriété est acquise par la ville de Paris, dont une partie est confiée à l'Assistance publique ; l'établissement est renommé hôpital marin de la Ville de Paris.\n\n<b>1924</b> : la totalité de la propriété est remise à l'Assistance publique.\n\n<b>1960</b> : reconversion progressive en hôpital spécialisé dans la prise en charge des jeunes polyhandicapés." , groupe: "", specialites: "Polyhandicap, soins aux personnes lourdement handicapées", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },

const legend = L.control({ position: 'bottomright' });

legend.onAdd = function () {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <div style="background:white;padding:8px;border-radius:5px;box-shadow:0 0 5px rgba(0,0,0,0.3);font-size:14px;">
      <div style="margin-bottom:3px;font-size:11px;color:#888;font-style:italic;">Cliquer pour filtrer</div>
      <div id="leg-actif" data-filtre="actif" style="cursor:pointer;padding:3px 5px;border-radius:4px;transition:background 0.2s;">
        <span style="display:inline-block;width:12px;height:12px;background:blue;border-radius:50%;margin-right:6px;"></span>
        Établissement en activité
      </div>
      <div id="leg-ferme" data-filtre="ferme" style="cursor:pointer;padding:3px 5px;border-radius:4px;margin-top:3px;transition:background 0.2s;">
        <span style="display:inline-block;width:12px;height:12px;background:red;border-radius:50%;margin-right:6px;"></span>
        Ancien établissement AP-HP
      </div>
      <div id="leg-detruit" data-filtre="detruit" style="cursor:pointer;padding:3px 5px;border-radius:4px;margin-top:3px;transition:background 0.2s;">
        <span style="display:inline-block;width:12px;height:12px;background:black;border-radius:50%;margin-right:6px;"></span>
        Établissement détruit/rasé
      </div>
    </div>
  `;

  // Gestion des clics APRÈS insertion dans le DOM
  setTimeout(() => {
    ["leg-actif","leg-ferme","leg-detruit"].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener("mouseenter", () => {
        if (!el.classList.contains("leg-actif-on")) el.style.background = "#f0f0f0";
      });
      el.addEventListener("mouseleave", () => {
        if (!el.classList.contains("leg-actif-on")) el.style.background = "";
      });
      el.addEventListener("click", () => {
        const filtre = el.dataset.filtre;
        // Toggle : si déjà actif on réinitialise, sinon on active
        if (filtreStatut === filtre) {
          filtreStatut = null;
          el.style.background = "";
          el.style.outline = "";
        } else {
          filtreStatut = filtre;
          // Réinitialiser les autres
          ["leg-actif","leg-ferme","leg-detruit"].forEach(otherId => {
            const other = document.getElementById(otherId);
            if (other) { other.style.background = ""; other.style.outline = ""; }
          });
          el.style.background = "#e0eaff";
          el.style.outline = "2px solid #4a90d9";
        }
updateMap(
  parseInt(document.getElementById("yearStart").value),
  parseInt(document.getElementById("yearSlider").value)
);
      });
    });
  }, 300);

  return div;
};

function buildPopupHtml(e) {
  let html = `<strong>${e.nom}</strong>`;

  if (e.images) {
    html += `
      <img
        src="${e.images}"
        alt="${e.nom}"
        class="popup-image"
        onclick="openImageOverlay('${e.images}', '${e.nom}')"
      >
      <div class="popup-image-caption">
        ${e.legende_image || ""}
      </div>
    `;
  }

  return html;
}
function createMarker(e, couleur) {

// fermé
else if (couleur === "red") {
  icon = iconRouge;
}

  const marker = L.marker([e.lat, e.lng], {

  });

  marker

input.addEventListener("input", () => {
  const q = input.value.trim().toLowerCase(); // texte tapé en minuscules

// Minimum 3 lettres pour lancer la recherche
  if (q.length < 3) {
    resultsBox.style.display = "none";
    return;
  }
  // Filtrage des établissements
  const matches = searchIndex
    .filter(e => e.nom.toLowerCase().includes(q))
    .slice(0, 10); // limite à 10 résultats maximum

  renderResults(matches); // affiche la liste
});
function renderResults(list) {
  resultsBox.innerHTML = "";

  if (!list.length) {
    resultsBox.style.display = "none";
    return;
  }

  list.forEach(e => {
    const div = document.createElement("div");
    div.textContent = e.nom;
    div.className = "search-result";

    div.addEventListener("click", () => selectEtablissement(e));

    resultsBox.appendChild(div);
  });

  resultsBox.style.display = "block";
}

function showTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    const ids = ['histoire', 'medical', 'ressources'];
    btn.classList.toggle('active', ids[i] === tabId);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById('tab-' + tabId);
  if (panel) panel.classList.add('active');
}

/* =========================
   Filtre statut (légende cliquable)
   ========================= */
let filtreStatut = null; // null = tout afficher | "actif" | "ferme" | "detruit"
// ── Filtre GHU ──────────────────────────────────────────
let filtreGHU = "__avec_groupe__"; // au démarrage : seulement les ets avec GHU

const SEUIL_DISTANCE_GHU_KM = 50; // ← tu peux modifier ce chiffre librement

const COULEURS_GHU = {
  "AP-HP. Nord-Université Paris Cité":                        "#2E7D32",
  "AP-HP. Centre-Université Paris Cité":                      "#66BB6A",
  "AP-HP. Sorbonne Université":                               "#E91E63",
  "AP-HP. Université Paris-Saclay":                           "#FF9800",
  "AP-HP. Hôpitaux Universitaires Henri-Mondor":              "#29B6F6",
  "AP-HP. Hôpitaux Universitaires Paris Seine-Saint-Denis":   "#00BCD4"
};

let lignesGHU = []; // stocke les polylines tracées sur la carte

function distanceKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
            Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function tracerLignesGHU(ghuNom, etablissementsVisibles) {
  // Nettoyer les lignes précédentes
  lignesGHU.forEach(l => map.removeLayer(l));
  lignesGHU = [];

  if (!ghuNom) return;

  const couleur = COULEURS_GHU[ghuNom] || "#888";
  const membres = etablissementsVisibles.filter(e => e.groupe === ghuNom);

  if (membres.length < 2) return;

  // Calcul du centre géographique du GHU
  const latMoy = membres.reduce((s, e) => s + e.lat, 0) / membres.length;
  const lngMoy = membres.reduce((s, e) => s + e.lng, 0) / membres.length;

  // Séparer proches et éloignés
  const proches = membres.filter(e => distanceKm(e.lat, e.lng, latMoy, lngMoy) <= SEUIL_DISTANCE_GHU_KM);

  if (proches.length < 2) return;

  // Trier par longitude pour tracer une chaîne géographique
  proches.sort((a, b) => a.lng - b.lng);

  for (let i = 0; i < proches.length - 1; i++) {
    const ligne = L.polyline(
      [[proches[i].lat, proches[i].lng], [proches[i+1].lat, proches[i+1].lng]],
      { color: couleur, weight: 3, opacity: 0.8 }
    ).addTo(map);
    lignesGHU.push(ligne);
  }
}

function updateMap(yearBegin, year) {
  if (yearBegin === undefined) yearBegin = 829;
  markersLayer.clearLayers();

  // Récupère la valeur du filtre type sélectionné
  const typeSelectionne = document.getElementById("typeFilter")
    ? document.getElementById("typeFilter").value
    : "";

  // Récupère le filtre GHU
  const ghuSelectionne = document.getElementById("ghuFilter")
    ? document.getElementById("ghuFilter").value
    : filtreGHU;
  const ghuActif = ghuSelectionne !== "" ? ghuSelectionne : filtreGHU;

  for (let i = 0; i < etablissements.length; i++) {
    const e = etablissements[i];
    const type = (e.type || "").toLowerCase().trim();
    const ouverture = Number(e.ouverture);
    const fermeture = e.fermeture !== null && e.fermeture !== ""
      ? Number(e.fermeture)
      : Infinity;

    // Filtre par statut (légende cliquable)
    if (filtreStatut !== null) {
      const estDetruit = (e.detruit || "").toLowerCase() === "oui";
      const ouvertureNum = Number(e.ouverture);
      const fermetureNum = e.fermeture !== null && e.fermeture !== "" ? Number(e.fermeture) : Infinity;
      const estFerme = year >= fermetureNum;
      const estActif = !estFerme && !estDetruit;
      if (filtreStatut === "actif"   && !estActif)   continue;
      if (filtreStatut === "ferme"   && (!estFerme || estDetruit)) continue;
      if (filtreStatut === "detruit" && !estDetruit) continue;
    }

// Filtre GHU
    if (ghuActif === "__avec_groupe__" && (!e.groupe || e.groupe.trim() === "")) continue;
    if (ghuActif !== "__avec_groupe__" && ghuActif !== "" && e.groupe !== ghuActif) continue;

    // Filtre par type (comparaison normalisée : sans accent, minuscules)
    if (typeSelectionne !== "") {
      const typeNorm = type
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .toLowerCase().trim();
const typesConnus = ["hopital", "fondation", "ecole", "musee scientifique", "orphelinat", "retraite", "sanatorium", "services generaux"];
      if (typeSelectionne === "autre") {
        if (typesConnus.includes(typeNorm)) continue;
      } else {
        if (typeNorm !== typeSelectionne) continue;
      }
    }

    // Déterminer si l'établissement doit être visible
const ouvert = ouverture <= year && (e.fermeture === null || e.fermeture === "" || Number(e.fermeture) >= yearBegin);
    const ferme = year >= fermeture;

    if (ouvert) {
      let couleur = "blue"; // par défaut : actif

      if (ferme) {
        couleur = "red";
      }

// if (e.type === "musée") { couleur = COULEUR_MUSEE; } // désactivé – discussions en cours

      const marker = createMarker(e, couleur);
      marker.addTo(markersLayer);
      markersIndex[normalize(e.nom)] = marker;
      markersIndex[e.nom.trim().toLowerCase()] = marker;
    }
  }

// Tracer les lignes GHU si un GHU est sélectionné
  const ghuPourLignes = document.getElementById("ghuFilter")

  const etablissementsVisibles = etablissements.filter(e =>

// Curseur de fin → met à jour le champ texte
slider.addEventListener("input", () => {
  let yearEnd = parseInt(slider.value);
  let yearBegin = parseInt(sliderStart.value);
  if (yearEnd < yearBegin) { yearEnd = yearBegin; slider.value = yearEnd; }
  label.value = yearEnd;
  updateMap(yearBegin, yearEnd);
});

// Champ texte de fin → met à jour le curseur
label.addEventListener("change", () => {
  let yearEnd = Math.min(2026, Math.max(829, parseInt(label.value) || 2026));
  let yearBegin = parseInt(sliderStart.value);
  if (yearEnd < yearBegin) { yearEnd = yearBegin; }
  label.value = yearEnd;
  slider.value = yearEnd;
  updateMap(yearBegin, yearEnd);
});

// Curseur de début → met à jour le champ texte
sliderStart.addEventListener("input", () => {
  let yearBegin = parseInt(sliderStart.value);
  let yearEnd = parseInt(slider.value);
  if (yearBegin > yearEnd) { yearBegin = yearEnd; sliderStart.value = yearBegin; }
  labelStart.value = yearBegin;
  updateMap(yearBegin, yearEnd);
});

// Champ texte de début → met à jour le curseur
labelStart.addEventListener("change", () => {
  let yearBegin = Math.min(2026, Math.max(829, parseInt(labelStart.value) || 829));
  let yearEnd = parseInt(slider.value);
  if (yearBegin > yearEnd) { yearBegin = yearEnd; }
  labelStart.value = yearBegin;
  sliderStart.value = yearBegin;
  updateMap(yearBegin, yearEnd);
});

function zoomEtAfficher(nomEtab) {
  // Trouver l'établissement dans la liste
  const etab = etablissements.find(e => e.nom === nomEtab);
  if (!etab) return;

  // Mettre à jour le volet droit
  afficherInfos(etab);

  // Zoom + popup sur la carte
  const latEtab = etab.lat;
  const lngEtab = etab.lng;

  const afficherEtiquette = () => {
    const etiquette = L.tooltip({
      permanent: true,
      direction: "top",
      offset: [0, -46],
      className: "etiquette-recherche"
    })
    .setContent(nomEtab)
    .setLatLng([latEtab, lngEtab])
    .addTo(map);

    setTimeout(() => map.removeLayer(etiquette), 3000);

    const markerFrais = markersIndex[nomEtab.trim().toLowerCase()]
                     || markersIndex[normalize(nomEtab)];
    if (markerFrais) markerFrais.openPopup();
  };

  if (map.getZoom() >= 14) {
    map.setView([latEtab, lngEtab], 17);
    setTimeout(afficherEtiquette, 500);
  } else {
    map.once("zoomend", () => {
      setTimeout(afficherEtiquette, 300);
    });
    map.setView([latEtab, lngEtab], 17);
  }
}
