   ======================== */
@media (max-width: 768px) {

    height: 4px;
    background: #ccc;
    border-radius: 2px;

}

@media (min-width: 769px) {

{ nom: "Allart-de-Fourment", lat: 50.26956, lng: 2.30154, ouverture: 1936, fermeture: 1962, type: "fondation", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/01/Allart-de-Fourment.pdf", histoire: "<b>1935</b> : legs du château de Cercamps, situé à Frévent (Pas-de-Calais) par Madame Allart de Fourment à l'administration publique.\n\n<b>1936</b> : ouverture d'une maison de convalescence destinée aux jeunes filles de 5 à 12 ans.\n\n<b>1939</b> : réquisitionné en septembre par l'armée britannique, l'établissement ferme ses portes.\n\n<b>1945</b> : cessation défintive d'activité, la tentative de réouverture en 1942 ayant échoué.\n\n<b>1961</b> : transfert de l'établissement à la préfecture de Paris ; reconvertion en centre de formation professionnelle pour les jeunes filles sous tutelle de l'Assistance publique.\n\n<b>1968</b> : transfert définitivement effectif." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },

{ nom: "Andral (Bastion 27)", lat: 48.89488, lng: 2.39026, ouverture: 1906, fermeture: 1933, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F4%2FFRAPHP075_C660_4_049.jpg",  legende_image:"L'hôpital vers 1900.", url:" https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/05/Andral-Bastion27.pdf", histoire: "<b>1903</b> : ouverture de l'hôpital du bastion 27 dans l'ancienne caserne d'octroi du bastion 27, mise à disposition de l'administration hospitalière.\n\n<b>1906</b> : l'établissement est rebaptisé hôpital Andral, en hommage à Gabriel Andral (1797-1876), médecin, professeur de pathologie à la Faculté de médecine de Paris.\n\n<b>1915</b> : réquisition temporaire par l'autorité militaire.\n\n<b>1933</b> : fermeture définitive de l'hôpital Andral ; l'ancienne caserne du bastion 27 est rendue à la Ville de Paris." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Anselme-Payen (fondation)", lat: 48.84461, lng: 2.29107, ouverture: 1874, fermeture: 1972, type: "fondation", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/05/Anselme-Payen.pdf", histoire: "<b>1874</b> : ouverture de la fondation Anselme-Payen dans le 15e arrondissement de Paris à l'initiative de Mademoiselle Elise Payen, dans la maison familiale ; d'abord école de jeunes filles, elle est rapidement transformée en hospice.\n\n<b>1972</b> : rattachement de l'établissement au Bureau d'aide sociale de la Ville de Paris, en application de la loi du 31 décembre 1970 portant réforme hospitalière." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Antoine-Béclère", lat: 48.78869, lng: 2.25464, ouverture: 1971, fermeture: null, type: "hopital", detruit:"oui",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F14FI%2FFRAPHP075_14FI_092.jpg",  legende_image:"Entrée principale par la rue de la porte de Trivaux, 1973.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/05/Antoine-Beclere.pdf", histoire: "<b>1963</b> : lancement des études en vue de la création de l'hôpital de Clamart.\n\n<b>1967-1971</b> : construction, sur les plans de l'architecte Henri Pottier, d'un hôpital vertical, emblématique de l’architecture hospitalière des années 1960.\n\n<b>1970</b> : avant même son ouverture, l'établissement est nommé hôpital Antoine-Béclère, en hommage au fondateur de la radiologie française (1856-1939). \n\n<b>1980-1990</b> : développement et extension des activités de l'hôpital, notamment avec l'agrandissement du service de radiologie en 1988." , groupe: "AP-HP. Université Paris-Saclay", specialites: "Procréation médicalement assistée (PMA), maternité type III, pneumologie, cardiologie", decouverte_1: "Premier bébé éprouvette de France (Amandine) | 1982 | Pr Jacques Testart & Dr René Frydman", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Antoine-Chantin", lat: 48.82736, lng: 2.32238, ouverture: 1940, fermeture: 1970, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/01/Antoine-Chantin.pdf", histoire: "<b>1940</b> : transformation de la clinique Antoine-Chantin, située dans le 14e arrondissement de Paris, en hôpital temporaire pour les malades de l'Assistance publique. Elle fait partie des institutions privées parisiennes mobilisées pour pallier le manque de lits durant la Seconde Guerre mondiale.\n\n<b>1954</b> : prorogation du bail ; l'Assistance publique est autorisée à réoccuper la clinique à compter du 1er janvier. Le service de chirurgie, resté actif après 1945, est maintenu. Rattaché administrativement à l'hôpital Broussais, l'hôpital Antoine-Chantin dispose en 1958 de 121 lits de chirurgie et de 10 lits de crèche.\n\n<b>fin des années 1970</b> : démolition des bâtiments et réintégration des services à l'hôpital Broussais, entraînant la constitution du groupe hospitalier Broussais – Antoine-Chantin." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Approvisionnement central", lat: 48.76249, lng: 2.35808, ouverture: 1853, fermeture: null, type: "services generaux", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1853</b> : création de l'Approvisionnement central qui réorganise la fourniture des hôpitaux, jusque-là gérée par l'économe de chaque établissement. Installé dans l'un des pavillons des Halles à Paris, il se assure principalement l'achat des denrées alimentaires.\n\n<b>1969</b> : transfert du service sur le site de Rungis.\n\n<b>1989</b> : fusion avec le magasin central pour former l'Approvisionnement Central Hôtelier Alimentaire (ACHA)." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Armand-Trousseau", lat: 48.84222, lng: 2.40556, ouverture: 1901, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F54FI%2FFRAPHP075_54FI_091.jpg",  legende_image:"Entrée de l'hôpital en 1966.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/05/Armand-Trousseau.pdf", histoire: "<b>1901</b> : le nouvel hôpital Trousseau entre en service le 15 mars, reconstruit par les architectes Maistrasse et Berger au 26 avenue du Dr Arnold Netter (12e arrondissement de Paris)." , groupe: "AP-HP. Sorbonne Université", specialites: "Pédiatrie, hématologie, mucoviscidose", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Aubervilliers (hôpital temporaire d’)", lat: 48.89880, lng: 2.332, ouverture: 1884, fermeture: 1904, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F4%2FFRAPHP075_C660_4_008.jpg",  legende_image:"L'hôpital temporaire vers 1884-1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/43_Claude-Bernard.pdf", histoire: "<b>1884</b> : ouverture de l'hôpital temporaire d'Aubervilliers, destiné à accueillir des convalescents des hôpitaux parisiens, notamment lors des épidémies de choléra.\n\n<b>1901</b>: adoption d'un projet de reconstruction complète de l'hôpital.\n\n<b>1904</b>: démolition des bâtiments existants pour permettre les nouveaux travaux ; le 12 juillet 1904, Gustave Mesureur, directeur de l'Assistance publique, procède symboliquement à leur destruction par le feu afin d'assainir le site." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Avicenne", lat: 48.9095, lng:  2.5009, ouverture: 1979, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F15FI%2FFRAPHP075_15FI_004.jpg",  legende_image:"Entrée de l'hôpital en 1935.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/05/Avicenne.pdf", histoire: "<b>1931-1935</b> : construction de l'hôpital franco-musulman à Bobigny par les architectes Mantout et Azéma. Établissement relevant de la préfecture de la Seine, il est destiné à l'hospitalisation des patients musulmans originaires de l'Afrique du Nord vivant à Paris et en banlieue.\n\n<b>1935</b> : inauguration de l'établissement en mars.\n\n<b>1961</b> : rattachement à l'Assistance publique par décret du 11 octobre. L'hôpital perd sa vocation initiale pour devenir un établissement de circonscription.\n\n<b>1979</b> : l'administration lui attribue le nom d'hôpital Avicenne, en mémoire d'Abou Ali Al Husayn Ibn Sina dit Avicenne (980-1037), théologien, anatomiste et physicien originaire du Turkestan." , groupe: "AP-HP. Hôpitaux Universitaires Paris Seine-Saint-Denis", specialites: "Cancérologie, obésité, pneumologie, hématologie, maladies infectieuses tropicales", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Bastion 29", lat: 48.89752, lng: 2.38799, ouverture: 1893, fermeture: 1934, type: "hopital", detruit:"oui",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F4%2FFRAPHP075_C660_4_047.jpg",  legende_image:"vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/03/Bastion29.pdf", histoire: "<b>1893</b> : une partie de la caserne d'octroi du bastion 29, située boulevard Macdonald, est aménagée pour accueillir un service de soins. Mise à disposition de l'Assistance publique par l'autorité militaire, elle devient l'hôpital du bastion 29.\n\n<b>1894</b> : ouverture de l'hôpital, destiné d'abord au traitement des femmes atteintes de variole. Dès l'année suivante, son activité se spécialise dans la prise en charge de la diphtérie et de l'érysipèle.\n\n<b>1934</b> : fermeture définitive de l'hôpital du bastion 29, suivie peu après de la démolition intégrale des bâtiments." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Bastion 36", lat: 48.90090, lng: 2.34624, ouverture: 1891, fermeture: 1894, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/03/Bastion36.pdf", histoire: "<b>1891</b> : dans un contexte de pandémie de grippe dite grippe russe, et afin de désengorger les hôpitaux, une caserne d'octroi située près de la porte de Clignancourt est mise provisoirement à la disposition de l'Assistance publique.\n\n<b>1894</b> : restitution de l'hôpital temporaire le 31 mars, le Génie ayant réclamé la restitution du poste-caserne à l'été 1893." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Baudelocque (clinique)", lat: 48.83825, lng: 2.33706, ouverture: 1889, fermeture: 2007, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/06/Baudelocque.pdf", histoire: "<b>1886</b> : projet de création d'une seconde clinique obstétricale à Paris ; le conseil de la Faculté de médecine propose l'implantation sur un terrain du domaine de la Maternité, boulevard Port-Royal.\n\n<b>1890</b> : inauguration de la clinique Baudelocque, nommée en hommage au médecin accoucheur, sur le site de la Maternité de Port-Royal.\n\n<b>1922-1929</b> : reconstruction de la maternité sur les plans de l'architecte Émile Laurent.\n\n<b>années 1960</b> : rapprochement puis rattachement des maternités Baudelocque et Port-Royal à l'hôpital Cochin.\n\n<b>2007</b> : démolition complète des bâtiments de la clinique Baudelocque." , groupe: "", specialites: "Obstétrique", decouverte_1: "Communication sur « la puériculture intra-utérine »  | 1895 | Pr Adolphe Pinard", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Beaujon", lat: 48.90836, lng: 2.30821, ouverture: 1935, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FBJN%2FFRAPHP075_BJN_3FI4_0077.jpg",  legende_image:"Entrée et loge du concierge en 1935.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/18_Beaujon-Clichy.pdf", histoire: "<b>1930</b> : ouverture d'un concours le 9 août pour le remplacement de l'hôpital Beaujon à Paris, devenu vétuste et inadapté à la poursuite de ses activités.\n\n<b>1932</b> : lancement des travaux à Clichy sous la direction de MM. Plousey, Cassan et Jean Walter. Le projet constitue un jalon de l'architecture hospitalière, avec le premier hôpital vertical monobloc non pavillonnaire  en France.\n\n<b>1935</b> : mise en service de l'établissement le 15 février." , groupe: "AP-HP. Nord-Université Paris Cité", specialites: "Addictologie, hépatologie, neurochirurgie, orthopédie, stomatologie", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Beaujon", lat: 48.87533, lng: 2.30609, ouverture: 1784, fermeture: 1937, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FBJN%2FFRAPHP075_BJN_3FI4_0410.jpg",  legende_image:"Salle d'attente en 1910.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/17_Beaujon-Paris-1784-1937.pdf", histoire: "<b>1784</b> : fondation à Paris, faubourg du Roule, par Nicolas Beaujon de l'hospice Saint-Nicolas, bientôt appelé hospice Beaujon en hommage à son bienfaiteur. Conçu sur les plans de l'architecte Girardin, il assure l'entretien et l'instruction de jeunes orphelins.\n\n<b>1795</b> : à la suite du décret du 17 janvier 1795, l'établissement est transformé en service hospitalier et prend le nom d'hôpital du Roule par décision de la Convention.\n\n<b>1803</b> : renommé hôpital Beaujon par le conseil général des hospices, il devient une véritable maison de soins.\n\n<b>1937</b> : fermeture définitive de l'établissement hospitalier après le transfert de ses activités vers le nouvel hôpital Beaujon de Clichy. Les bâtiments sont ensuite occupés par un service de la préfecture de Police parisienne et l'école pratique des gardiens de la paix." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Belleville (hospice)", lat: 48.87469, lng: 2.39804, ouverture: 1853, fermeture: 1972, type: "retraite", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/19_Belleville.pdf", histoire: "<b>1851</b> : fondation par la commune de Belleville d'un hospice pour personnes âgées au 82 rue Pelleport.\n\n<b>1853</b> : inauguration de l'hospice de Belleville le 15 août ; sa gestion est confiée au bureau de bienfaisance de l'arrondissement.\n\n<b>1860</b> :  après l'annexion de Belleville à Paris, l'établissement, alors très dégradé, est rattaché à l'Assistance publique qui en assure la restauration.\n\n<b>1972</b> : rattachement au Bureau d'aide sociale de la Ville de Paris, conformément à la loi du 31 décembre 1970 portant réforme hospitalière.\n\n<b>1983</b> : installation sur le site de l'EHPAD Sarah Weill-Raynal par la Ville de Paris, établissement toujours en activité." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Beloeuil (fondation)", lat: 48.88708, lng: 2.27318, ouverture: 1903, fermeture: 1972, type: "retraite", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/20_Beloeuil.pdf", histoire: "<b>1903</b> : ouverture de la fondation Beloeuil à Neuilly-sur-Seine, sur l'ancienne propriété d'Aline-Augustine Beloeuil, dont le legs est à l'origine de l'établissement. Destinée à accueillir et entretenir 50 jeunes filles, femmes ou veuves infirmes incurables, elle est administrativement rattachée à la maison de retraite Galignani.\n\n<b>1960</b> : la fondation Beloeuil-Miller assure la gestion de 106 lits de long séjour.\n\n<b>1972</b> : en application du décret du 30 décembre 1970, l'établissement est rattaché au Bureau d'aide sociale de la Ville de Paris." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Berck-sur-mer ", lat: 50.40180, lng: 1.55744, ouverture: 1861, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F16FI%2FFRAPHP075_16FI_041.jpg",  legende_image:"Galeries de cure d'air en 1951.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/21_Berck.pdf", histoire: "<b>1861</b> : mise en place d'un premier hôpital expérimental pour enfants atteints de rachitisme et d'affections scrofuleuses, constitué de baraquements en bois.\n\n<b>1867</b> : construction d'un établissement plus vaste sur les plans de l'architecte Émile Lavezzari.\n\n<b>1869</b> : inauguration de l'hôpital Napoléon par l'impératrice Eugénie de Montijo, l'établissement dispose alors d'environ 500 lits.\n\n<b>1870</b> : l'hôpital prend le nom d'hôpital maritime de la Ville de Paris.\n\n<b>1894-1910</b> : agrandissements et reconstructions successives, portant la capacité à plus de 1 000 lits.\n\n<b>1961</b> : renommé hôpital maritime de Berck, l'établissement se spécialise en chirurgie orthopédique et en rééducation fonctionnelle." , groupe: "AP-HP. Université Paris-Saclay", specialites: "Rééducation, orthopédie, polychandicap", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Bicêtre", lat: 48.80986, lng: 2.35746, ouverture: 1885, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FBCT%2FFRAPHP075_BCT_3FI4_0130.jpg",  legende_image:"Entrée principale vue de la cour intérieure en 1964.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/22_Bicêtre.pdf", histoire: "<b>XVIIe siècle</b> : acquisition par le roi Louis XIII d'un domaine destiné à la construction d'un hôpital pour soldats invalides.\n\n<b>1634</b> : ouverture de la commanderie de Saint-Louis. \n\n<b>1656</b> : rattachement à l'Hôpital général de Paris ; la maison de Bicêtre devient un établissement d'enfermement pour indigents, combinant fonction d'hôpital, d'asile, de maison de correction et de détention.\n\n<b>1823</b> : par arrêté du 4 juin, le conseil général des hospices lui attribue le nom d'hospice de la Vieillesse-Hommes. \n\n<b>1885</b> : établissement de la dénomination Bicêtre.\n\n<b>1950</b> : transformation progressive de l'hospice en hôpital de soins aigus.\n\n<b>1952</b> : modernisation et aménagement de deux pavillons en service hospitalier pour enfants." , groupe: "AP-HP. Université Paris-Saclay", specialites: "Neurologie, neurochirurgie, chirurgie vasculaire, immunopathologie, maternité type III", decouverte_1: "Localisation du centre du langage (aire de Broca) | 1861 | Pr Paul Broca", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "https://www.musee-collections.aphp.fr/app/photopro.sk/aphp/doclist?prms_treelist=rootNode%3D2%26openNodes%3D%253A3%253A3263%26caller_id%3Ddoclist%26search%3Dmcpid%2B%253A%2B%25223270%2522&psearch=mcpid%20%3A%20%22181%22&mcpid=181" },
{ nom: "Bichat ", lat: 48.89957, lng: 2.33228, ouverture: 1882, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FBCH%2FFRAPHP075_BCH_3FI4_0326.jpg",  legende_image:"Entrée de l'hôpital en 1990.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/23_Bichat.pdf", histoire: "<b>1881</b> : installation de l'hôpital Bichat dans l'ancien poste-caserne du bastion 39, sur les fortifications du 18e arrondissement de Paris.\n\n<b>1882</b> : ouverture officielle de l'hôpital le 1er décembre.\n\n<b>1976-1980</b> : vastes travaux de modernisation en vue de l'ouverture du nouveau Bichat.\n\n<b>1988</b> : rattachement au groupe hospitalier Bichat-Claude-Bernard." , groupe: "AP-HP. Nord-Université Paris Cité", specialites: "Cardiologie, maladies infectieuses et tropicales, neurologie, pneumologie, urgences, greffes d'organe", decouverte_1: "Premier service de réanimation respiratoire en France (traitement de la poliomyélite) | 1954 | Pr Pierre Mollaret", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "https://www.musee-collections.aphp.fr/app/photopro.sk/aphp/doclist?prms_treelist=rootNode%3D2%26openNodes%3D%253A3%253A3263%253A381%26caller_id%3Ddoclist%26search%3Dmcpid%2B%253A%2B%25223270%2522&psearch=mcpid%20%3A%20%22182%22&mcpid=182" },
{ nom: "Bigottini (maison de retraite)", lat: 48.93015, lng: 2.50282, ouverture: 1906, fermeture: 1970, type: "retraite", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F17FI%2FFRAPHP075_17FI_02.jpg",  legende_image:"Entrée de l'hôpital en 1978.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/03/Bigottini.pdf", histoire: "<b>1903</b> : don de l'abbé Dumont à l'administration d'une propriété située à Aulnay-sous-Bois en vue de l'aménagement d'un nouvel hospice.\n\n<b>1906</b> : ouverture de l'établissement sous le nom de maison de retraite Bigottini, grâce aux legs du baron Alphonse de Rothschild et de François Bigottini.\n\n<b>1926</b> : installation de la fondation Millard sur le site de la maison de retraite Bigottini.\n\n<b>1970</b> : fusion avec l'hôpital René-Muret de Sevran pour former l'hôpital René-Muret – Bigottini.\n\n<b>2019</b> : intégration au groupe AP-HP Hôpitaux universitaires Paris Seine-Saint-Denis." , groupe: " AP-HP. Hôpitaux Universitaires Paris Seine-Saint-Denis", specialites: "Gérontologie", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Blanchisserie centrale", lat: 48.89859, lng: 2.38083, ouverture: 1906, fermeture: null, type: "services generaux", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F74FI%2FFRAPHP075_74FI_029.jpg",  legende_image:"Vue d'ensemble des chaînes en 1988.", url:"", histoire: "<b>1906</b> : création de la blanchisserie centrale, marquant la mise en place de buanderies de secteur chargées de regrouper le traitement du linge, jusque-là assuré localement par chaque établissement.\n\n<b>1946</b> : création au sein de la Pitié-Salpêtrière du Service central des blanchisseries (SCB), destiné à centraliser la gestion administrative et technique des buanderies et blanchisseries de secteur.\n\n<b>1973</b> : construction d'un second site dans le 19e arrondissement de Paris, boulevard Mac Donald." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Blanchisserie centrale", lat: 48.89859, lng: 2.38083, ouverture: 1973, fermeture: null, type: "services generaux", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1906</b> : création de la blanchisserie centrale, marquant la mise en place des buanderies de secteur chargées de regrouper le traitement du linge, jusque-là assuré localement par chaque établissement.\n\n<b>1946</b> : création, au sein de la Pitié-Salpêtrière, du Service central des blanchisseries (SCB), chargé de centraliser la gestion administrative et technique des buanderies et blanchisseries de secteur.\n\n<b>1973</b> : construction d'un second site dans le 19e arrondissement de Paris, boulevard Mac Donald." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Bon Secours", lat: 48.85439, lng: 2.38347, ouverture: 1846, fermeture: 1852, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1846</b> : prise à bail par le conseil général des hospices d'anciens bâtiments situés rue de Charonne, ayant accueilli l'ancien prieuré de Notre-Dame de Bon-Secours ; ouverture la même année de l'hôpital civil du Bon-Secours. À vocation générale, cet hôpital temporaire dispose dès sa mise en service, d'environ 200 lits de médecine et de chirurgie.\n\n<b>1852</b> : fermeture de l'établissement avant le terme prévu du bail entre les deux administrations. En 1863, les bâtiments sont partiellement réaffectés à un temple luthérien." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Bonar (orphelinat)", lat: 48.85159, lng: 2.34491, ouverture: 1872, fermeture: 1969, type: "orphelinat", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/25_Bonar.pdf", histoire: "<b>1866</b> : par décret du 28 février, Delphine-Désirée Bonar institue la ville de Paris légataire universelle, à charge de fonder un orphelinat pour jeunes filles dans le 12e arrondissement.\n\n<b>1872</b> : ouverture de l'orphelinat Bonar, installé rue de la Parcheminerie ; l'établissement accueille des orphelines pauvres nées à Paris, admises avant l'âge de 6 ans." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Boucherie centrale", lat: 48.83378 , lng: 2.35755, ouverture: 1849, fermeture: 1898, type: "services generaux", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1849</b> : ouverture de la boucherie centrale, installée au sein de l'abattoir dit de Villejuif, boulevard de l'Hôpital à Paris.\n\n<b>1898</b> : transfert de la boucherie centrale vers les abattoirs de Vaugirard, rue des Morillons, dans le 15e arrondissement de Paris. " , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Boucherie centrale", lat: 48.83231, lng: 2.30283, ouverture: 1898, fermeture: 1976, type: "services generaux", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F88FI%2FFRAPHP075_88FI_001.jpg",  legende_image:"Entrée vers 1970.", url:"", histoire: "<b>1898</b> : transfert de la boucherie centrale de Villejuif vers les abattoirs de Vaugirard, rue des Morillons, dans le 15e arrondissement de Paris. \n\n<b>1930</b> : création d'une triperie, suivie en 1931 par l'ouverture d'une charcuterie.\n\n<b>1976</b> : cessation définitive de l'activité." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Boucicaut ", lat: 48.84216, lng: 2.28414, ouverture: 1897, fermeture: 2000, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/30_Boucicaut-Paris.pdf", histoire: "<b>1894</b> : construction de l'hôpital Boucicaut dans le quartier Javel (15e arrondissement), conformément au legs universel de Madame veuve Boucicaut exprimées à l'Assistance publique. Conçu par les architectes Legros père et fils, l'ensemble adopte un plan pavillonaire, séparé des jardins, afin de limiter les contagions selon les principes hygiénistes inspirés de Pasteur. \n\n<b>1897</b> : inauguration de l'établissement en présence de Félix Faure. L'établissement à vocation générale compte alors 206 lits, dont quelques uns réservés au personnel du Bon Marché.\n\n<b>1986</b> : l'hôpital Boucicaut est intégré au groupe hospitalier Boucicaut-Vaugirard.\n\n<b>2000</b> : fermeture de l'hôpital et transfert des activités vers l'hôpital européen Georges-Pompidou." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Boucicaut (fondation)", lat: 50.68194, lng: 3.16631, ouverture: 1897, fermeture: 1925, type: "maternite", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F8%2FFRAPHP075_C660_8_159.jpg",  legende_image:"L'entrée vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/31_Boucicaut-Roubaix.pdf", histoire: "<b>1889</b> : l'Assistance publique accepte le legs Boucicaut en vue de fonder une maternité aux environs de Lille.\n\n<b>1897</b> : ouverture à Roubaix, boulevard de Cambrai, de l'établissement conçu par l'architecte Colier, sous le nom de fondation Boucicaut.\n\n<b>1925</b> : une convention confie la fondation Boucicaut à une association affiliée à la fédération des unions de familles nombreuses et des associations familiales du Nord, dite « Maternité Boucicaut et oeuvre des mères abandonnées une ».\n\n<b>1970</b> : une nouvelle convention organise la mise à bail entre l'administration, la caisse régionale de sécurité sociale du Nord et le bureau d'aide sociale de Roubaix.  " , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Boucicaut (hospice de Bellême)", lat: 48.37345, lng: 0.56762, ouverture: 1903, fermeture: 1961, type: "fondation", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/06/Boucicaut-Belleme.pdf", histoire: "<b>1887</b> : décès de Marguerite Boucicaut née Guérin, dont le testament prévoit la fondation d'un hospice à Bellême (Orne).\n\n<b>1903</b> : ouverture de l'établissement Boucicaut de Bellême, destiné à accueillir des femmes âgées ainsi que des jeunes filles dans un ouvroir externe.\n\n<b>1961</b> : transfert de l'hospice à la préfecture de Paris, en application du décret du 5 décembre 1961." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Boucicaut (maternité)", lat: 46.77720, lng: 4.84034, ouverture: 1886, fermeture: 1946, type: "maternite", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F8%2FFRAPHP075_C660_8_163.jpg",  legende_image:"Les bâtiments vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/28_Boucicaut-Chalon-sur-Sa%C3%B4ne.pdf", histoire: "<b>1889</b> : l'Assistance publique accepte le legs Boucicaut pour la création d'une maternité à proximité de Rouen.\n\n<b>1898</b> : inauguration de la maternité Boucicaut à Mont-Saint-Aignan, édifiée par l'architecte Gosselin. \n\n<b>1960</b> : faute d'activité insuffisante, la fondation Boucicaut de Mont-Saint-Aignan ferme.\n\n<b>1963</b> : une convention met la fondation Boucicaut à disposistion du centre hospitalier de Rouen pour 99 ans ; une maison de retraite y est ouverte." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Boucicaut (maternité)", lat: 49.47330, lng: 1.08145, ouverture: 1898, fermeture: 1960, type: "maternite", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F8%2FFRAPHP075_C660_8_149.jpg",  legende_image:"Les bâtiments vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/29_Boucicaut-Mont-Saint-Aignan.pdf", histoire: "<b>1889</b> : acceptation par l'Assistance publique du legs Boucicaut pour la création d'une maternité près de Rouen.\n\n<b>1898</b> : ouverture de la maternité Boucicaut de Mont-Saint-Aignan, construite par l'architecte Gosselin. \n\n<b>1960</b> : en raison d'une activité insuffisante, fermeture de la fondation Boucicaut de Mont-Saint-Aignan.\n\n<b>1963</b> : mise en place d'une convention pour la mise à disposition du centre hospitalier de Rouen de la fondation Boucicaut pour une durée de 99 ans ; ouverture de la maison de retraite Boucicaut." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Boulangerie centrale", lat: 48.83858, lng: 2.35335, ouverture: 1675, fermeture: 1974, type: "services generaux", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F97FI%2FFRAPHP075_97FI_092.jpg",  legende_image:"Paneterie, début XXe siècle.", url:"", histoire: "<b>1675</b> : la boulangerie centrale, d'abord établie à la Salpêtrière, est transférée à la maison de Scipion (5e arrondissement), ancienne demeure de Scipion Sardini, jusque-là affectée à l'accueil des indigents sous le nom d'hôpital Sainte-Marthe. Elle assure la fabrication du pain ainsi que la distribution de la viande et des chandelles pour les maisons rattachées à l'Hôpital général.\n\n<b>1797</b> : par arrêté du 12 thermidor an V, la fabrication du pain est centralisée pour l'ensemble des hôpitaux. La boulangerie centrale devient un véritable service d’intendance, chargé du stockage, de la mouture des grains de blé et de la cuisson du pain.\n\n<b>1974</b> : fermeture de la boulangerie centrale." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Boulard (fondation)", lat: 48.84445, lng: 2.41497, ouverture: 1830, fermeture: 1972, type: "retraite", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FD%2FD858%2FFRAPHP075_D_858_0011.jpg",  legende_image:"Hospice Saint-Michel (fondation Boulard), Fin XIXe siècle.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/129_Saint-Michel.pdf", histoire: "<b>1825</b> : le tapissier Michel-Jacques Boulard lègue aux Hospices civils une somme destinée à la création d'une maison de retraite.\n\n<b>1830</b> : inauguration de l'hospice Saint-Michel (dit aussi fondation Boulard), dans une bâtiment situé avenue Courteline, à la limite de Saint-Mandé ; l'établissement accueille douze Parisiens indigents de plus de soixante-dix ans ou atteints de maladies incurables.\n\n<b>1874</b> : legs de Mme Lenoir, née Jousseran ; la fondation Lenoir-Jousseran est annexée à l'hopice Saint-Michel. Les deux entités sont réunies sur le même site tout en conservant leur autonomie financière.\n\n<b>1960</b> : l'ensemble dispose de 239 lits réservés aux personnes âgées.\n\n<b>1972</b> : rattachement de l'établissement Lenoir-Jousseran- Boulard au Bureau d'aide sociale de la Ville de Paris, en application de la loi du 31 décembre 1970 portant réforme hospitalière. Le site accueille le SAMU social de Paris depuis 1996." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Bretonneau", lat: 48.89025, lng:  2.32994, ouverture: 1901, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F19FI%2FFRAPHP075_19FI_297.jpg",  legende_image:"Entrée de l'hôpital, rue Carpeaux en 1966.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/32_Bretonneau.pdf", histoire: "<b>1898-1900</b> : construction de l'hôpital Bretonneau, dans le 18e arrondissement de Paris, en remplacement de l'ancien hôpital Trousseau démoli en 1895. Le projet de l'architecte Paul Héneux est retenu ; l'établissement rend hommage au médecin Pierre Bretonneau.\n\n<b>1901</b> : inauguration du nouvel hôpital, dédié à la pédiatrie.  \n\n<b>1988</b> : fermeture de l'établissement ; les activités pédiatriques sont transférées à l'hôpital Robert-Debré.\n\n<b>2001</b> : ouverture du nouvel l'hôpital Bretonneau, désormais consacré à la gérontologie et doté d'un centre d'odontologie." , groupe: "AP-HP. Nord-Université Paris Cité", specialites: "Pédiatrie (vocation historique), gériatrie, odontologie", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Brévannes (hospice de)", lat: 48.74832, lng: 2.4853, ouverture: 1885, fermeture: 1950, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F26FI%2FFRAPHP075_26FI_044.jpg",  legende_image:"Pavillon des services généraux en 1933.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/55_Emile-Roux.pdf", histoire: "<b>1883</b> : l'Assistance publique acquiert auprès du baron Hottinger une propriété à Limeil-Brévannes (Val-de-Marne), comprenant château, dépendances et parc.\n\n<b>1885</b> : ouverture de l'hospice de Brévanne, destiné à l'accueil des personnes âgées, célibataires ou en couple.\n\n<b>1896-1899</b> : l'établissement s'agrandit avec la création d'un quartier pour malades chroniques, suivi d'un sanatorium pour adultes tuberculeux (1907) et d'un hospice pour enfants convalescents (1908).\n\n<b>1950</b> : par décret du 18 octobre 1950, l'ensemble des pavillons de Brévannes est réuni sous le nom de centre hospitalier Émile-Roux, en hommage à l'inventeur du traitement de la diphtérie." , groupe: "", specialites: "Gérontologie", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Broca", lat: 48.83436, lng: 2.34740, ouverture: 1893, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FBRC%2FFRAPHP075_BRC_3FI4_0040.jpg",  legende_image:"Entrée en 1969.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/33_Broca.pdf", histoire: "<b>1834</b> : acquisition par le conseil général des hospices de l'hôpital de Lourcine, initialement destiné aux soins des femmes atteintes de maladies vénériennes.\n\n<b>1893</b> : l'établissement prend le nom d'hôpital Broca, en hommage au chirurgien Paul Broca, fondateur de la Société d'anthropologie ; de nouveaux services, exclusivement féminins, y sont ouverts pour le traitement des affections dermatologiques et gynécologiques. \n\n<b>1918</b> : l'hôpital Broca est grâvement endommagé lors du raid aérien du 30 janvier, mené par des avions allemands ; ses bâtiments anciens sont ensuite progressivement détruits.\n\n<b>1972</b> : d'importants travaux de rénovation sont engagés afin de moderniser l'établissement.\n\n<b>1982</b> : réouverture de l'hôpital, désormais entièrement consacré à la gérontologie." , groupe: "AP-HP. Centre-Université Paris Cité", specialites: "Gynécologie (vocation historique), dermatologie (vocation historique), gérontologie", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Broussais", lat: 48.82800, lng:  2.31169, ouverture: 1883, fermeture: 2000, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/34_Broussais.pdf", histoire: "<b>1883</b> : ouverture de l'hôpital des Mariniers, destiné à soulager les hôpitaux parisiens durant les épidémies de choléra et de typhoïde ; il fonctionne par intermittence comme lieu de soins pour malades chroniques.\n\n<b>1885</b> : l'établissement est pérénisé et prend le nom d'hôpital Broussais, en hommage au médecin fondateur de l'école de physiologie.\n\n<b>1928</b> : démolition des baraquements de l'hôpital au profit d'un bâtiment neuf.\n\n<b>1936</b> : l'établissement est rebaptisé hôpital Broussais-La Charité, en mémoire de l'hôpital de la rue des Saint-Pères, désaffecté l'année précédente. \n\n<b>2000</b> : transfert d'une partie des services vers le nouvel hôpital européen Georges-Pompidou ; dans les années suivantes, l'activité médicale diminue, tandis qu'une partie des bâtiments de Broussais est cédée à la Croix-Rouge française et réaménagée." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Cave centrale", lat: 48.85373, lng: 2.34799, ouverture: 1816, fermeture: 1962, type: "services generaux", detruit:"oui",  images:"",  legende_image:"", url:"", histoire: "<b>1816</b> : création de la cave centrale, initialement installée à l'hospice des Enfants-Trouvés, sur le parvis Notre-Dame.\n\n<b>1849</b> : transfert de l'établissement à l'entrepôt Saint-Bernard, à la halle aux vins (5e arrondissement) ; centralisation de la réception et de ka distribution des vins et autres liquides (bière, vinaigre et huiles) destinés aux hôpitaux.\n\n<b>1962</b> : fermeture progressive de la cave centrale." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Cave centrale", lat: 48.84717, lng: 2.35654, ouverture: 1849, fermeture: 1962, type: "services generaux", detruit:"oui",  images:"",  legende_image:"", url:"", histoire: "<b>1816</b> : création de la cave centrale, initialement installée à l'hospice des Enfants-Trouvés, sur le parvis Notre-Dame.\n\n<b>1849</b> : transfert de l'établissement à l'entrepôt Saint-Bernard, à la halle aux vins (5e arrondissement) ; centralisation de la réception et de ka distribution des vins et autres liquides (bière, vinaigre et huiles) destinés aux hôpitaux.\n\n<b>1962</b> : fermeture progressive de la cave centrale." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Cent-Filles ", lat: 48.84029, lng: 2.35259, ouverture: 1622, fermeture: 1795, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/35_Cent-Filles.pdf", histoire: "<b>1622</b> : achat par Antoine Séguier d'une bâtisse située rue Censier pour y établir un établissement destiné à l'accueil de cent orphelines indigentes nées à Paris.\n\n<b>1623</b> : par lettres patentes de janvier, édification de l'hôpital des Cent-filles, également connu sous la dénomination de Notre-Dame de la Miséricorde. \n\n<b>1795</b> : suppression de l'hôpital réuni à celui des orphelines de la barrière de Sèvres ; les bâtiments de la rue Censier servent de grenier à la maison de Scipion avant d'être détruits avec le percement de la rue de Santeuil.\n" , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Chardon-Lagache (maison de retraite)", lat: 48.84499, lng: 2.26690, ouverture: 2024, fermeture: null, type: "retraite", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F8%2FFRAPHP075_C660_8_051.jpg",  legende_image:"L'entrée de la maison de retraite vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/36_Chardon-Lagache.pdf", histoire: "<b>1858</b> : acquisition par l'Assistance publique d'une parcelle issue de l'ancien village d'Auteuil.\n\n<b>1861</b> : par acte de donation du 26 mai, les époux Chardon-Lagache fondent une maison de retraite sur ce terrain.\n\n<b>1863-1865</b> : construction de l'établissement sous la direction de l'architecte Véra. La maison de retraite Chardon-Lagache ouvre ses portes le 24 juillet 1865, accueillant époux en ménage, veufs, veuves, et célibataires modestes âgés d'au moins 60 ans.\n\n<b>2003</b> : création du groupe hospitalier Sainte-Périne – Chardon-Lagache – Rossini." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Charles-Foix ", lat: 48.80516, lng: 2.39587, ouverture: 1901, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F22FI%2FFRAPHP075_22FI_182.jpg",  legende_image:"Entrée principale en 1976. cote 22/FI/182.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/38_Charles-Foix.pdf", histoire: "<b>1864-1869</b> : édification de l'hospice des Incurables d'Ivry sur les plans de l'architecte Théodore Labrouste. Il est destiné à accueillir 2 500 pensionnaires provenant du couvent des Récollets et de l'hospice des Incurables de la rue de Sèvres.\n\n<b>1887</b> : l'établissement prend le nom d'hospice d'Ivry.\n\n<b>1912</b> : agrandissement du site, portant sa capacité à 2 400 lits, avec la création des fondations Chemin-Delatour et Dheur.\n\n<b>1975</b> : rebaptisé hôpital Charles-Foix, en hommage au neurologue ancien chef de service d'Ivry, l'établissement conserve sa vocation de long séjour gériatrique." , groupe: "AP-HP. Sorbonne Université", specialites: "Gériatrie", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Chemin-Delatour (fondation)", lat: 48.80536, lng: 2.39587, ouverture: 1900, fermeture: 1916, type: "retraite", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F7%2FFRAPHP075_C660_7_052.jpg",  legende_image:"Plan de masse, 1899, cote C660_7_052.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/41_Chemin-Delatour.pdf", histoire: "<b>1898-1899</b> : conformément au legs de Madame Chemin-Delatour, l'Assistance publique, sa légataire universelle, fait ériger une maison de retraite sur un terrain situé à Ivry. Les travaux sont successivement confiés aux architectes Vibert et Lebrun.\n\n<b>1900</b> : ouverture de l'hospice, exclusivement destiné à des hommes domiciliés à Paris, admis en priorité s'ils ont exercé le métier d'ouvrier balancier." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Cité Universitaire (hôpital temporaire)", lat: 48.82016, lng: 2.33498, ouverture: 1941, fermeture: 1945, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/42_Cit%C3%A9-Universitaire.pdf", histoire: "<b>1941</b> : ouverture de l'hôpital temporaire de la Cité universitaire dans les bâtiments de la fondation Deutsch de La Meurthe, boulevard Jourdan (14e arrondissement). Doté d'un service de médecine, cet hôpital géré provisoirement par l'Assistance publique, permet de pallier le manque de lits durant la Seconde Guerre mondiale.\n\n<b>1945</b> : cessation d'activité. " , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Claude-Bernard", lat: 48.89860, lng: 2.332, ouverture: 1904, fermeture: 1988, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F23FI%2FFRAPHP075_23FI_054.jpg",  legende_image:"Entrée principale en 1963.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/43_Claude-Bernard.pdf", histoire: "<b>1905</b> : construction du nouvel établissement à l'empalcement de l'ancien hôpital, sur les plans de l'architecte François Renaud. L'hôpital Claude-Bernard est inauguré le 30 novembre de la même année.\n\n<b>1940-1960</b> : plusieurs campagnes d'agrandissement sont menées afin d'accroître les capacités de l'hôpital. Celui-ci conserve sa vocation de prise en charge des pathologies infectieuses et contagieuses, et se spécialise dans le traitement des maladies tropicales.\n\n<b>1988</b> : rattachement de Claude-Bernard à l'hôpital Bichat, formant le groupe hospitalier Bichat-Claude-Bernard, spécialisé dans le traitement des maladies infectieuses et tropicales." , groupe: "AP-HP. Nord-Université Paris Cité", specialites: "Maladies infectieuses, maladies tropicales", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Cochin ", lat: 48.83670, lng: 2.33945, ouverture: 1780, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F76FI%2FFRAPHP075_76FI_078.jpg",  legende_image:"Hôpital Cochin. Nouveau pavillon. Aquarelle signée A. Lavieille. Cote 76FI_78", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/45_Cochin.pdf", histoire: "<b>1780</b> : fondation de l'hospice Saint-Jacques-du-Haut-Pas par Jacques-Denis Cochin, destiné à accueillir les pauvres du faubourg Saint-Jacques à Paris.\n\n<b>1782</b> : achèvement des travaux sous la direction de Charles-François Viel. L'établissement ouvre en juin avec 38 lits.\n\n<b>1784</b> : l'hôpital prend le nom d'hospice Cochin, en hommage à son fondateur. En 1793, il change à deux reprises de dénomination pour devenir successivement  hospice Jacques, puis hospice du Sud.\n\n<b>1802</b> : le Conseil général des hospices lui restitue le nom d'hôpital Cochin.\n\n<b>1902</b> : fusion avec l'hôpital Ricord, également appelé Cochin-Annexe.\n\n<b>1908-1926</b> : campagnes successives de reconstruction et d'agrandissement.\n\n<b>1999</b> : fusion du groupe hospitalier Cochin avec le groupe hospitalier Saint-Vincent-de-Paul – La Roche-Guyon." , groupe: "AP-HP. Centre-Université Paris Cité", specialites: "Cancérologie, périnatalité, chirurgie digestive", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Commanderie de Saint-Louis", lat: 48.81058, lng: 2.35390, ouverture: 1634, fermeture: 1656, type: "hopital", detruit:"",  images:"https://www.musee-collections.aphp.fr/scripts/atlasgate.dll/aphpv2db/wa_vignette?ex=312&psite=APHP",  legende_image:"Hôpital Bicêtre, estampe sur  papier. 1656", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/22_Bic%C3%AAtre.pdf", histoire: "<b>XVIIe siècle</b> : le roi Louis XIII acquiert un domaine destiné à la construction d'un hôpital pour soldats invalides.\n\n<b>1634</b> : ouverture de la commanderie de Saint-Louis. \n\n<b>1656</b> : rattachement à l'Hôpital général de Paris ; la maison de Bicêtre devient un établissement d'enfermement pour indigents, combinant fonction d'hôpital, d'asile, de maison de correction et de détention.\n\n<b>1823</b> : par arrêté du 4 juin, le Conseil général des hospices lui attribue le nom d'hospice de la Vieillesse-Hommes. \n\n<b>1885</b> : réétablissement de la dénomination « Bicêtre ».\n\n<b>1950</b> : transformation progressive de l'hospice en hôpital de soins aigus.\n\n<b>1952</b> : modernisation et aménagement de deux pavillons en services hospitaliers pour enfants." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Corentin-Celton", lat: 48.82817, lng: 2.27850, ouverture: 1863, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F24FI%2FFRAPHP075_24FI_141.jpg",  legende_image:"Entrée principale de l'hôpital en 1994.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/47_Corentin-Celton.pdf", histoire: "<b>1863</b> : transfert à Issy et reconstruction de la Maison de retraite des Ménages.\n\n<b>1945</b> : l'établissement est rebaptisé Corentin-Celton, en hommage au résistant et agent hospitalier fusillé deux ans auparavant." , groupe: "AP-HP. Centre-Université Paris Cité", specialites: "Gériatrie, psychiatrie", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Cousin de Méricourt et Besson (hospice )", lat: 48.79915, lng: 2.33215, ouverture: 1913, fermeture: 1972, type: "retraite", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/48_Cousin-de-M%C3%A9ricourt-et-Besson.pdf", histoire: "<b>1909</b> : l'Assistance publique des travaux d'aménagement dans un château légué par Madame de Provigny ; sous la conduite de l'architecte Bélouet, la construction de pavillons permet d'aménager le château en maison de retraite.\n\n<b>1913</b> : ouverture de l'hospice Cousin-de-Méricourt-et-Besson.\n\n<b>1972</b> : rattachement de l'établissement au Bureau d'aide sociale de la Ville de Paris, en application de la loi du 31 décembre 1970 portant réforme hospitalière." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Damet (hospice)", lat: 48.88663, lng: 2.32338, ouverture: 1867, fermeture: 1969, type: "retraite", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/49_Damet.pdf", histoire: "<b>1867</b> : fondation de l'hospice de la Providence (dit hospice Damet) grâce au legs de Madeleine-Andrée Damet ; son ancienne demeure, rue Lemercier (17e arrondissement) est aménagée pour accueillir l'établissement, placé sous la gestion du bureau de bienfaisance du 17e arrondissement.\n\n<b>1954</b> : l'hospice compte 31 administrés.\n\n<b>1955</b> : extension de l'établissement avec la construction d'un pavillon de 28 chambres, destiné aux personnes âgées démunies, inauguré le 9 juin." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Davaine (fondation)", lat: 48.83866, lng: 2.17443, ouverture: 1898, fermeture: 1964, type: "fondation", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F8%2FFRAPHP075_C660_8_046.jpg",  legende_image:"Le pavillon vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/50_Davaine.pdf", histoire: "<b>1898</b> : ouverture de la fondation Casimir-Davaine (ou fondation Davaine), créée grâce au legs de Maria-Georgina Davaine, née Forbes, qui laisse à l'Assistance publique sa propriété de Garches ainsi qu'une partie de sa fortune pour établir un asile destiné aux jeunes filles convalescentes." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Debrousse (hôpital)", lat: 45.74930, lng: 4.81098, ouverture: 1909, fermeture: 2007, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/51_Debrousse-Lyon.pdf", histoire: "<b>1907</b> : Marie-Félicie Dessans, veuve de François-Hubert Debrousse, remet à l'Assistance publique les bâtiments édifiés par les architectes Blachier et Dumontier sur les communes de Lyon et de Sainte-Foy-lès-Lyon, ainsi qu'une dotation destinée au fonctionnement d'un hospice pour personnes âgées.\n\n<b>1909</b> : ouverture de l'asile Debrousse, dont la gestion est confiée par l'Assistance publique aux Hospices civils de Lyon.\n\n<b>vers 1920</b> : transformation de l'hospice en hôpital pour enfants, placé sous la seule gestion des Hospices civils de Lyon ; en 1936, il devient le plus grand hôpital pédiatrique de la région lyonnaise.\n\n<b>2007</b> : fermeture de l'établissement hospitalier ; en 2010, les bâtiments sont vendus puis reconvertis en logements." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Debrousse (hospice)", lat: 48.86195, lng: 2.40625, ouverture: 1892, fermeture: 1972, type: "retraite", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1892</b> : inauguration de l'hospice Debrousse, dans le 20e arrondissement de Paris, fondé grâce au legs de la baronne Marie-Catherine Alquier, née Debrousse ; édifié sur l'emplacement de l'ancien château de Bagnolet d'après les plans des architectes Bernard et Dezermaux, il accueille des indigents parisiens âgés d'au moins 70 ans ou atteints d'une infirmité incurable. \n\n<b>1899</b> : legs de Jean-Hubert Debrousse à l'Assistance publique, contribuant à l'achat de nouveaux terrains et à l'agrandissement de l'hospice en 1908. \n\n<b>1972</b> : rattachement de l'établissement au Bureau d'aide sociale de la Ville de Paris, en application de la loi du 31 décembre 1970 portant réforme hospitalière." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },

{ nom: "Dupuytren", lat: 48.67605, lng: 2.41291, ouverture: 1904, fermeture: 1967, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/54_Dupuytren.pdf", histoire: "<b>1967</b> : achèvement des travaux et ouverture de l'hôpital de Draveil (Essone), bientôt renommé hôpital Dupuytren ; conçu par les architectes Degouy, Durand et Henry, il est destiné à l'hospitalisation des malades chroniques. \n\n<b>fin 1967</b> : fusion des hôpitaux Joffre et Dupuytren sous une direction commune, formant le groupe hospitalier Joffre-Dupuytren. \n\n<b>1996</b> : l'hôpital Dupuytren dispose de 650 lits de moyen et long séjour, dédiés au traitement des affections des personnes âgées." , groupe: "AP-HP. Hôpitaux Universitaires Henri-Mondor", specialites: "Gériatrie, soins palliatifs, traumatologie, othopédie", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },

{ nom: "Émile-Zola (fondation)", lat: 48.95569, lng: 1.99556, ouverture: 1907, fermeture: 1978, type: "fondation", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/56_Emile-Zola.pdf", histoire: "<b>1907</b> : ouverture de la fondation Emile-Zola à Médan (Seine-et-Oise), à la suite de la donation d'Alexandrine Zola d'une propriété destinée à être transformée en établissement de convalescence ; la même année, un service des nourrissons dirigé par le docteur Méry est inauguré.\n\n<b>1952-1960</b> : aménagement progressif de la maison de Médan grâce à un nouveau legs d'Alexandrine Zola ; la maison compte 50 berceaux, contre 15 à son ouverture en 1907.\n\n<b>1973</b> : installation d'un musée et d'une école de cadres infirmiers.\n\n<b>1978</b> : l'école cède la place au syndicat interhospitalier régional d'Île-de-France." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Enfants Assistés (service des)", lat: 48.83679, lng:  2.33444, ouverture: 1859, fermeture: 1942, type: "", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F81FI%2FFRAPHP075_81FI_07.jpg",  legende_image:"Entrée en 1960.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/1_enfants-assist%C3%A9s.pdf", histoire: "<b>début du XIXe siècle</b> : installation du service des Enfants assistés rue d'Enfer, dans un bâtiment accueillant déjà l'hospice des Enfants Trouvés.\n\n<b>vers 1859</b> : l'établissement prend le nom d'hospice des Enfants Assistés.\n\n<b>1942</b> : il est rebaptisé hospice Saint-Vincent-de-Paul." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Enfants Malades", lat: 48.84636, lng: 2.31588, ouverture: 1724, fermeture: 1927, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FNCK%2FFRAPHP075_NCK_3FI4_0339.jpg",  legende_image:"Entrée historique de l'hôpital des Enfants malades, 149, rue de Sèvres, en 1966.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/57_Enfants-Malades.pdf", histoire: "<b>vers 1724</b> : fondation de la Maison de l'Enfant-Jésus, rue de Sèvres, à l'initiative du curé de Saint-Sulpice et grâce aux libéralités de plusieurs bienfaitrices, dont la reine Marie Leszczynska ; elle constitue l'origine directe de l'hôpital des Enfants Malades.\n\n<b>1751</b> : l'établissement devient la Maison royale de l'Enfant-Jésus, accueillant à la fois un hôpital pour les indigentes de la paroisse et un ouvroir destiné à l'éducation de femmes employées aux travaux de filature.\n\n<b>1794</b> : transformée en Maison nationale des Orphelins,  elle regroupe l'ensemble des enfants issus des orphelinats parisiens supprimés.\n\n<b>1802</b> : conversion en hôpital sous le nom d'hôpital des Enfants Malades, exclusivement dédié aux soins pédiatriques, devenant le premier établissement européen entièrement réservé aux enfants.\n\n<b>1927</b> : fusion avec l'hôpital Necker et création du groupe hospitalier Necker-Enfants Malades." , groupe: "AP-HP. Centre-Université Paris Cité", specialites: "Pédiatrie, chirurgie pédiatrique, maladies rares de l'enfant, hématologie pédiatrique", decouverte_1: "Premier sérum antidiphtérique appliqué à 300 enfants | 1893-1894 | Auguste Chaillou & Louis Martin (sous la direction d'Émile Roux, Institut Pasteur)", decouverte_2: " ", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "https://www.musee-collections.aphp.fr/app/photopro.sk/aphp/doclist?prms_treelist=rootNode%3D2%26openNodes%3D%253A3%253A3263%253A381%26caller_id%3Ddoclist%26search%3Dmcpid%2B%253A%2B%25223270%2522&psearch=mcpid%20%3A%20%221096%22&mcpid=1096" },
{ nom: "Enfants-Rouges ", lat: 48.86364, lng: 2.36008, ouverture: 1531, fermeture: 1772, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/58_Enfants-Rouges.pdf", histoire: "<b>après 1531</b> : décision du roi François 1er de créer un établissement destiné aux orphelins rue Portefoin, dans le quartier du Marais ; l'ophelinat ouvre sous le nom d'hôpital des Enfants-Dieu, avant d'être renommé Enfants-Rouges en référence aux vêtements de drap rouge portés par les enfants accueillis.\n\n<b>1680</b> : rattachement des Enfants-Rouges à l'Hôpital général.\n\n<b>1772</b> : suppression de l'établissement ; ses biens et revenus sont transférés aux Enfants-Trouvés, et les bâtiments sont détruits en 1778." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Enfants-Trouvés du faubourg Saint-Antoine ", lat: 48.85003, lng: 2.37681, ouverture: 1674, fermeture: 1838, type: "hopital", detruit:"oui",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/59_Enfants-Trouv%C3%A9s-du-faubourg-Saint-Antoine.pdf", histoire: "<b>1674</b> : acquisition par les administrateurs de l'Hôpital général d'une maison située sur un terrain cédé par l'abbaye royale de Saint-Antoine-des-Champs ; l'hospice, dépendant de l'Hôpital général, est confié aux soeurs de la Charité. \n\n<b>1795</b> : rattachement de l'établissement à l'ancien Oratoire de la rue d'Enfer.\n\n<b>1801</b> : affectation de la maison du faubourg aux orphelins sous le nom d'hospice des Orphelins de Paris ; elle devient ensuite une annexe de l'Hôtel-Dieu.\n\n<b>1880</b> : devenu hôpital Trousseau, l'établissement est désaffecté puis démoli ; le square Trousseau occupe aujourd'hui son emplacement." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Enfants-Trouvés du Parvis", lat: 48.85373, lng: 2.34799, ouverture: 1670, fermeture: 1877, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/60_Enfants-Trouv%C3%A9s-du-Parvis.pdf", histoire: "<b>1670</b> : création par lettres patentes de Louis XIV de l'hôpital des Enfants-Trouvés, rue Neuve Notre-Dame. Il se consacre au soin des nouveau-nés abandonnés.\n\n<b>1746-1751</b> : agrandissement de l'établissement sous la direction de l'architecte Germain Boffrand, devenu insuffisant face à l'augmentation des besoins.\n\n<b>1795</b> : fermeture de l'hôpital sous la Terreur ; le bâtiment accueille ensuite la pharmacie centrale, puis le Bureau central des hôpitaux à partir de 1838.\n\n<b>1877</b> : démolition de l'édifice dans le cadre du dégagement du parvis Notre-Dame." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Fernand-Widal", lat: 48.88172, lng: 2.35848, ouverture: 1802, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F27FI%2FFRAPHP075_27FI_244.jpg",  legende_image:"Façade du bâtiment Murger et entrée principale en 1991.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/61_Fernand-Widal.pdf", histoire: "<b>1802</b> : le conseil général des hospices fonde un hospice de 88 lits destiné aux patients de condition modeste, installé dans les bâtiments de la Maison du Saint-Nom-de-Jésus, faubourg Saint-Martin.\n\n<b>1816</b> : transfert rue du Faubourg-Saint-Denis dans l'ancienne communauté des sœurs grises, près de la prison Saint-Lazare ; l'hospice prend le titre de Maison royale de santé, surnommée Maison de santé Dubois, en référence au chirurgien qui y exerce.\n\n<b>1858</b> : à la suite d'une expropriation, reconstruction complète de l'hospice au 200 rue du Faubourg-Saint-Denis, par l'architecte Théodore Labrouste. \n\n<b>1959</b> : l'établissement est rebaptisé hôpital Fernand-Widal,mé en hommage au médecin ayant identifié le bacille de la dysenterie." , groupe: "AP-HP. Nord-Université Paris Cité", specialites: "Psychiatrie, toxicologie, gérontologie, réadaptation", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Foch ", lat: 48.82507, lng: 2.34478, ouverture: 1922, fermeture: null, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/62_Foch-Paris.pdf", histoire: "<b>1921</b> : donation par la vicomtesse de la Retorde d'un immeuble situé dans le 13e arrondissement, au profit de la Société des Médaillés militaires présidée par le maréchal Foch.\n\n<b>1922</b> : affectation de l'immeuble à des services administratifs et d'hospitalisation ; l'établissement prend le nom d'hôpital Foch.\n\n<b>1956</b> : l'Assistance publique prend le bâtiment à bail et l'aménage en maison de retraite.\n\n<b>1959</b> : l'hôpital Foch devient la maison de retraite Maréchal-Foch." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Foch (fondation)", lat: 48.87079, lng: 2.22240, ouverture: 1932, fermeture: 1950, type: "fondation", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/63_Foch-Suresnes.pdf", histoire: "<b>1932</b> : début de la construction de la fondation Foch, rue du Mont-Valérien à Suresnes; l'établissement est conçu pour accueillir un service de santé militaire d'environ 1 000 lits.\n\n<b>1944</b> : réquisition de la fondation Foch par l'Assistance publique, alors que le site avait été transformé en hôpital militaire allemand durant la seconde guerre mondiale.\n\n<b>1950</b> : cessation d'activité et reprise de l'ensemble des locaux par la fondation médicale du Mont-Valérien." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Forges-les-Bains", lat: 48.62760, lng: 2.10007, ouverture: 1860, fermeture: 1962, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F4%2FFRAPHP075_C660_4_082.jpg",  legende_image:"L'hôpital (côté ouest) vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/64_Forges-les-Bains.pdf", histoire: "<b>1854</b> : décision de construire à Forges-les-Bains un hôpital destiné aux soins des enfants scrofuleux et anémiques par les eaux ferrugineuses.\n\n<b>1860</b> : ouverture de l'établissement, doté de 100 lits.\n\n<b>1962</b> : à compter du 1er janvier, l'hôpital de Forges-les-Bains cesse d'être géré par l'Assistance publique, en application du décret du 5 décembre 1961 ; il relève désormais du service d'aide sociale à l'enfance du\ndépartement de la Seine." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Fortin (fondation)", lat: 49.07999, lng: 1.62669, ouverture: 1890, fermeture: null, type: "fondation", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F4%2FFRAPHP075_C660_4_234.jpg",  legende_image:"Vue de la fondation Fortin vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/65_Fortin.pdf", histoire: "<b>1852</b> : l'exécution du legs de Théodore-Marie Fortin d'Ivry, en faveur des enfants pauvres des écoles congréganistes de Paris, est confiée à l'Assistance publique par arrêté du Conseil d'État du 26 juillet.\n\n<b>1890</b> : ouverture de la fondation Fortin sur un terrain dépendant de l'hôpital de La Roche-Guyon ; l'orphelinat accueille 28 enfants âgés de 6 à 13 ans.\n\n<b>1922</b> : après le départ des religieuses enseignantes, les salles de classe sont transformées en chambres d'isolement pour enfants convalescents cardiaques.\n\n<b>1971-1973</b> : la fondation Fortin, devenue pavillon Fortin, est réaménagée pour accueillir des enfants handicapés." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Galien (orphelinat)", lat: 48.87896, lng: 2.15315, ouverture: 1927, fermeture: 1972, type: "orphelinat", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/66_Galien.pdf", histoire: "<b>1921</b> : le legs de Marie-Louise Galien, décédée en octobre, charge l'administration hospitalière parisienne de fonder et gérer un orphelinat de jeunes filles.\n\n<b>1925</b> : acquisition par l'administration d'une propriété à Croissy-sur-Seine, composée d'un château et d'un parc, destinée à accueillir la fondation.\n\n<b>1927</b> : ouverture de l'établissement après des travaux d'agrandissement et de réparations. L'orphelinat abrite 50 lits à l'ouverture à cette date.\n\n<b>1972</b> : fermeture de la fondation Galien." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Galignani (fondation)", lat: 48.88732, lng: 2.27714, ouverture: 1889, fermeture: 1972, type: "retraite", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F8%2FFRAPHP075_C660_8_072.jpg",  legende_image:"L'entrée vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/67_Galignani.pdf", histoire: "<b>1889</b> : ouverture de la maison de retraite Galignani, fondée conformément au testament de William Galignani ; l'établissement, élevé à Neuilly-sur-Seine sur les plans des architectes Delaage et Véra, est inauguré.\n\n<b>1960</b> : la fondation Galignani dispose toujours de 100 lits réservés aux personnes âgées.\n\n<b>1972</b> : rattachement de la fondation Galignani au Bureau d'aide sociale de Paris, en application du décret du 30 décembre 1972." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Garage central", lat: 48.84452, lng: 2.31403, ouverture: 1945, fermeture: 1967, type: "services generaux", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1945</b> : installation du garage central impasse Ronsin (15e arrondissement), dans des locaux proches de l'hôpital Necker. \n\n<b>début des années 1970</b> : transfert du garage central sur un site situé à Charenton-le-Pont ; toujours en activité, il relève aujourd'hui du service « Sécurité, Maintenance et Services » (SMS)." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Garage central", lat: 48.82369, lng: 2.39944, ouverture: 1967, fermeture: null, type: "services generaux", detruit:"",  images:"",  legende_image:"", url:"", histoire: "<b>1945</b> : installation du garage central impasse Ronsin (15e arrondissement), dans des locaux proches de l'hôpital Necker. \n\n<b>début des années 1970</b> : transfert du garage central sur un site situé à Charenton-le-Pont ; toujours en activité, il relève aujourd'hui du service « Sécurité, Maintenance et Services » (SMS)." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Georges-Clémenceau (sanatorium)", lat: 48.52092, lng: 2.43166, ouverture: 1918, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F28FI%2FFRAPHP075_28FI_054.jpg",  legende_image:"Entrée de l'hôpital en 1987", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/68_Georges-Clemenceau.pdf", histoire: "<b>1918</b> : création du sanatorium Georges-Clémenceau, d'abord installé sous forme de baraquements à l'hôpital Bicêtre, où sont hospitalisés des militaires tuberculeux.\n\n<b>1935</b> : ouverture à Champcueil d'un nouvel établissement de cure dédié au traitement de la tuberculose pulmonaire.\n\n<b>1963</b> : changement d'activité : l'établissement se consacre désormais à la gérontologie." , groupe: "AP-HP. Hôpitaux Universitaires Henri-Mondor", specialites: "Tuberculose (vocation historique), gérontologie, rééducation", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
{ nom: "Georges-Pompidou", lat: 48.83890, lng:  2.27777, ouverture: 2001, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F29FI%2FFRAPHP075_29FI_377.jpg",  legende_image:"Vues extérieures des bâtiments en 2000.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/69_Georges-Pompidou.pdf", histoire: "<b>1992</b> : le futur hôpital du 15e arrondissement est baptisé hôpital européen Georges-Pompidou sur proposition du maire de Paris Jacques Chirac ; il doit regrouper les services des anciens hôpitaux Boucicaut, Broussais et Laennec.\n\n<b>1993-2000</b> : construction de l'établissement sous la direction de l'architecte Aymeric Zublena, sur des terrains libérés par la société Citroën. \n\n<b>2001</b> : ouverture de l'hôpital." , groupe: "AP-HP. Centre-Université Paris Cité", specialites: "Cardiologie, chirurgie cardiovasculaire, cancérologie, imagerie", decouverte_1: "", decouverte_2: "", url_archives: "https://archives.aphp.fr/archives-en-ligne/", url_musee: "" },
